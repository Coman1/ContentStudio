<style>
/* ============================================================
   Aviva IWR · Content Studio — elevated ION design system
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  /* ---- ION brand ---- */
  --navy:#191D64;          /* primary */
  --navy-deep:#10133f;
  --blue:#0050B5;          /* Aviva action blue (logo) */
  --blue-600:#0a63d6;
  --blue-050:#eaf1fb;
  --yellow:#FFD900;        /* signature */
  --teal:#00596B;          /* secondary */
  --teal-050:#e6f2f4;
  --lightteal:#CDEBEE;     /* surface accent */
  --purple:#6C47FF;        /* Arize */
  --purple-050:#efebff;
  --green-leaf:#5DBB46;    /* Aviva leaf green */

  /* ---- neutrals (cool) ---- */
  --ink:#15172b;
  --ink-2:#3b3f57;
  --muted:#6a6f86;
  --muted-2:#9398ad;
  --line:#e7e9f1;
  --line-2:#eef0f6;
  --surface:#ffffff;
  --canvas:#f4f5fa;
  --canvas-2:#eceef6;

  /* ---- semantic ---- */
  --ok:#138a5a;     --ok-bg:#e6f5ee;
  --warn:#b26a00;   --warn-bg:#fdf2dd;
  --err:#c5364b;    --err-bg:#fce8eb;
  --info:#0050B5;   --info-bg:#eaf1fb;

  /* ---- type ---- */
  --sans:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',monospace;

  /* ---- radius ---- */
  --r-xs:6px; --r-sm:9px; --r-md:13px; --r-lg:18px; --r-xl:24px; --r-pill:999px;

  /* ---- shadow ---- */
  --sh-xs:0 1px 2px rgba(20,22,43,.06);
  --sh-sm:0 1px 3px rgba(20,22,43,.07),0 1px 2px rgba(20,22,43,.04);
  --sh-md:0 4px 14px rgba(20,22,43,.08),0 1px 3px rgba(20,22,43,.05);
  --sh-lg:0 16px 40px rgba(20,22,43,.14),0 4px 10px rgba(20,22,43,.06);
  --sh-nav:0 1px 0 rgba(255,255,255,.04) inset;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;font-family:var(--sans);color:var(--ink);
  background:var(--canvas);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  font-size:15px;line-height:1.5;
}
#root{height:100%}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--yellow);color:var(--navy)}

/* scrollbars */
*::-webkit-scrollbar{width:11px;height:11px}
*::-webkit-scrollbar-thumb{background:#d3d6e3;border-radius:99px;border:3px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:#bcc0d2;background-clip:padding-box}
*::-webkit-scrollbar-track{background:transparent}

/* ============================================================
   App shell
   ============================================================ */
.app{display:grid;grid-template-columns:266px 1fr;height:100%;overflow:hidden}

/* ---- Sidebar ---- */
.side{
  background:linear-gradient(190deg,#191D64 0%,#13163f 70%,#0e1138 100%);
  color:#cdd0ec;display:flex;flex-direction:column;position:relative;
  border-right:1px solid #0c0e30;
}
.side__brand{display:flex;align-items:center;gap:11px;padding:20px 20px 16px}
.side__logo{height:26px;width:auto;display:block;filter:brightness(0) invert(1)}
.side__brandtxt{display:flex;flex-direction:column;line-height:1.05}
.side__brandtxt b{font-size:14.5px;font-weight:700;color:#fff;letter-spacing:-.01em}
.side__brandtxt span{font-size:10.5px;color:#8f93c4;font-weight:500;letter-spacing:.06em;text-transform:uppercase}

.side__scroll{flex:1;overflow-y:auto;padding:6px 12px 12px}
.side__scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14)}
.navgroup{margin-top:14px}
.navgroup__label{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:#7378ac;font-weight:700;padding:0 12px 7px}
.navitem{
  display:flex;align-items:center;gap:11px;padding:8.5px 12px;border-radius:10px;
  color:#bcc0e6;font-size:13.5px;font-weight:500;border:none;background:none;width:100%;text-align:left;
  position:relative;transition:background .12s,color .12s;margin-bottom:1px;white-space:nowrap;
}
.navitem>span:first-of-type{flex:1;overflow:hidden;text-overflow:ellipsis}
.navitem:hover{background:rgba(255,255,255,.06);color:#fff}
.navitem.is-active{background:rgba(255,255,255,.10);color:#fff;font-weight:600}
.navitem.is-active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--yellow)}
.navitem .ico{flex:0 0 18px;color:inherit;opacity:.92}
.navitem__badge{margin-left:auto;font-size:11px;font-weight:700;background:var(--yellow);color:var(--navy);border-radius:99px;padding:1px 7px;min-width:20px;text-align:center}
.navitem__badge.amber{background:#ffb547;color:#3a2400}
.navitem__badge.dot{background:none;padding:0;min-width:0}
.navitem__badge.dot::after{content:"";display:block;width:7px;height:7px;border-radius:99px;background:var(--yellow)}

.side__user{border-top:1px solid rgba(255,255,255,.08);padding:12px;display:flex;align-items:center;gap:11px}
.side__user .av{width:34px;height:34px;border-radius:99px;background:var(--yellow);color:var(--navy);display:grid;place-items:center;font-weight:800;font-size:13px;flex:0 0 auto}
.side__user .meta{line-height:1.15;min-width:0}
.side__user .meta b{display:block;font-size:13px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side__user .meta span{font-size:11px;color:#8f93c4}
.side__user .gear{margin-left:auto;color:#8f93c4;background:none;border:none;display:grid;place-items:center;padding:6px;border-radius:8px}
.side__user .gear:hover{background:rgba(255,255,255,.08);color:#fff}
.side__env-pill{display:inline-flex;align-items:center;gap:5px;margin-top:5px;font-size:10.5px;font-weight:600;color:#7ecfd8;background:rgba(0,89,107,.35);border:1px solid rgba(0,89,107,.5);border-radius:var(--r-pill);padding:3px 8px;white-space:nowrap}
.side__env-dot{width:6px;height:6px;border-radius:99px;background:#7ecfd8;flex:0 0 auto}

/* ---- Main column ---- */
.main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{
  height:62px;flex:0 0 auto;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 26px;z-index:5;
}
.crumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.crumb b{color:var(--ink);font-weight:600}
.crumb .sep{color:var(--muted-2)}
.topbar__search{
  margin-left:8px;flex:0 1 360px;display:flex;align-items:center;gap:9px;
  background:var(--canvas);border:1px solid var(--line);border-radius:var(--r-pill);
  padding:8px 14px;color:var(--muted);font-size:13px;
}
.topbar__search input{border:none;background:none;outline:none;font-family:inherit;font-size:13.5px;color:var(--ink);flex:1;width:100%}
.topbar__search kbd{font-family:var(--mono);font-size:11px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--muted)}
.topbar__spacer{flex:1}
.iconbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;color:var(--ink-2);position:relative}
.iconbtn:hover{background:var(--canvas);color:var(--navy)}
.iconbtn .ndot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:99px;background:var(--err);border:2px solid #fff}
.env-pill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--teal);background:var(--teal-050);border:1px solid #cce3e7;border-radius:var(--r-pill);padding:5px 12px}
.env-pill .d{width:7px;height:7px;border-radius:99px;background:var(--teal)}

/* ---- content scroll ---- */
.content{flex:1;overflow-y:auto;padding:26px 30px 60px;scroll-behavior:smooth}
.wrap{max-width:1240px;margin:0 auto}

/* ============================================================
   Primitives
   ============================================================ */
.page-head{display:flex;align-items:flex-end;gap:20px;margin-bottom:22px}
.page-head h1{font-size:25px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px;color:var(--ink)}
.page-head p{margin:0;color:var(--muted);font-size:14px;max-width:64ch}
.page-head .actions{margin-left:auto;display:flex;gap:10px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:8px;border-radius:10px;border:1px solid transparent;
  font-weight:600;font-size:13.5px;padding:9px 15px;transition:.12s;white-space:nowrap}
.btn .ico{flex:0 0 auto}
.btn-primary{background:var(--navy);color:#fff;box-shadow:var(--sh-xs)}
.btn-primary:hover{background:#23288a}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-600)}
.btn-ghost{background:#fff;color:var(--ink-2);border-color:var(--line)}
.btn-ghost:hover{background:var(--canvas);color:var(--navy);border-color:#d8dbe9}
.btn-yellow{background:var(--yellow);color:var(--navy)}
.btn-yellow:hover{background:#ffe23d}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.btn-icon-only{padding:9px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm)}
.card-pad{padding:20px}
.card-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line-2)}
.card-head h3{margin:0;font-size:15px;font-weight:700;letter-spacing:-.01em}
.card-head .sub{font-size:12.5px;color:var(--muted);font-weight:500}
.card-head .actions{margin-left:auto;display:flex;gap:8px;align-items:center}

.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;border-radius:var(--r-pill);padding:3px 9px;line-height:1.4;white-space:nowrap}
.tag .d{width:6px;height:6px;border-radius:99px;background:currentColor}
.tag-ok{color:var(--ok);background:var(--ok-bg)}
.tag-warn{color:var(--warn);background:var(--warn-bg)}
.tag-err{color:var(--err);background:var(--err-bg)}
.tag-info{color:var(--info);background:var(--info-bg)}
.tag-purple{color:var(--purple);background:var(--purple-050)}
.tag-teal{color:var(--teal);background:var(--teal-050)}
.tag-neutral{color:var(--ink-2);background:var(--canvas-2)}
.tag-navy{color:#fff;background:var(--navy)}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--ink-2);
  background:#fff;border:1px solid var(--line);border-radius:var(--r-pill);padding:5px 11px}
.chip.is-on{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip:hover:not(.is-on){border-color:#cfd3e4;background:var(--canvas)}

.kpi{font-family:var(--mono);font-weight:600}
.mono{font-family:var(--mono)}
.muted{color:var(--muted)}
.divider{height:1px;background:var(--line-2);border:none;margin:0}

/* progress / meter */
.meter{height:7px;border-radius:99px;background:var(--canvas-2);overflow:hidden}
.meter>i{display:block;height:100%;border-radius:99px;background:var(--blue)}
.meter.teal>i{background:var(--teal)}
.meter.green>i{background:var(--ok)}
.meter.amber>i{background:#e89b2a}
.meter.purple>i{background:var(--purple)}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:1}
.tbl td{padding:13px 16px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .1s}
.tbl tbody tr:hover{background:var(--canvas)}
.tbl .row-click{cursor:pointer}

/* stat tile */
.stat{display:flex;flex-direction:column;gap:6px}
.stat__top{display:flex;align-items:center;gap:9px}
.stat__ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
.stat__val{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1;font-family:var(--sans)}
.stat__label{font-size:12.5px;color:var(--muted);font-weight:500}
.stat__delta{font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.delta-up{color:var(--ok)} .delta-down{color:var(--err)} .delta-flat{color:var(--muted)}

.grid{display:grid;gap:18px}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1180px){.g-4{grid-template-columns:repeat(2,1fr)}.g-3{grid-template-columns:repeat(2,1fr)}}

.avatar{width:28px;height:28px;border-radius:99px;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex:0 0 auto}

/* segmented */
.seg{display:inline-flex;background:var(--canvas-2);border-radius:10px;padding:3px;gap:2px}
.seg button{border:none;background:none;font-size:12.5px;font-weight:600;color:var(--muted);padding:6px 13px;border-radius:8px}
.seg button.is-on{background:#fff;color:var(--navy);box-shadow:var(--sh-xs)}

/* link list rows */
.lrow{display:flex;align-items:center;gap:13px;padding:13px 20px;border-bottom:1px solid var(--line-2);transition:background .1s}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:var(--canvas)}
.lrow__ico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
.lrow__main{min-width:0;flex:1}
.lrow__main b{font-size:13.5px;font-weight:600;display:block;letter-spacing:-.01em}
.lrow__main span{font-size:12px;color:var(--muted)}

/* alert banner */
.alertbar{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--r-md);border:1px solid;position:relative;overflow:hidden}
.alertbar__ico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
.alertbar.err{background:linear-gradient(90deg,#fdf0f2,#fff);border-color:#f3cdd4}
.alertbar.warn{background:linear-gradient(90deg,#fef6e8,#fff);border-color:#f3e0b8}
.alertbar.purple{background:linear-gradient(90deg,#f1edff,#fff);border-color:#ddd4fb}

/* flow / timeline pills */
.flow{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:4px}
.flow__step{flex:0 0 auto;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:13px 15px;position:relative}
.flow__step .n{font-family:var(--mono);font-size:11px;color:var(--muted-2);font-weight:600}
.flow__step b{display:block;font-size:13.5px;font-weight:700;margin:2px 0 3px;letter-spacing:-.01em}
.flow__step span{font-size:11.5px;color:var(--muted);display:block;line-height:1.35}
.flow__arrow{flex:0 0 28px;display:grid;place-items:center;color:var(--muted-2)}
.flow__step.is-active{border-color:var(--navy);box-shadow:0 0 0 3px rgba(25,29,100,.08)}
.flow__step.done{background:var(--ok-bg);border-color:#bfe6d2}
.flow__step.done .tagdot{position:absolute;top:11px;right:11px;color:var(--ok)}

/* node graph (relationship) */
.relnode{border:1.5px solid var(--line);border-radius:var(--r-md);padding:11px 13px;background:#fff;min-width:0}
.relnode b{font-size:12.5px;font-weight:700;display:block;letter-spacing:-.01em}
.relnode span{font-size:11px;color:var(--muted)}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px}
.tabs button{border:none;background:none;font-size:13.5px;font-weight:600;color:var(--muted);padding:11px 14px;position:relative;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button:hover{color:var(--ink)}
.tabs button.is-on{color:var(--navy);border-bottom-color:var(--navy)}

/* drawer */
.drawer-scrim{position:fixed;inset:0 0 0 266px;background:rgba(17,19,45,.34);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:580px;max-width:calc(100% - 266px);background:var(--canvas);box-shadow:var(--sh-lg);z-index:41;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer__head{background:#fff;border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:flex-start;gap:12px}
.drawer__body{flex:1;overflow-y:auto;padding:22px}
.drawer__foot{border-top:1px solid var(--line);background:#fff;padding:14px 22px;display:flex;gap:10px;align-items:center}

/* generic centred modal */
.modal-scrim{position:fixed;inset:0;background:rgba(17,19,45,.42);backdrop-filter:blur(3px);z-index:60;display:flex;align-items:center;justify-content:center;padding:34px;animation:fade .2s ease}
.modal{background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh-lg);width:100%;max-width:1040px;max-height:calc(100vh - 68px);display:flex;flex-direction:column;overflow:hidden;animation:pop .22s cubic-bezier(.4,0,.2,1)}
.modal--sm{max-width:680px}
@keyframes pop{from{transform:translateY(10px) scale(.985);opacity:0}to{transform:none;opacity:1}}
.modal__head{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal__head h3{margin:0;font-size:16.5px;letter-spacing:-.01em}
.modal__body{flex:1;overflow-y:auto;padding:20px 22px;background:var(--canvas)}
.modal__foot{border-top:1px solid var(--line);background:#fff;padding:13px 20px;display:flex;gap:10px;align-items:center}

/* markdown source pane */
.md-pane{background:#0f1230;color:#cdd2f0;border-radius:var(--r-md);padding:20px 22px;font-family:var(--mono);font-size:12.5px;line-height:1.75;white-space:pre-wrap;overflow:auto;height:100%}
.md-pane .md-h1{color:#fff;font-weight:600}
.md-pane .md-h2{color:#8fa9ff;font-weight:600}
.md-pane .md-q{color:#7d83b5}
.md-pane .md-li{color:#9fe6c4}

/* SharePoint-style page preview (generic CMS chrome) */
.sp{background:#f3f2f1;border-radius:var(--r-md);overflow:hidden;height:100%;display:flex;flex-direction:column;font-family:'Segoe UI',var(--sans)}
.sp__suite{background:#03787c;color:#fff;height:42px;display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0}
.sp__waffle{font-size:18px;opacity:.92}
.sp__suitettl{font-size:14px;font-weight:600}
.sp__suitesearch{margin-left:auto;background:rgba(255,255,255,.16);border-radius:4px;height:26px;width:180px;display:flex;align-items:center;padding:0 9px;font-size:12px;color:rgba(255,255,255,.8)}
.sp__site{background:#fff;border-bottom:1px solid #edebe9;padding:11px 28px;display:flex;align-items:center;gap:11px;flex-shrink:0}
.sp__sitelogo{width:30px;height:30px;border-radius:5px;background:#03787c;color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px}
.sp__sitename{font-size:14px;font-weight:600;color:#242424}
.sp__nav{display:flex;gap:16px;margin-left:14px}
.sp__nav span{font-size:12.5px;color:#444;padding-bottom:2px}
.sp__nav span.is-on{color:#03787c;font-weight:600;border-bottom:2px solid #03787c}
.sp__cmd{background:#faf9f8;border-bottom:1px solid #edebe9;padding:7px 28px;display:flex;align-items:center;gap:18px;flex-shrink:0;color:#242424;font-size:12.5px}
.sp__cmd .sp__cmdi{display:flex;align-items:center;gap:6px}
.sp__scroll{flex:1;overflow-y:auto;background:#fff}
.sp__banner{height:150px;background:linear-gradient(120deg,#03787c,#0a4d66);position:relative;display:flex;align-items:flex-end;padding:22px 40px}
.sp__bannerttl{color:#fff;font-size:30px;font-weight:600;letter-spacing:-.01em;text-shadow:0 1px 8px rgba(0,0,0,.25)}
.sp__article{max-width:760px;margin:0 auto;padding:26px 40px 56px}
.sp__byline{display:flex;align-items:center;gap:10px;padding-bottom:18px;border-bottom:1px solid #edebe9;margin-bottom:24px}
.sp__avatar{width:34px;height:34px;border-radius:50%;background:#03787c;color:#fff;display:grid;place-items:center;font-size:12.5px;font-weight:600}
.sp__article h2{font-size:20px;font-weight:600;color:#242424;margin:26px 0 9px;letter-spacing:-.01em}
.sp__article h2:first-of-type{margin-top:0}
.sp__article p{font-size:15px;line-height:1.6;color:#323130;margin:0 0 14px}
.sp__article ul{margin:0 0 14px;padding-left:22px}
.sp__article li{font-size:15px;line-height:1.6;color:#323130;margin-bottom:5px}

/* misc */
.dotline{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}
.spark{display:flex;align-items:flex-end;gap:3px;height:34px}
.spark i{flex:1;background:var(--blue);border-radius:2px 2px 0 0;opacity:.85;min-height:3px}
.fade-in{animation:fade .32s ease}
@keyframes fade{from{transform:translateY(7px)}to{transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .9s linear infinite}

/* domains of knowledge tree */
.kn-split{display:grid;grid-template-columns:300px minmax(0,1fr);gap:18px;align-items:start}
@media(max-width:1100px){.kn-split{grid-template-columns:1fr}.domtree{position:static!important}}
.domtree{padding:0;position:sticky;top:18px}
.domtree__head{display:flex;align-items:center;gap:10px;padding:15px 17px;border-bottom:1px solid var(--line-2)}
.domtree__head b{font-size:13.5px;font-weight:700;letter-spacing:-.01em;display:block}
.domtree__scroll{padding:9px}
.domtree__div{height:1px;background:var(--line-2);margin:8px 6px}
.domrow{display:flex;align-items:center;gap:8px;width:100%;padding:7px 9px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--ink-2);text-align:left;transition:.1s}
.domrow--top:hover{background:var(--canvas)}
.domrow--top.is-on{background:var(--navy);color:#fff}
.domrow--top.is-on .domrow__count{background:rgba(255,255,255,.22);color:#fff}
.domrow__lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.domrow__count{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--muted);background:var(--canvas-2);border-radius:99px;padding:1px 7px;min-width:22px;text-align:center;flex:0 0 auto}
.domrow__fte{font-size:10.5px;color:var(--muted-2);font-weight:600;white-space:nowrap;flex:0 0 auto}
.domdiv{margin-top:2px}
.domdiv__head{padding:7px 9px;gap:6px;border-radius:8px;font-weight:700;color:var(--ink)}
.domdiv__head.is-on{background:var(--navy);color:#fff}
.domdiv__head.is-on .domrow__count{background:rgba(255,255,255,.22);color:#fff}
.domdiv__head.is-on .domrow__fte{color:rgba(255,255,255,.72)}
.domdiv__chev{flex:0 0 auto;display:grid;place-items:center;color:var(--muted-2);padding:2px;border-radius:5px}
.domdiv__chev:hover{background:var(--canvas-2)}
.domdiv__name{display:flex;align-items:center;gap:8px;flex:1;min-width:0;font-size:13px;font-weight:700;color:inherit}
.domdot{width:8px;height:8px;border-radius:99px;flex:0 0 auto}
.domdiv__body{padding:2px 0 6px 12px;margin-left:8px;border-left:1px solid var(--line)}
.domdiv__sub{font-size:10px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:4px 9px 5px}
.domarea{margin-bottom:2px}
.domarea__head{font-weight:600;color:var(--ink-2);gap:7px}
.domarea__head:hover{background:var(--canvas)}
.domarea__head.is-on{background:var(--canvas-2);color:var(--navy)}
.domarea__note{font-style:normal;color:var(--muted-2);font-weight:500;font-size:11px}
.domarea__depts{display:flex;flex-wrap:wrap;gap:5px;padding:3px 9px 8px}
.domchip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--ink-2);background:#fff;border:1px solid var(--line);border-radius:99px;padding:3px 5px 3px 10px;transition:.1s}
.domchip:hover{border-color:#cfd3e4;background:var(--canvas)}
.domchip.is-on{background:var(--navy);color:#fff;border-color:var(--navy)}
.domchip i{font-style:normal;font-family:var(--mono);font-size:9.5px;background:var(--canvas-2);color:var(--muted);border-radius:99px;padding:1px 5px;min-width:16px;text-align:center}
.domchip.is-on i{background:rgba(255,255,255,.22);color:#fff}

function Icon({ name, size=18, sw=1.7, className='', style }){
  const d = ICONS[name];
  return (
    <svg className={'ico '+className} width={size} height={size} viewBox="0 0 24 24"
      fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>
      {d.split('M').filter(Boolean).map((seg,i)=><path key={i} d={'M'+seg}/>)}
    </svg>
  );
}

/* ---------- Small primitives ---------- */
function Tag({ kind='neutral', dot, children }){
  return <span className={'tag tag-'+kind}>{dot&&<i className="d"/>}{children}</span>;
}
function Avatar({ name, color }){
  const init = name.split(' ').map(w=>w[0]).slice(0,2).join('');
  return <span className="avatar" style={{background:color||'var(--navy)'}}>{init}</span>;
}
function Meter({ v, tone='', className='' }){
  return <div className={'meter '+tone+' '+className}><i style={{width:Math.max(0,Math.min(100,v))+'%'}}/></div>;
}
function Stat({ icon, iconbg, iconfg, val, label, delta, deltaDir }){
  return (
    <div className="stat">
      <div className="stat__top">
        <div className="stat__ico" style={{background:iconbg,color:iconfg}}><Icon name={icon} size={18}/></div>
        {delta!=null && <span className={'stat__delta '+(deltaDir==='up'?'delta-up':deltaDir==='down'?'delta-down':'delta-flat')}>
          {deltaDir==='up'?'▲':deltaDir==='down'?'▼':'—'} {delta}</span>}
      </div>
      <div className="stat__val">{val}</div>
      <div className="stat__label">{label}</div>
    </div>
  );
}
function Spark({ data, color='var(--blue)' }){
  const max = Math.max(...data);
  return <div className="spark">{data.map((d,i)=><i key={i} style={{height:(d/max*100)+'%',background:color}}/>)}</div>;
}

/* ---------- Governance guide download ----------
   Builds a clean, printable guide document and downloads it.
   Procedure guides route to CASS (Client Assets); everything else
   goes to the relevant governance team. */
function downloadGuide({ id, title, team='Governance', type='Guide', meta=[], sections=[] }){
  const today = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const esc = s => String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const metaRows = meta.map(m=>`<tr><th>${esc(m[0])}</th><td>${esc(m[1])}</td></tr>`).join('');
  const body = sections.map(s=>`<section><h2>${esc(s.h)}</h2>${s.html||''}</section>`).join('');
  const doc = `<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>${esc(id)} — ${esc(title)}</title>
<style>
  *{box-sizing:border-box}
  body{font:14px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1c23;margin:0;padding:48px;max-width:820px;margin:0 auto;background:#fff}
  .brand{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6b7280;font-weight:700}
  .route{display:inline-block;margin-top:10px;padding:5px 12px;border-radius:99px;background:#efe9ff;color:#5b34d6;font-size:11.5px;font-weight:700;letter-spacing:.02em}
  h1{font-size:25px;letter-spacing:-.02em;margin:14px 0 4px}
  .sub{color:#6b7280;font-size:12.5px;margin-bottom:24px}
  table.meta{border-collapse:collapse;width:100%;margin:0 0 28px;font-size:13px}
  table.meta th{text-align:left;color:#6b7280;font-weight:600;width:170px;padding:6px 0;vertical-align:top}
  table.meta td{padding:6px 0;font-weight:600}
  hr{border:none;border-top:1px solid #e6e7ec;margin:26px 0}
  h2{font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:#6b7280;margin:26px 0 12px}
  ol.steps{padding-left:0;list-style:none;counter-reset:s}
  ol.steps li{counter-increment:s;position:relative;padding:0 0 16px 42px;margin:0}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:0;width:26px;height:26px;border-radius:99px;background:#1f2440;color:#fff;display:grid;place-items:center;font-size:12.5px;font-weight:700}
  ol.steps b{display:block;font-size:14px}
  ol.steps .note{color:#6b7280;font-size:12.5px;margin-top:2px}
  ol.steps .kn{display:inline-block;margin-top:6px;font:11.5px ui-monospace,Menlo,monospace;color:#0050b5;background:#eef3fc;border-radius:6px;padding:2px 8px}
  .pl{display:grid;gap:0}
  .pl .stg{display:flex;gap:12px;padding-bottom:14px}
  .pl .num{width:24px;height:24px;border-radius:99px;background:#e6e7ec;color:#3b3f4a;display:grid;place-items:center;font-size:11.5px;font-weight:700;flex-shrink:0}
  .pl .num.done{background:#1f8a5b;color:#fff}.pl .num.active{background:#0050b5;color:#fff}.pl .num.failed{background:#c5364b;color:#fff}
  .pl b{font-size:13.5px}.pl .who{color:#3b3f4a;font-size:12.5px;margin-top:1px}.pl .note{color:#6b7280;font-size:12px;margin-top:2px}
  .foot{margin-top:36px;padding-top:16px;border-top:1px solid #e6e7ec;color:#9aa0ab;font-size:11px}
  @media print{body{padding:24px}}
</style></head><body>
  <div class="brand">Content Studio · ${esc(type)}</div>
  <div class="route">Prepared for ${esc(team)}</div>
  <h1>${esc(title)}</h1>
  <div class="sub">${esc(id)} · Generated ${today}</div>
  <table class="meta">${metaRows}</table>
  ${body}
  <div class="foot">This document was generated from Content Studio for ${esc(team)} review. Hash-chained into the FCA audit trail on export.</div>
</body></html>`;
  const blob = new Blob([doc],{type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safe = String(title||'guide').replace(/[^\w\s-]/g,'').trim().slice(0,48);
  a.href = url; a.download = `${id||'guide'} — ${safe} (${team}).html`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

Object.assign(window,{ Icon, Tag, Avatar, Meter, Stat, Spark, useState, useEffect, useRef, useMemo, downloadGuide });

/* Domains of knowledge — IWR & Wealth divisions → business areas → departments.

const DOMAIN_TREE = [

function MetaTile({ label, children }){

/* ============================================================
   Shared edit surface — markdown + chunks (limited scope)
   Mirrors the Reviews & sign-off content-review expansion, but
   the markdown and chunks are editable. Once reviewed, the user
   can re-ingest the updated content.
   ============================================================ */
function buildKnowledgeMd(k){
  const lines=['# '+k.title,'','> '+k.id+'  \u00b7  '+k.domain+'  \u00b7  Owner: '+k.owner,'','## Summary',k.summary||''];
  (k.sections||[]).forEach(s=>{ lines.push('','## '+s.h, s.p); });
  return lines.join('\n');
}
function buildDemandMd(d){
  const area=DEMAND_AREAS.find(a=>a.id===d.domain);
  const lines=['# '+d.name,'','> '+d.id+'  \u00b7  '+(area?area.name:'')+'  \u00b7  '+d.domain,'','## What is this demand?',d.desc||''];
  if((d.identifiers||[]).length){ lines.push('','## How to identify'); d.identifiers.forEach(x=>lines.push('- '+x)); }
  if((d.examples||[]).length){ lines.push('','## Example customer phrases'); d.examples.forEach(x=>lines.push('- \u201c'+x+'\u201d')); }
  return lines.join('\n');
}
function splitEditChunks(md){
  return md.split(/\n(?=## )/).map((text,i)=>{
    const t=text.trim();
    const head=(t.match(/^#+\s*(.+)/)||[])[1]||('Chunk '+(i+1));
    const tokens=Math.max(14,Math.round(t.split(/\s+/).filter(Boolean).length*1.4));
    return { head, text:t, tokens, state:'pending' };
  });
}

function EditMdChunks({ id, hasChunks, initialMd, onCancel, go, entity='knowledge' }){
  const [ctab,setCtab]=useState('markdown');
  const [md,setMd]=useState(initialMd);
  const [mdOk,setMdOk]=useState(false);
  const [chunks,setChunks]=useState(()=> hasChunks ? splitEditChunks(initialMd) : []);
  const [chunkBase,setChunkBase]=useState(initialMd);
  const [phase,setPhase]=useState('edit'); // edit | running | done

  const onMd=v=>{ setMd(v); setMdOk(false); };
  const setChunkText=(i,v)=>setChunks(cs=>cs.map((c,j)=>j===i?{...c,text:v,state:'pending'}:c));
  const setChunkState=(i,s)=>setChunks(cs=>cs.map((c,j)=>j===i?{...c,state:(c.state===s?'pending':s)}:c));
  const rechunk=()=>{ setChunks(splitEditChunks(md)); setChunkBase(md); setCtab('chunks'); };

  const approved=chunks.filter(c=>c.state==='approved').length;
  const flagged=chunks.filter(c=>c.state==='flagged').length;
  const stale = hasChunks && md!==chunkBase;
  const chunksReady = !hasChunks || (chunks.length>0 && approved===chunks.length && !stale);
  const ready = mdOk && chunksReady && phase==='edit';
  const doReingest=()=>{ setPhase('running'); setTimeout(()=>setPhase('done'),1300); };

  const taStyle={width:'100%',minHeight:'40vh',resize:'vertical',background:'var(--canvas)',border:'1px solid var(--line)',borderRadius:12,padding:'16px 18px',fontFamily:'var(--mono)',fontSize:12.5,lineHeight:1.75,color:'var(--ink-2)',outline:'none'};
  const chunkTa={width:'100%',resize:'vertical',minHeight:60,border:'none',background:'transparent',padding:'11px 14px',fontFamily:'var(--mono)',fontSize:12.5,lineHeight:1.6,color:'var(--ink-2)',outline:'none',display:'block'};

  /* ---- re-ingesting ---- */
  if(phase==='running'){
    return (
      <React.Fragment>
        <div className="drawer__body" style={{display:'grid',placeItems:'center',textAlign:'center'}}>
          <div style={{maxWidth:340}}>
            <div className="spin" style={{width:46,height:46,margin:'0 auto 16px',color:'var(--blue)'}}><Icon name="refresh" size={46}/></div>
            <h3 style={{margin:'0 0 6px',fontSize:16}}>Re-ingesting {id}…</h3>
            <p className="muted" style={{fontSize:13,lineHeight:1.5,margin:0}}>Re-extracting the markdown{hasChunks?', re-embedding the approved chunks':''} and re-classifying against linked demands.</p>
          </div>
        </div>
      </React.Fragment>
    );
  }

  /* ---- done ---- */
  if(phase==='done'){
    return (
      <React.Fragment>
        <div className="drawer__body" style={{display:'block'}}>
          <div className="fade-in" style={{textAlign:'center',padding:'18px 0 6px'}}>
            <div style={{width:56,height:56,borderRadius:16,background:'var(--ok-bg)',color:'var(--ok)',display:'grid',placeItems:'center',margin:'0 auto 14px'}}><Icon name="check" size={25}/></div>

            <p className="muted" style={{maxWidth:'46ch',margin:'0 auto 18px',fontSize:13}}>{entity==='demand'
              ? 'The updated definition was re-ingested and sent for SME sign-off before it goes live.'
              : 'The edited markdown'+(hasChunks?' and '+chunks.length+' chunks were':' was')+' re-ingested and sent for SME and compliance sign-off. Ada will see the update once it\u2019s published.'}</p>
            <div className="card card-pad" style={{maxWidth:400,margin:'0 auto',textAlign:'left'}}>
              {[['Reference',id],['Markdown','Reviewed \u00b7 '+md.split('\n').length+' lines'],...(hasChunks?[['Chunks',approved+' approved'+(flagged?' \u00b7 '+flagged+' flagged':'')]]:[]),['Status','In review']].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--line-2)',fontSize:13}}><span className="muted">{r[0]}</span><b style={{fontWeight:600}}>{r[1]}</b></div>
              ))}
            </div>
          </div>
        </div>
        <div className="drawer__foot">
          <button className="btn btn-ghost" onClick={onCancel}><Icon name="arrowL" size={15}/>Back to overview</button>
          <div style={{flex:1}}/>
          <button className="btn btn-primary" onClick={()=>{ onCancel(); go&&go('reviews'); }}>Track in reviews<Icon name="arrowR" size={15}/></button>
        </div>
      </React.Fragment>
    );
  }

  /* ---- edit ---- */
  return (
    <React.Fragment>
      <div className="drawer__body" style={{display:'block'}}>
        <div className="card" style={{overflow:'hidden',display:'flex',flexDirection:'column',minWidth:0}}>
          <div className="card-head" style={{padding:'13px 16px',gap:10}}>
            <Icon name="edit" size={17} style={{color:'var(--blue)'}}/>
            <h3 style={{fontSize:14}}>Edit content</h3>
            <span className="sub">markdown{hasChunks?' & chunks':''}</span>
            <div className="actions"><span className="chip" style={{cursor:'default',fontSize:11}}><Icon name="doc" size={12} style={{color:'var(--blue)'}}/>{id}.md</span></div>
          </div>
          <div style={{padding:'10px 16px',borderBottom:'1px solid var(--line-2)',fontSize:12.5,color:'var(--ink-2)',lineHeight:1.5}}>
            Editing is limited to the markdown source{hasChunks?' and the retrieval chunks Ada quotes':''}. Review your edits, then re-ingest to send the update for sign-off.
          </div>
          {hasChunks && (
            <div className="tabs" style={{padding:'0 16px',marginBottom:0}}>
              <button className={ctab==='markdown'?'is-on':''} onClick={()=>setCtab('markdown')}>Markdown source {mdOk&&<Icon name="check" size={12} style={{color:'var(--ok)',marginLeft:3}}/>}</button>
              <button className={ctab==='chunks'?'is-on':''} onClick={()=>setCtab('chunks')}>Chunks <span style={{fontFamily:'var(--mono)',fontSize:11,marginLeft:4,background:'var(--canvas-2)',color:'var(--muted)',borderRadius:99,padding:'1px 7px'}}>{approved}/{chunks.length}</span></button>
            </div>
          )}
          <div style={{padding:16,display:'grid',gap:14}}>
            {(ctab==='markdown'||!hasChunks) && (
              <React.Fragment>
                <textarea value={md} onChange={e=>onMd(e.target.value)} spellCheck={false} style={taStyle}/>
                <div style={{display:'flex',gap:9,alignItems:'center',flexWrap:'wrap'}}>
                  <span className="muted" style={{fontSize:12,flex:'1 1 120px'}}>{md.split('\n').length} lines \u00b7 {md.length} chars{hasChunks&&stale?' \u00b7 chunks out of date':''}</span>
                  {hasChunks && stale && <button className="btn btn-sm btn-ghost" onClick={rechunk}><Icon name="layers" size={13}/>Re-split chunks</button>}
                  <button className={'btn btn-sm '+(mdOk?'btn-primary':'btn-ghost')} onClick={()=>setMdOk(v=>!v)}><Icon name="check" size={13}/>{mdOk?'Markdown reviewed':'Mark markdown reviewed'}</button>
                </div>
              </React.Fragment>
            )}
            {hasChunks && ctab==='chunks' && (
              <React.Fragment>
                <div className="alertbar" style={{border:'1px solid '+(stale?'var(--warn)':'var(--line)'),background:stale?'var(--warn-bg)':'var(--canvas)',padding:'9px 13px',fontSize:12.5,alignItems:'center'}}>
                  <Icon name={stale?'warn':'layers'} size={15} style={{color:stale?'var(--warn)':'var(--blue)',flexShrink:0}}/>
                  <span style={{color:'var(--ink-2)',flex:1}}>{stale
                    ? <React.Fragment>The markdown changed. <b>Re-split</b> to regenerate chunks from the latest source.</React.Fragment>
                    : <React.Fragment><b>{approved}</b> of {chunks.length} chunks approved{flagged?' \u00b7 '+flagged+' flagged':''}. Each chunk is a passage Ada retrieves and quotes.</React.Fragment>}</span>
                  {stale && <button className="btn btn-sm btn-blue" onClick={rechunk}><Icon name="refresh" size={13}/>Re-split</button>}
                </div>
                <div style={{display:'grid',gap:10}}>
                  {chunks.map((c,i)=>{
                    const bd=c.state==='approved'?'var(--ok)':c.state==='flagged'?'var(--err)':'var(--line)';
                    return (
                      <div key={i} className="card" style={{border:'1px solid '+bd,overflow:'hidden'}}>
                        <div style={{display:'flex',alignItems:'center',gap:9,padding:'9px 13px',borderBottom:'1px solid var(--line-2)',background:'var(--canvas)'}}>
                          <span className="mono" style={{fontSize:11.5,fontWeight:700,color:'var(--navy)'}}>Chunk {String(i+1).padStart(2,'0')}</span>
                          <span className="muted" style={{fontSize:12,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.head}</span>
                          <Tag kind="neutral">{c.tokens} tok</Tag>
                          {c.state==='approved'&&<Tag kind="ok" dot>approved</Tag>}
                          {c.state==='flagged'&&<Tag kind="err" dot>flagged</Tag>}
                        </div>
                        <textarea value={c.text} onChange={e=>setChunkText(i,e.target.value)} spellCheck={false} style={chunkTa}/>
                        <div style={{display:'flex',gap:8,padding:'0 14px 12px'}}>
                          <button className={'btn btn-sm '+(c.state==='flagged'?'btn-primary':'btn-ghost')} onClick={()=>setChunkState(i,'flagged')}><Icon name="warn" size={12}/>Flag</button>
                          <button className={'btn btn-sm '+(c.state==='approved'?'btn-primary':'btn-ghost')} onClick={()=>setChunkState(i,'approved')}><Icon name="check" size={12}/>Approve</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      </div>
      <div className="drawer__foot">
        <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
        <div style={{flex:1,minWidth:0,textAlign:'right'}}>
          <span className="muted" style={{fontSize:12}}>{ready?'Reviewed — ready to re-ingest':(!mdOk?'Mark the markdown as reviewed':stale?'Re-split, then approve the chunks':'Approve all chunks to continue')}</span>
        </div>
        <button className="btn btn-primary" disabled={!ready} style={{opacity:ready?1:.5,cursor:ready?'pointer':'not-allowed'}} onClick={()=>ready&&doReingest()}><Icon name="refresh" size={15}/>Re-ingest{entity==='demand'?' definition':''}</button>
      </div>
    </React.Fragment>
  );
}

  );

function Knowledge({ go }){
  const [domSel,setDomSel]=useState({kind:'all'});
  const [q,setQ]=useState('');
  const [sel,setSel]=useState(null);
  const matchDom=(k)=>{
    if(domSel.kind==='all') return true;
    if(domSel.kind==='generic') return k.domain==='Generic';
    if(domSel.kind==='dept') return k.domain===domSel.value;
    if(domSel.kind==='area'){ const a=DOMAIN_TREE.flatMap(d=>d.areas).find(x=>x.id===domSel.value); return a?a.depts.includes(k.domain):false; }
    if(domSel.kind==='division'){ const d=DOMAIN_TREE.find(x=>x.id===domSel.value); return d?d.areas.some(a=>a.depts.includes(k.domain)):false; }
    return true;
  };
  const rows = KNOWLEDGE.filter(k=>matchDom(k)&&(!q||k.title.toLowerCase().includes(q.toLowerCase())||k.id.toLowerCase().includes(q.toLowerCase())||(k.domain||'').toLowerCase().includes(q.toLowerCase())));
  const selLabel = domSel.kind==='all'?'All knowledge'
    : domSel.kind==='generic'?'Generic'
    : domSel.kind==='dept'?domSel.value
    : domSel.kind==='area'?(DOMAIN_TREE.flatMap(d=>d.areas).find(a=>a.id===domSel.value)||{}).name
    : (DOMAIN_TREE.find(d=>d.id===domSel.value)||{}).name;
  const openId=id=>{ const k=KNOWLEDGE.find(x=>x.id===id); if(k) setSel(k); };
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div>
          <h1>Knowledge store</h1>
          <p>The single source of truth Ada reads from for customer policy changes — version-controlled and mapped to the demand it answers.</p>
        </div>
        <div className="actions">
          <button className="btn btn-ghost" onClick={()=>go('create-doc')}><Icon name="upload" size={16}/>Upload</button>
          <button className="btn btn-primary" onClick={()=>go('create-page')}><Icon name="plus" size={16}/>New content</button>
        </div>
      </div>

      <div className="grid g-4" style={{marginBottom:18}}>
        <div className="card card-pad"><Stat icon="book" iconbg="var(--blue-050)" iconfg="var(--blue)" val="186" label="Policy-change assets"/></div>
        <div className="card card-pad"><Stat icon="branch" iconbg="var(--blue-050)" iconfg="var(--blue)" val="3" label="In review"/></div>
        <div className="card card-pad"><Stat icon="clock" iconbg="var(--warn-bg)" iconfg="var(--warn)" val="1" label="Review overdue" delta="Vulnerable customers" deltaDir="down"/></div>
        <div className="card card-pad"><Stat icon="branch" iconbg="var(--teal-050)" iconfg="var(--teal)" val="100%" label="Version-controlled"/></div>
      </div>

      <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Browse by area</div>
      <div className="grid" style={{gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:24}}>
        {KNOWLEDGE_AREAS.map(a=>{
          const active = a.sel.kind==='generic' ? domSel.kind==='generic' : (domSel.kind==='dept'&&domSel.value===a.sel.value);
          return <KAreaCard key={a.name} area={a} count={domCount(a.depts)} isActive={active} onClick={()=>setDomSel(active?{kind:'all'}:a.sel)}/>;
        })}
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head">
          <div className="topbar__search" style={{margin:0,flex:'0 1 240px'}}>
            <Icon name="search" size={15}/>
            <input placeholder="Search knowledge or domain…" value={q} onChange={e=>setQ(e.target.value)}/>
          </div>
          <div className="actions" style={{flexWrap:'wrap',alignItems:'center'}}>
            <span className="muted" style={{fontSize:12}}>Domain</span>
            <span className="chip is-on">{selLabel}</span>
            {domSel.kind!=='all' && <button className="chip" onClick={()=>setDomSel({kind:'all'})}><Icon name="x" size={12}/>Clear</button>}
          </div>
        </div>
        <table className="tbl">
          <thead><tr><th>Asset</th><th>Domain</th><th>Owner</th><th>Ver</th><th style={{width:150}}>Next review</th><th>Links</th><th>Status</th></tr></thead>
          <tbody>
            {rows.map(k=>(
              <tr key={k.id} className="row-click" onClick={()=>setSel(k)} style={{cursor:'pointer'}}>
                <td><div style={{display:'flex',alignItems:'center',gap:10}}><span className="mono" style={{fontSize:11,color:'var(--muted-2)'}}>{k.id}</span><b style={{fontSize:13.5}}>{k.title}</b>{(k.flag==='stale')&&<Tag kind="warn" dot>stale</Tag>}</div></td>
                <td>{domainTag(k.domain)}</td>
                <td><div style={{display:'flex',alignItems:'center',gap:7}}><span className="avatar" style={{background:k.oc,width:24,height:24,fontSize:10}}>{k.owner.split(' ').map(w=>w[0]).join('')}</span><span style={{fontSize:12.5}}>{k.owner.split(' ')[0]}</span></div></td>
                <td><span className="mono" style={{fontSize:12}}>{k.version}</span></td>
                <td><div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-start'}}><span style={{fontSize:12.5,color:k.reviewState==='overdue'?'var(--err)':'var(--ink-2)'}}>{String(k.nextReview).replace('Overdue · ','')}</span>{reviewTag(k.reviewState)}</div></td>
                <td><span className="dotline" style={{fontSize:11.5}}><Icon name="target" size={13} style={{color:'var(--teal)'}}/>{k.demands}<Icon name="list" size={13} style={{color:'var(--purple)',marginLeft:6}}/>{k.procs}</span></td>
                <td>{statusTag(k.status)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <KnowledgeDrawer k={sel} onClose={()=>setSel(null)} go={go}/>
    </div>
  );
}

Object.assign(window,{ Knowledge });

</script>

<script type="text/babel">
/* Demand Identification */

function StatusTag({ s }){
  if(s==='documented') return <Tag kind="ok" dot>Documented</Tag>;
  if(s==='draft') return <Tag kind="warn" dot>Draft</Tag>;
  if(s==='needs-review') return <Tag kind="err" dot>Needs review</Tag>;
  return <Tag kind="neutral">Unknown</Tag>;
}

function AreaPill({ areaId }){
  if(!areaId) return null;
  return domainTag(areaId);
}

/* ---- Demand detail drawer ---- */
function DemandDrawer({ d, onClose, go }){
  const [edit,setEdit]=useState(false);
  useEffect(()=>{ setEdit(false); },[d&&d.id]);
  if(!d) return null;
  const area = DEMAND_AREAS.find(a=>a.id===d.domain);
  const relatedDemands = (d.related||[]).map(rid=>DEMANDS.find(x=>x.id===rid)).filter(Boolean);
  const needsWork = d.status==='draft'||d.status==='needs-review';

  return (
    <React.Fragment>
      <div className={'drawer-scrim'+(d?' open':'')} onClick={onClose}></div>
      <aside className={'drawer'+(d?' open':'')} style={{width:edit?'min(980px, calc(100% - 300px))':580,transition:'transform .25s cubic-bezier(.32,.72,0,1), width .28s ease'}}>
        <div className="drawer__head">
          <div className="stat__ico" style={{background:area?area.bg:'var(--canvas-2)',color:area?area.color:'var(--muted)'}}><Icon name="target" size={19}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span className="mono" style={{fontSize:11.5,color:'var(--muted)'}}>{d.id}</span>
              <StatusTag s={d.status}/>
              {edit && <Tag kind="info" dot>editing</Tag>}
            </div>
            <h3 style={{margin:'3px 0 0',fontSize:18,letterSpacing:'-.02em'}}>{d.name}</h3>
          </div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34}}><Icon name="x" size={17}/></button>
        </div>

        {edit && <EditMdChunks id={d.id} hasChunks={false} initialMd={buildDemandMd(d)} onCancel={()=>setEdit(false)} go={go} entity="demand"/>}

        <div className="drawer__body" style={{display:edit?'none':'grid',gap:18}}>
          {/* top stats */}
          <div className="grid g-2" style={{gap:12}}>
            <div className="card card-pad" style={{padding:14}}>
              <div className="muted" style={{fontSize:11.5}}>Area &amp; domain</div>
              <div style={{fontSize:15,fontWeight:700,margin:'4px 0 7px'}}>{area?area.name:'—'}</div>
              {domainTag(d.domain)}
            </div>
            <div className="card card-pad" style={{padding:14}}>
              <div className="muted" style={{fontSize:11.5}}>Owner</div>
              <div style={{display:'flex',alignItems:'center',gap:7,marginTop:5}}>
                <Avatar name={d.owner} color={d.oc}/>
                <span style={{fontSize:13.5,fontWeight:600}}>{d.owner}</span>
              </div>
            </div>
          </div>

          {/* review cadence */}
          <div className="card card-pad" style={{display:'flex',alignItems:'center',gap:14}}>
            <div className="stat__ico" style={{background:'var(--warn-bg)',color:'var(--warn)',flex:'0 0 auto'}}><Icon name="clock" size={18}/></div>
            <div style={{flex:1}}>
              <div className="muted" style={{fontSize:11.5}}>Review cadence · {d.reviewCycle}</div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginTop:5}}>{reviewTag(d.reviewState)}<span style={{fontSize:13,color:String(d.nextReview).includes('Overdue')?'var(--err)':'var(--ink-2)'}}>Next · {String(d.nextReview).replace('Overdue · ','')}</span>{d.lastReview&&<span className="muted" style={{fontSize:12}}>· Last {d.lastReview}</span>}</div>
            </div>
          </div>

          {/* description */}
          <div className="card card-pad">
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>What is this demand?</div>
            <p style={{margin:0,fontSize:14,lineHeight:1.6,color:'var(--ink-2)'}}>{d.desc}</p>
          </div>

          {/* needs-work alert */}
          {needsWork && (
            <div className={'alertbar '+(d.status==='needs-review'?'err':'warn')} style={{alignItems:'flex-start'}}>
              <div className="alertbar__ico" style={{background:d.status==='needs-review'?'var(--err-bg)':'var(--warn-bg)',color:d.status==='needs-review'?'var(--err)':'var(--warn)'}}><Icon name="warn" size={19}/></div>
              <div>
                <b style={{fontSize:13.5}}>{d.status==='needs-review'?'This demand needs review':'This demand is still in draft'}</b>
                <div className="muted" style={{fontSize:12.5,marginTop:2}}>{d.status==='needs-review'?'Identifiers and linked content need SME sign-off before going live.':'Complete the identifiers and link supporting knowledge to move this to documented.'}</div>
              </div>
            </div>
          )}

          {/* how to identify */}
          <div className="card card-pad">
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>How to identify this demand</div>
            <div style={{display:'grid',gap:10}}>
              {(d.identifiers||[]).map((ident,i)=>(
                <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10}}>
                  <div style={{width:24,height:24,borderRadius:7,background:'var(--teal-050)',color:'var(--teal)',display:'grid',placeItems:'center',flexShrink:0,marginTop:1}}>
                    <Icon name="check" size={14}/>
                  </div>
                  <span style={{fontSize:13.5,color:'var(--ink-2)',lineHeight:1.5}}>{ident}</span>
                </div>
              ))}
            </div>
          </div>

          {/* example customer phrases */}
          {d.examples && d.examples.length>0 && (
            <div className="card card-pad">
              <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Example customer phrases</div>
              <div style={{display:'grid',gap:9}}>
                {d.examples.map((ex,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'flex-start',gap:9}}>
                    <Icon name="msg" size={15} style={{color:'var(--blue)',marginTop:3,flexShrink:0}}/>
                    <span style={{color:'var(--ink-2)',fontStyle:'italic',fontSize:13.5,lineHeight:1.5}}>{ex}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* related demands */}
          {relatedDemands.length>0 && (
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10,display:'flex',justifyContent:'space-between'}}>Related demands<span style={{color:'var(--muted-2)'}}>{relatedDemands.length}</span></div>
              <div className="card" style={{overflow:'hidden'}}>
                {relatedDemands.map(rd=>(
                  <div className="lrow" key={rd.id} style={{padding:'11px 16px',cursor:'default'}}>
                    <div className="lrow__ico" style={{background:'var(--teal-050)',color:'var(--teal)',width:32,height:32}}><Icon name="target" size={16}/></div>
                    <div className="lrow__main"><b style={{fontSize:13}}>{rd.name}</b><span>{rd.id} · {rd.domain}</span></div>
                    <AreaPill areaId={rd.domain}/>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div className="drawer__foot" style={{display:edit?'none':'flex'}}>
          {needsWork
            ? <React.Fragment><button className="btn btn-blue" style={{flex:1,justifyContent:'center'}} onClick={()=>setEdit(true)}><Icon name="edit" size={16}/>Complete definition</button><button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={()=>{onClose();go('knowledge');}}><Icon name="link" size={16}/>Link knowledge</button></React.Fragment>
            : <React.Fragment><button className="btn btn-primary" onClick={()=>setEdit(true)}><Icon name="edit" size={16}/>Edit definition</button><div style={{flex:1}}></div><button className="btn btn-ghost btn-sm"><Icon name="external" size={14}/>View in knowledge store</button></React.Fragment>}
        </div>
      </aside>
    </React.Fragment>
  );
}

/* ---- Area card ---- */
function AreaCard({ area, count, isActive, onClick }){
  const iconMap = {generic:'grid','equity-release':'home','my-money':'star',pensions:'shield',protection:'lock'};
  return (
    <div className="card" onClick={onClick} style={{padding:'16px 18px',cursor:'pointer',border:isActive?'2px solid var(--navy)':'1px solid var(--line)',background:isActive?'#f8f8ff':'#fff',transition:'border .15s, background .15s'}}>
      <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:10}}>
        <div style={{width:36,height:36,borderRadius:10,background:area.bg,color:area.color,display:'grid',placeItems:'center'}}>
          <Icon name={iconMap[area.id]||area.icon} size={18}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <b style={{fontSize:14,letterSpacing:'-.01em',display:'block'}}>{area.name}</b>
        </div>
        <span className="mono" style={{fontSize:20,fontWeight:800,color:isActive?'var(--navy)':'var(--ink)'}}>{count}</span>
      </div>
      <div className="muted" style={{fontSize:12,lineHeight:1.4}}>{area.desc}</div>
    </div>
  );
}

/* ---- New demand modal ---- */
function NewDemand({ onClose, onCreate }){
  const [name,setName]=useState('');
  const [domain,setDomain]=useState('Generic');
  const [def,setDef]=useState('');
  const [ids,setIds]=useState(['']);
  const fld={width:'100%',padding:'9px 12px',border:'1px solid var(--line)',borderRadius:9,fontFamily:'inherit',fontSize:13.5,color:'var(--ink)',background:'#fff',outline:'none'};
  const lblS={fontSize:12,fontWeight:700,color:'var(--muted)',marginBottom:7,display:'block'};
  const setAt=(i,v)=>setIds(a=>a.map((x,j)=>j===i?v:x));
  const addRow=()=>setIds(a=>[...a,'']);
  const delRow=(i)=>setIds(a=>a.length>1?a.filter((_,j)=>j!==i):['']);
  const canSave=name.trim()&&def.trim();
  const save=()=>{ if(!canSave) return; onCreate({ name:name.trim(), domain, desc:def.trim(), identifiers:ids.map(s=>s.trim()).filter(Boolean), linkedKnowledge:[] }); };
  return ReactDOM.createPortal(
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal modal--sm" style={{maxWidth:760}} onClick={e=>e.stopPropagation()}>
        <div className="modal__head">
          <div className="stat__ico" style={{background:'var(--teal-050)',color:'var(--teal)'}}><Icon name="target" size={18}/></div>
          <div style={{flex:1,minWidth:0}}><h3>New demand</h3><div className="muted" style={{fontSize:12}}>Define a customer intent so Ada can recognise it</div></div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34,flexShrink:0}}><Icon name="x" size={17}/></button>
        </div>
        <div className="modal__body" style={{display:'grid',gap:18}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 220px',gap:14}}>
            <div><label style={lblS}>Demand name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Small pots lump sum withdrawal" style={fld} autoFocus/></div>
            <div><label style={lblS}>Area / domain</label><select value={domain} onChange={e=>setDomain(e.target.value)} style={fld}>{DEMAND_AREAS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
          </div>
          <div><label style={lblS}>Definition <span style={{fontWeight:500,color:'var(--muted-2)'}}>· what is this demand?</span></label>
            <textarea value={def} onChange={e=>setDef(e.target.value)} placeholder="Describe what the customer is asking for in plain English…" style={{...fld,minHeight:78,resize:'vertical',lineHeight:1.55}}/>
          </div>
          <div><label style={lblS}>How to identify <span style={{fontWeight:500,color:'var(--muted-2)'}}>· signals that point to this demand</span></label>
            <div style={{display:'grid',gap:8}}>
              {ids.map((v,i)=>(
                <div key={i} style={{display:'flex',gap:8,alignItems:'center'}}>
                  <div style={{width:7,height:7,borderRadius:99,background:'var(--teal)',flexShrink:0}}/>
                  <input value={v} onChange={e=>setAt(i,e.target.value)} placeholder="e.g. Customer mentions taking a small pension pot" style={fld}/>
                  <button className="iconbtn" style={{width:34,height:34,flexShrink:0}} onClick={()=>delRow(i)}><Icon name="x" size={15}/></button>
                </div>
              ))}
              <button className="btn btn-ghost btn-sm" onClick={addRow} style={{justifyContent:'center',borderStyle:'dashed',alignSelf:'start'}}><Icon name="plus" size={14}/>Add identifier</button>
            </div>
          </div>
        </div>
        <div className="modal__foot">
          <div className="dotline"><Icon name="target" size={14} style={{color:'var(--teal)'}}/>Saved as a draft demand for sign-off</div>
          <div style={{flex:1}}/>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={!canSave} style={{opacity:canSave?1:.5,cursor:canSave?'pointer':'not-allowed'}} onClick={save}><Icon name="plus" size={15}/>Create demand</button>
        </div>
      </div>
    </div>
  , document.body);
}

/* ---- Main page ---- */
function Demand({ go, openNew }){
  const [sel,setSel]=useState(null);
  const [areaFilter,setAreaFilter]=useState('all');
  const [statusFilter,setStatusFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [showNew,setShowNew]=useState(false);
  React.useEffect(()=>{ if(openNew) setShowNew(true); },[openNew]);
  const [added,setAdded]=useState([]);
  const ALL=useMemo(()=>[...added,...DEMANDS],[added]);
  const handleCreate=(data)=>{
    const d={
      id:'DM-N'+String(101+added.length),
      name:data.name, area:(data.domain||'').toLowerCase().replace(/\s+/g,'-'), domain:data.domain,
      status:'draft', volume:'New', knowledge:(data.linkedKnowledge||[]).length, procs:0,
      owner:'Lewis Donaldson', oc:'#0050B5', reviewCycle:'On publish', lastReview:'— (new)', nextReview:'On publish', reviewState:'due',
      desc:data.desc, identifiers:data.identifiers||[], examples:[], linkedKnowledge:data.linkedKnowledge||[], related:[]
    };
    setAdded(a=>[d,...a]); setShowNew(false); setStatusFilter('all'); setAreaFilter('all'); setSearch(''); setSel(d);
  };

  const areaCounts = useMemo(()=>{
    const c = {};
    DEMAND_AREAS.forEach(a=>c[a.id]=0);
    ALL.forEach(d=>{ if(c[d.domain]!==undefined) c[d.domain]++; });
    return c;
  },[ALL]);

  const rows = useMemo(()=>{
    return ALL.filter(d=>{
      if(areaFilter!=='all'&&d.domain!==areaFilter) return false;
      if(statusFilter==='documented'&&d.status!=='documented') return false;
      if(statusFilter==='draft'&&d.status!=='draft') return false;
      if(statusFilter==='needs-review'&&d.status!=='needs-review') return false;
      if(search){
        const s=search.toLowerCase();
        if(!d.name.toLowerCase().includes(s)&&!d.id.toLowerCase().includes(s)&&!d.desc.toLowerCase().includes(s)&&!(d.domain||'').toLowerCase().includes(s)) return false;
      }
      return true;
    });
  },[ALL,areaFilter,statusFilter,search]);

  const documented = ALL.filter(d=>d.status==='documented').length;
  const drafts = ALL.filter(d=>d.status==='draft').length;
  const needsReview = ALL.filter(d=>d.status==='needs-review').length;

  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div>
          <h1>Demand identification</h1>
          <p>How to recognise what a customer is asking for. Browse demands by area or search for specific service requests, with identifiers and example phrases.</p>
        </div>
        <div className="actions">
          <button className="btn btn-ghost"><Icon name="download" size={16}/>Export</button>
          <button className="btn btn-primary" onClick={()=>setShowNew(true)}><Icon name="plus" size={16}/>New demand</button>
        </div>
      </div>

      {/* KPI row */}
      <div className="grid g-4" style={{marginBottom:22}}>
        <div className="card card-pad"><Stat icon="target" iconbg="var(--teal-050)" iconfg="var(--teal)" val={ALL.length} label="Total demands"/></div>
        <div className="card card-pad"><Stat icon="check" iconbg="var(--ok-bg)" iconfg="var(--ok)" val={documented} label="Documented"/></div>
        <div className="card card-pad"><Stat icon="edit" iconbg="var(--warn-bg)" iconfg="var(--warn)" val={drafts} label="In draft"/></div>
        <div className="card card-pad"><Stat icon="warn" iconbg="var(--err-bg)" iconfg="var(--err)" val={needsReview} label="Needs review"/></div>
      </div>

      {/* Area cards */}
      <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Browse by area</div>
      <div className="grid" style={{gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:24}}>
        {DEMAND_AREAS.map(a=>(
          <AreaCard
            key={a.id}
            area={a}
            count={areaCounts[a.id]||0}
            isActive={areaFilter===a.id}
            onClick={()=>setAreaFilter(areaFilter===a.id?'all':a.id)}
          />
        ))}
      </div>

      {/* Demands table card */}
      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head" style={{flexWrap:'wrap',gap:10}}>
          <div className="seg">
            {[['all','All'],['documented','Documented'],['draft','Draft'],['needs-review','Needs review']].map(([k,l])=>(
              <button key={k} className={statusFilter===k?'is-on':''} onClick={()=>setStatusFilter(k)}>{l}</button>
            ))}
          </div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
            {areaFilter!=='all' && (
              <button className="chip is-on" onClick={()=>setAreaFilter('all')} style={{gap:4}}>
                {(DEMAND_AREAS.find(a=>a.id===areaFilter)||{}).name}
                <Icon name="x" size={13}/>
              </button>
            )}
            <div style={{display:'flex',alignItems:'center',gap:7,background:'var(--canvas)',border:'1px solid var(--line)',borderRadius:'var(--r-pill)',padding:'6px 12px',minWidth:200}}>
              <Icon name="search" size={15} style={{color:'var(--muted)',flexShrink:0}}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search demands or domains…" style={{border:'none',background:'none',outline:'none',fontFamily:'inherit',fontSize:13,color:'var(--ink)',width:'100%'}}/>
            </div>
          </div>
        </div>

        <table className="tbl">
          <thead>
            <tr>
              <th style={{width:56}}></th>
              <th>Demand</th>
              <th>Domain</th>

<script type="text/babel">

const PROC_STEPS = {

    {t:'Confirm customer identity and plan type', k:'KN-1990', note:'Capped drawdown only — flexi-access uses a different path'},
    {t:'Retrieve the current-quarter GAD rate', k:'KN-2041', affected:true, note:'Rate changed 2.75% → 3.25% — pending re-publish'},
    {t:'Calculate the maximum income (150% of GAD basis amount)', k:'KN-2038', note:'Uses the published GAD basis amount'},
    {t:'Check the requested increase against the cap', k:null},
    {t:'Confirm no MPAA or tax-relief implications', k:'KN-1944'},
    {t:'Record the instruction and effective date', k:null},

};
function stepsFor(p){
  if(PROC_STEPS[p.id]) return PROC_STEPS[p.id];

                  ['Linked demand',p.demands],['Linked knowledge',p.knowledge],['Last updated',p.updated]],

}

              <div className="lrow__ico" style={{background:u.conf===0?'var(--err-bg)':'var(--warn-bg)',color:u.conf===0?'var(--err)':'var(--warn)',width:34,height:34}}><Icon name="msg" size={16}/></div>

          ))}
        </div>
      </div>
    </div>

}

</script>

<script type="text/babel">

function Connections({ go }){

/* ---- secondary: Playground ---- */
function Playground(){
  const [qk,setQk]=useState('q1');
  const [phase,setPhase]=useState('idle');
  const q=PLAYGROUND[qk];
  const run=()=>{ setPhase('running'); setTimeout(()=>setPhase('done'),900); };

    <div className="grid" style={{gridTemplateColumns:'1fr 340px',alignItems:'start',gap:18}}>

          </div>
        </div>
        {phase==='done' && (
          <div className="card fade-in" style={{overflow:'hidden'}}>

                <div style={{textAlign:'center'}}><div className="muted" style={{fontSize:12}}>Groundedness</div><Tag kind={q.guard==='passed'?'ok':'err'} dot>{q.guard}</Tag></div>

            </div>

        )}
        {phase==='idle' && <div className="card card-pad" style={{textAlign:'center',padding:'40px',color:'var(--muted)'}}><Icon name="play" size={26} style={{marginBottom:8}}/><div style={{fontSize:13.5}}>Pick a question and press Run to see how a connected agent answers from your content.</div></div>}
        {phase==='running' && <div className="card card-pad" style={{textAlign:'center',padding:'40px',color:'var(--purple)'}}><Icon name="refresh" size={26} style={{marginBottom:8}}/><div style={{fontSize:13.5}}>Retrieving knowledge, generating, checking guardrails…</div></div>}
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head"><Icon name="sliders" size={18}/><h3>Agent config · Ada</h3></div>

          {[['Knowledge scope','Pensions + Wealth'],['Retrieval','Top 6 · rerank on'],['Model','gpt-4o · temp 0.2'],['Confidence gate','70%'],['Persona','Customer assistant']].map(r=>(<div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span className="muted">{r[0]}</span><b style={{fontWeight:600}}>{r[1]}</b></div>))}
          <hr className="divider"/><button className="btn btn-ghost btn-sm" style={{justifyContent:'center'}}><Icon name="edit" size={14}/>Edit configuration</button>
        </div>
      </div>
    </div>
  );
}

/* ---- secondary: Guardrails ---- */
function GuardrailsTab(){

function AgentLab({ go }){

Object.assign(window,{ AgentLab });

        </div>

}

Object.assign(window,{ Arize });

const STEP_C = { done:'var(--ok)', active:'var(--blue)', blocked:'var(--err)', pending:'var(--muted-2)' };
const STEP_ICO = { done:'check', active:'clock', blocked:'warn', pending:'clock' };
const TONE_C = { err:{c:'var(--err)',bg:'var(--err-bg)',k:'err'}, warn:{c:'var(--warn)',bg:'var(--warn-bg)',k:'warn'}, info:{c:'var(--blue)',bg:'var(--info-bg)',k:'info'} };
function stageMeta(key){ return REVIEW_PIPELINE.find(s=>s.key===key); }
function typeTag(t){ const k=t==='Procedure guide'?'purple':t==='Demand'?'teal':'info'; return <Tag kind={k}>{t}</Tag>; }
function initials(n){ return n.split(' ').map(w=>w[0]).slice(0,2).join(''); }

    <div style={{display:'flex',alignItems:'center',gap:0}}>

}
