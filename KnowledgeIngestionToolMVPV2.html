/* Build a Markdown review document for compliance / SMEs.
   Captures the pipeline so far, the extracted content, and a sign-off block. */
function reviewDocMarkdown(r){
  const isProc = r.type==='Procedure guide';
  const routing = isProc ? 'CASS — Client Assets' : (r.complianceTeam || 'Governance');
  const m = stageMeta(r.stage);
  const today = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const STATE_LABEL = { done:'✅ Signed off', active:'🟠 In review', blocked:'❌ Changes requested', pending:'⬜ Not started' };

  const L = [];
  L.push('# Review document — '+r.title);
  L.push('');
  L.push('_'+r.type+' · '+r.ref+' · generated '+today+' for compliance & SME review_');
  L.push('');
  L.push('---');
  L.push('');
  L.push('## Submission details');
  L.push('');
  L.push('| Field | Detail |');
  L.push('| --- | --- |');
  L.push('| Reference | '+(r.ref||r.id)+' |');
  L.push('| Type | '+r.type+' |');
  L.push('| Domain | '+(r.domain||'—')+' |');
  L.push('| Owner | '+(r.by||'—')+' |');
  L.push('| Submitted | '+(r.submitted||'—')+' |');
  L.push('| Current stage | '+(m?m.label:r.stage)+' |');
  L.push('| Compliance routing | '+routing+' |');
  L.push('');
  L.push('## Sign-off pipeline so far');
  L.push('');
  L.push('| # | Stage | Status | Reviewer | When |');
  L.push('| --- | --- | --- | --- | --- |');
  REVIEW_PIPELINE.forEach((s,i)=>{
    const e = r.steps[s.key] || {};
    const who = (e.who&&e.who!=='—') ? e.who + (e.role?' ('+e.role+')':'') : '—';
    L.push('| '+(i+1)+' | '+s.label+' | '+(STATE_LABEL[e.state]||'⬜ Not started')+' | '+who+' | '+(e.when||'—')+' |');
  });
  L.push('');
  REVIEW_PIPELINE.forEach(s=>{
    const e = r.steps[s.key] || {};
    if(e.note){ L.push('- **'+s.label+':** '+e.note); }
  });
  L.push('');
  L.push('---');
  L.push('');
  L.push('## Content under review');
  L.push('');
  L.push(reviewMarkdown(r));
  L.push('');
  L.push('---');
  L.push('');
  L.push('## Reviewer sign-off');
  L.push('');
  L.push('Please record your decision below and return this document to the knowledge owner.');
  L.push('');
  L.push('| Reviewer | Role | Decision (approve / changes) | Comments | Date |');
  L.push('| --- | --- | --- | --- | --- |');
  L.push('|  |  |  |  |  |');
  L.push('|  |  |  |  |  |');
  L.push('');
  L.push('> Technical accuracy, regulatory compliance ('+routing+') and customer-facing clarity must all be confirmed before this content is published to Ada.');
  L.push('');
  return L.join('\n');
}

function downloadReview(r, audience){
  audience = audience || (r.type==='Procedure guide' ? 'CASS — Client Assets' : (r.complianceTeam || 'Governance'));
  const isProc = r.type==='Procedure guide';
  const m = stageMeta(r.stage);
  const routing = isProc ? 'CASS — Client Assets' : (r.complianceTeam || 'Governance');
  const today = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const STATE_LABEL = { done:'Signed off', active:'In review', blocked:'Changes requested', pending:'Not started' };

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const PW = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();
  const MX = 56, MT = 64, MB = 56, CW = PW - MX*2;
  let y = MT;

  const ink = [27,31,38], muted = [120,128,140], line = [222,226,232], navy = [30,58,95];
  function ensure(h){ if(y + h > PH - MB){ doc.addPage(); y = MT; } }
  function text(str, opts){
    opts = opts || {};
    const size = opts.size || 10.5, lh = opts.lh || size*1.45;
    doc.setFont('helvetica', opts.style || 'normal');
    doc.setFontSize(size);
    doc.setTextColor.apply(doc, opts.color || ink);
    const lines = doc.splitTextToSize(String(str==null?'':str), opts.w || CW);
    lines.forEach(ln=>{ ensure(lh); doc.text(ln, opts.x!=null?opts.x:MX, y); y += lh; });
  }
  function gap(h){ y += (h==null?8:h); }
  function rule(){ ensure(14); doc.setDrawColor.apply(doc, line); doc.setLineWidth(0.7); doc.line(MX, y, MX+CW, y); y += 14; }
  function kv(k, v){
    const lh = 15; ensure(lh);
    doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor.apply(doc, muted);
    doc.text(String(k).toUpperCase(), MX, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(10.5); doc.setTextColor.apply(doc, ink);
    const vlines = doc.splitTextToSize(String(v==null?'—':v), CW-140);
    vlines.forEach((ln,i)=>{ if(i>0){ ensure(lh); } doc.text(ln, MX+140, y); if(i<vlines.length-1) y+=lh; });
    y += lh+3;
  }
  function heading(str){ gap(10); ensure(20); text(str, {size:13.5, style:'bold', color:navy, lh:18}); gap(2); }

  // ---- Header band ----
  doc.setFillColor(247,248,250); doc.rect(0,0,PW,52,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor.apply(doc, navy);
  doc.text('FOR REVIEW — '+audience.toUpperCase(), MX, 26);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor.apply(doc, muted);
  doc.text(r.type+' · '+(r.ref||r.id)+' · '+today, MX, 40);
  y = 78;

  text(r.title, {size:18, style:'bold', lh:23});
  gap(6); rule();

  // ---- Submission details ----
  heading('Submission details');
  kv('Reference', r.ref||r.id);
  kv('Type', r.type);
  kv('Domain', r.domain||'—');
  kv('Owner', r.by||'—');
  kv('Submitted', r.submitted||'—');
  kv('Current stage', m?m.label:r.stage);
  kv('Compliance routing', routing);
  gap(6); rule();

  // ---- Pipeline so far ----
  heading('Sign-off pipeline so far');
  REVIEW_PIPELINE.forEach((s,i)=>{
    const e = r.steps[s.key] || {};
    const st = STATE_LABEL[e.state] || 'Not started';
    const who = (e.who&&e.who!=='—') ? e.who + (e.role?' · '+e.role:'') : '—';
    ensure(20);
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor.apply(doc, ink);
    doc.text((i+1)+'.  '+s.label, MX, y);
    doc.setFont('helvetica','bold'); doc.setFontSize(9.5);
    const stColor = e.state==='done'?[31,138,90]:e.state==='blocked'?[200,55,55]:e.state==='active'?[40,111,219]:muted;
    doc.setTextColor.apply(doc, stColor);
    doc.text(st.toUpperCase(), MX+CW, y, {align:'right'});
    y += 15;
    text(who, {size:10, color:muted, lh:14});
    if(e.note) text(e.note, {size:10, color:ink, lh:14});
    if(e.when) text(e.when, {size:9.5, color:muted, lh:13});
    gap(6);
  });
  rule();

  // ---- Content under review ----
  heading('Content under review');
  reviewMarkdown(r).split('\n').forEach(ln=>{
    const t = ln.trimEnd();
    if(/^#{1,6}\s/.test(t)){ gap(4); text(t.replace(/^#{1,6}\s/,''), {size:11.5, style:'bold', color:navy, lh:16}); }
    else if(/^>\s?/.test(t)){ text(t.replace(/^>\s?/,''), {size:10, style:'italic', color:muted, lh:14}); }
    else if(/^[-*]\s/.test(t)){ text('•  '+t.replace(/^[-*]\s/,''), {size:10.5, lh:15, x:MX+10, w:CW-10}); }
    else if(t==='') gap(5);
    else text(t, {size:10.5, lh:15});
  });
  gap(6); rule();

  // ---- Reviewer sign-off ----
  heading('Reviewer sign-off');
  text('Please record your decision and return this document to the knowledge owner.', {size:10.5, color:muted, lh:15});
  gap(8);
  ['Reviewer name','Role','Decision (approve / request changes)','Comments','Date'].forEach(lbl=>{
    ensure(34);
    text(lbl, {size:9.5, style:'bold', color:muted, lh:13});
    doc.setDrawColor.apply(doc, line); doc.setLineWidth(0.7); doc.line(MX, y+6, MX+CW, y+6); y += 22;
  });
  gap(4);
  text('Technical accuracy, regulatory compliance ('+routing+') and customer-facing clarity must all be confirmed before this content is published to Ada.', {size:9.5, style:'italic', color:muted, lh:13});

  // ---- Footer page numbers ----
  const pages = doc.internal.getNumberOfPages();
  for(let p=1;p<=pages;p++){
    doc.setPage(p);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor.apply(doc, muted);
    doc.text((r.ref||r.id)+' · For '+audience, MX, PH-28);
    doc.text('Page '+p+' of '+pages, MX+CW, PH-28, {align:'right'});
  }

  const safe = String(r.title||'review').replace(/[^\w\s-]/g,'').trim().slice(0,48);
  const aud = String(audience).replace(/[^\w\s-]/g,'').trim();
  doc.save((r.ref||r.id||'review')+' — '+safe+' (for '+aud+').pdf');
}

/* ---- markdown + chunk review (shared by Reviews drawer and Upload wizard) ---- */
function reviewMarkdown(r){
  const isProc = r.type==='Procedure guide';
  const lc = (r.title||'').toLowerCase();
  return [
    '# '+r.title,
    '',
    '> '+r.ref+'  \u00b7  '+r.domain+'  \u00b7  Owner: '+r.by,
    '',
    '## Summary',
    r.note||'',
    '',
    '## When this applies',
    isProc
      ? 'Follow these steps whenever a customer request requires '+lc+'. Confirm the customer\u2019s identity and the plan involved before you begin.'
      : 'Use this guidance when a customer asks about '+lc+'. Confirm the customer\u2019s identity and the plan involved before continuing.',
    '',
    '## Key points',
    '- '+(r.note||''),
    '- Record the outcome and any supporting evidence against the customer record.',
    '- Escalate to a senior colleague if the criteria above are not met.',
    '',
    '## Sources',
    'Derived from source policy '+r.ref+'. Review the linked policy before publishing.',
  ].join('\n');
}
function reviewChunks(r){
  const md = reviewMarkdown(r);
  return md.split(/\n(?=## )/).map((text,i)=>{
    const t = text.trim();
    const head = (t.match(/^#+\s*(.+)/)||[])[1] || ('Chunk '+(i+1));
    const tokens = Math.max(14, Math.round(t.split(/\s+/).filter(Boolean).length*1.4));
    return { i, head, text:t, tokens };
  });
}
function MdView({ md }){
  return (
    <div style={{background:'var(--canvas)',border:'1px solid var(--line)',borderRadius:12,padding:'16px 18px',fontFamily:'var(--mono)',fontSize:12.5,lineHeight:1.75,maxHeight:'46vh',overflowY:'auto'}}>
      {md.split('\n').map((ln,i)=>{
        let st={color:'var(--ink-2)',whiteSpace:'pre-wrap'};
        if(/^#{1,6}\s/.test(ln)) st={color:'var(--navy)',fontWeight:700,whiteSpace:'pre-wrap'};
        else if(/^>/.test(ln)) st={color:'var(--muted)',whiteSpace:'pre-wrap'};
        return <div key={i} style={st}>{ln||'\u00A0'}</div>;
      })}
    </div>
  );
}
function ContentReview({ r }){
  const [ctab,setCtab]=useState('markdown');
  const md = useMemo(()=>reviewMarkdown(r),[r]);
  const chunks = useMemo(()=>reviewChunks(r),[r]);
  const [cs,setCs]=useState(()=>chunks.map(()=>'pending'));
  const [mdOk,setMdOk]=useState(null);
  const set=(i,v)=>setCs(a=>a.map((x,j)=>j===i?(x===v?'pending':v):x));
  const approved = cs.filter(x=>x==='approved').length;
  const flagged = cs.filter(x=>x==='flagged').length;
  return (
    <div className="card" style={{overflow:'hidden',display:'flex',flexDirection:'column',minWidth:0}}>
      <div className="card-head" style={{padding:'13px 16px',gap:10}}>
        <Icon name="doc" size={17} style={{color:'var(--blue)'}}/>
        <h3 style={{fontSize:14}}>Content review</h3>
        <span className="sub">markdown &amp; chunks</span>
        <div className="actions"><span className="chip" style={{cursor:'default',fontSize:11}}><Icon name="doc" size={12} style={{color:'var(--blue)'}}/>{r.ref}.md</span></div>
      </div>
      <div style={{padding:'10px 16px',borderBottom:'1px solid var(--line-2)',fontSize:12.5,color:'var(--ink-2)',lineHeight:1.5}}>
        Review the extracted markdown and the chunks Ada will retrieve. Both must be checked before this content is published and ingested.
      </div>
      <div className="tabs" style={{padding:'0 16px'}}>
        <button className={ctab==='markdown'?'is-on':''} onClick={()=>setCtab('markdown')}>Markdown source {mdOk==='ok'&&<Icon name="check" size={12} style={{color:'var(--ok)',marginLeft:3}}/>}</button>
        <button className={ctab==='chunks'?'is-on':''} onClick={()=>setCtab('chunks')}>Chunks <span style={{fontFamily:'var(--mono)',fontSize:11,marginLeft:4,background:'var(--canvas-2)',color:'var(--muted)',borderRadius:99,padding:'1px 7px'}}>{approved}/{chunks.length}</span></button>
      </div>
      <div style={{padding:16,display:'grid',gap:14}}>
        {ctab==='markdown' && (
          <React.Fragment>
            <MdView md={md}/>
            <div style={{display:'flex',gap:9,alignItems:'center',flexWrap:'wrap'}}>
              <span className="muted" style={{fontSize:12,flex:'1 1 120px'}}>{md.split('\n').length} lines \u00b7 {md.length} chars</span>
              <button className={'btn btn-sm '+(mdOk==='changes'?'btn-primary':'btn-ghost')} onClick={()=>setMdOk('changes')}><Icon name="edit" size={13}/>Request changes</button>
              <button className={'btn btn-sm '+(mdOk==='ok'?'btn-primary':'btn-ghost')} onClick={()=>setMdOk('ok')}><Icon name="check" size={13}/>{mdOk==='ok'?'Markdown approved':'Approve markdown'}</button>
            </div>
          </React.Fragment>
        )}
        {ctab==='chunks' && (
          <React.Fragment>
            <div className="alertbar" style={{border:'1px solid var(--line)',background:'var(--canvas)',padding:'9px 13px',fontSize:12.5}}>
              <Icon name="layers" size={15} style={{color:'var(--blue)',flexShrink:0}}/>
              <span style={{color:'var(--ink-2)'}}><b>{approved}</b> of {chunks.length} chunks approved{flagged?' \u00b7 '+flagged+' flagged':''}. Each chunk is a passage Ada retrieves and quotes.</span>
            </div>
            <div style={{display:'grid',gap:10}}>
              {chunks.map((c,i)=>{
                const state=cs[i];
                const bd = state==='approved'?'var(--ok)':state==='flagged'?'var(--err)':'var(--line)';
                return (
                  <div key={i} className="card" style={{border:'1px solid '+bd,overflow:'hidden'}}>
                    <div style={{display:'flex',alignItems:'center',gap:9,padding:'9px 13px',borderBottom:'1px solid var(--line-2)',background:'var(--canvas)'}}>
                      <span className="mono" style={{fontSize:11.5,fontWeight:700,color:'var(--navy)'}}>Chunk {String(i+1).padStart(2,'0')}</span>
                      <span className="muted" style={{fontSize:12,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.head}</span>
                      <Tag kind="neutral">{c.tokens} tok</Tag>
                      {state==='approved'&&<Tag kind="ok" dot>approved</Tag>}
                      {state==='flagged'&&<Tag kind="err" dot>flagged</Tag>}
                    </div>
                    <div style={{padding:'11px 14px',fontSize:12.5,lineHeight:1.6,color:'var(--ink-2)',whiteSpace:'pre-wrap'}}>{c.text}</div>
                    <div style={{display:'flex',gap:8,padding:'0 14px 12px'}}>
                      <button className={'btn btn-sm '+(state==='flagged'?'btn-primary':'btn-ghost')} onClick={()=>set(i,'flagged')}><Icon name="warn" size={12}/>Flag</button>
                      <button className={'btn btn-sm '+(state==='approved'?'btn-primary':'btn-ghost')} onClick={()=>set(i,'approved')}><Icon name="check" size={12}/>Approve</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

  const [src,setSrc]=useState(null);
  const [file,setFile]=useState('Change-of-address-policy-2025-Q2.pdf');
  const [domain,setDomain]=useState('Direct wealth');
  const [trusted,setTrusted]=useState('');
  const [confirmSME,setConfirmSME]=useState(false);
  const [confirmComp,setConfirmComp]=useState(false);
  const [maps,setMaps]=useState(['DM-G01','DM-G04']);
  const [linkUrl,setLinkUrl]=useState('https://aviva.sharepoint.com/sites/servicing/change-of-address');
  const [prog,setProg]=useState(-1); // pipeline index

  useEffect(()=>{
    if(step!==3) return;
    setProg(0);
    const t=setInterval(()=>{
      setProg(p=>{ if(p>=PIPELINE.length-1){ clearInterval(t); setTimeout(()=>setStep(4),700); return p; } return p+1; });
    },650);
    return ()=>clearInterval(t);
  },[step]);

  const sources=[
    {id:'sp-modern',name:'SharePoint (Modern)',desc:'Connected · 4 libraries',icon:'globe'},
    {id:'sp-classic',name:'SharePoint (Classic)',desc:'Connected · 2 sites',icon:'globe'},
    {id:'link',name:'Paste a link',desc:'SharePoint page or web URL',icon:'globe'},
    {id:'pdf',name:'PDF document',desc:'Upload from your device',icon:'doc'},
    {id:'word',name:'Word document',desc:'Upload from your device',icon:'doc'},
  ];

  return (
    <div className="wrap fade-in" style={{maxWidth:860}}>
      <div className="page-head"><div><h1>Add a document</h1><p>Bring an existing file into the knowledge store. We extract and classify it, then send it for human review before it reaches Ada.</p></div>
        <div className="actions"><button className="btn btn-ghost btn-sm" onClick={()=>go('create')}><Icon name="x" size={14}/>Cancel</button></div></div>

      <div className="card card-pad" style={{padding:'24px 26px'}}>
        <Stepper step={step}/>

        {/* Step 0 — source */}
        {step===0 && (
          <div className="fade-in">
            <h3 style={{margin:'0 0 14px',fontSize:15}}>Where is the document coming from?</h3>
            <div className="grid g-2">
              {sources.map(s=>(
                <button key={s.id} className="card card-pad" onClick={()=>setSrc(s.id)} style={{textAlign:'left',cursor:'pointer',border:src===s.id?'1.5px solid var(--navy)':'1px solid var(--line)',boxShadow:src===s.id?'0 0 0 3px rgba(25,29,100,.08)':'var(--sh-sm)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:11}}>
                    <div style={{width:38,height:38,borderRadius:10,background:'var(--canvas-2)',color:'var(--navy)',display:'grid',placeItems:'center'}}><Icon name={s.icon} size={18}/></div>
                    <div style={{flex:1}}><b style={{fontSize:13.5,display:'block'}}>{s.name}</b><span className="muted" style={{fontSize:12}}>{s.desc}</span></div>
                    {src===s.id&&<Icon name="checkCircle" size={18} style={{color:'var(--navy)'}}/>}
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 1 — file */}
        {step===1 && (
          <div className="fade-in">
            {src==='link' ? (
              <React.Fragment>
                <h3 style={{margin:'0 0 14px',fontSize:15}}>Paste the page link</h3>
                <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>SharePoint page or web URL</label>
                <input value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} placeholder="https://aviva.sharepoint.com/sites/…"
                  style={{width:'100%',padding:'11px 13px',border:'1px solid var(--line)',borderRadius:10,fontFamily:'inherit',fontSize:14,marginBottom:16}}/>
                <div className="card" style={{overflow:'hidden'}}>
                  <div className="lrow" style={{background:'var(--teal-050)'}}>
                    <div className="lrow__ico" style={{background:'#fff',color:'var(--teal)',width:36,height:36}}><Icon name="globe" size={17}/></div>
                    <div className="lrow__main"><b style={{fontSize:13.5}}>Change of address — servicing page</b><span style={{wordBreak:'break-all'}}>{linkUrl}</span></div>
                    <Tag kind="info" dot>ready</Tag>
                  </div>
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <h3 style={{margin:'0 0 14px',fontSize:15}}>Select the file</h3>
                <div style={{border:'2px dashed var(--line)',borderRadius:14,padding:'30px',textAlign:'center',background:'var(--canvas)',marginBottom:16}}>
                  <div style={{width:46,height:46,borderRadius:12,background:'#fff',border:'1px solid var(--line)',display:'grid',placeItems:'center',margin:'0 auto 10px',color:'var(--blue)'}}><Icon name="upload" size={22}/></div>
                  <b style={{fontSize:14}}>Drop a file here</b>
                  <div className="muted" style={{fontSize:12.5}}>PDF, Word or selected SharePoint library · max 25MB</div>
                </div>
                <div className="card" style={{overflow:'hidden'}}>
                  <div className="lrow" style={{background:'var(--blue-050)'}}>
                    <div className="lrow__ico" style={{background:'#fff',color:'var(--blue)',width:36,height:36}}><Icon name="doc" size={17}/></div>
                    <div className="lrow__main"><b style={{fontSize:13.5}}>{file}</b><span>1.2 MB · selected from {src&&src.startsWith('sp')?'SharePoint':'upload'}</span></div>
                    <Tag kind="info" dot>ready</Tag>
                  </div>
                </div>
              </React.Fragment>
            )}
          </div>
        )}

        {/* Step 2 — classify */}
        {step===2 && (
          <div className="fade-in" style={{display:'grid',gap:18}}>
            <h3 style={{margin:0,fontSize:15}}>Classify the content</h3>
            <div>
              <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Title</label>
              <input defaultValue="Change of address — proof &amp; verification requirements" style={{width:'100%',padding:'10px 13px',border:'1px solid var(--line)',borderRadius:10,fontFamily:'inherit',fontSize:14}}/>
            </div>
            <div className="grid g-2">
              <div>
                <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Domain</label>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['Direct wealth','Advised wealth','Generic','Retirement Centre','Equity release'].map(d=><button key={d} className={'chip'+(domain===d?' is-on':'')} onClick={()=>setDomain(d)}>{d}</button>)}</div>
              </div>
              <div>
                <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Owner</label>
                <div className="chip" style={{cursor:'default'}}><span className="avatar" style={{background:'#138a5a',width:20,height:20,fontSize:9}}>CW</span>Chris Ward-Smith</div>
              </div>
            </div>
            <div>
              <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Trusted source <span className="muted" style={{fontWeight:400}}>· the authority this content is owned by</span></label>
              <input value={trusted} onChange={e=>setTrusted(e.target.value)} placeholder="e.g. Servicing Policy Manual §4.2" style={{width:'100%',padding:'10px 13px',border:'1px solid var(--line)',borderRadius:10,fontFamily:'inherit',fontSize:14}}/>
            </div>
            <div>
              <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Map to demand <span className="muted" style={{fontWeight:400}}>· helps Ada retrieve it</span></label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {['DM-G01','DM-G02','DM-G03','DM-G04','DM-G06','DM-G07'].map(d=><button key={d} className={'chip'+(maps.includes(d)?' is-on':'')} onClick={()=>setMaps(m=>m.includes(d)?m.filter(x=>x!==d):[...m,d])}>{maps.includes(d)&&<Icon name="check" size={12}/>}<span className="mono" style={{fontSize:11,opacity:.7}}>{d}</span>&nbsp;{DEMAND_LABELS[d]}</button>)}
              </div>
            </div>
          </div>
        )}

        {/* Step 3 — process */}
        {step===3 && (
          <div className="fade-in">
            <h3 style={{margin:'0 0 16px',fontSize:15}}>Processing “{file}”</h3>
            <div style={{display:'grid',gap:10}}>
              {PIPELINE.map((p,i)=>{
                const state=i<prog?'done':i===prog?'run':'todo';
                const last=i===PIPELINE.length-1;
                return (
                  <div key={p.k} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:11,border:'1px solid '+(state==='run'?'var(--navy)':'var(--line)'),background:state==='todo'?'var(--canvas)':'#fff'}}>
                    <div style={{width:32,height:32,borderRadius:9,display:'grid',placeItems:'center',flexShrink:0,
                      background:state==='done'?'var(--ok-bg)':state==='run'?'var(--blue-050)':'var(--canvas-2)',
                      color:state==='done'?'var(--ok)':state==='run'?'var(--blue)':'var(--muted-2)'}}>
                      <Icon name={state==='done'?'check':p.icon} size={16}/>
                    </div>
                    <b style={{flex:1,fontSize:13.5,color:state==='todo'?'var(--muted)':'var(--ink)'}}>{p.k}</b>
                    {state==='run'&&<span className="dotline" style={{fontSize:12,color:'var(--blue)'}}><Icon name="refresh" size={14}/>running</span>}
                    {state==='done'&&<Tag kind="ok" dot>done</Tag>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Step 4 — review markdown & chunks */}
        {step===4 && (()=>{ const upDoc={ title:'Change of address \u2014 proof & verification', ref:'KN-3052', domain, by:'Chris Ward-Smith', note:'Raised the proof-of-address threshold to \u00a350,000, with an enhanced due-diligence trigger.', type:'Knowledge' };
          return (
          <div className="fade-in">
            <h3 style={{margin:'0 0 6px',fontSize:15}}>Review before ingesting</h3>
            <p className="muted" style={{margin:'0 0 16px',fontSize:13.5,maxWidth:'62ch',lineHeight:1.5}}>We\u2019ve extracted the markdown and split it into retrieval chunks. Review both before the content is ingested and sent for sign-off.</p>
            <ContentReview r={upDoc}/>
            <div className="card card-pad" style={{marginTop:18,background:'var(--canvas)',border:'1px solid var(--line)'}}>
              <div style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Confirm sign-off before ingesting</div>
              <p className="muted" style={{fontSize:12.5,margin:'0 0 8px',lineHeight:1.5}}>Both reviews must be confirmed before the content can be ingested.</p>
              {[['sme',confirmSME,setConfirmSME,'Reviewed by SME','A subject-matter expert has checked the content for accuracy.'],['comp',confirmComp,setConfirmComp,'Reviewed by Compliance','Compliance has confirmed it meets regulatory requirements.']].map(c=>(
                <div key={c[0]} onClick={()=>c[2](v=>!v)} style={{display:'flex',gap:11,alignItems:'flex-start',padding:'9px 0',cursor:'pointer'}}>
                  <span style={{width:21,height:21,borderRadius:6,flexShrink:0,marginTop:1,border:'1.5px solid '+(c[1]?'var(--ok)':'var(--line)'),background:c[1]?'var(--ok)':'#fff',color:'#fff',display:'grid',placeItems:'center',transition:'.12s'}}>{c[1]&&<Icon name="check" size={13}/>}</span>
                  <span><b style={{fontSize:13.5,display:'block'}}>{c[3]}</b><span className="muted" style={{fontSize:12}}>{c[4]}</span></span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,marginTop:20,paddingTop:18,borderTop:'1px solid var(--line-2)'}}>
              <button className="btn btn-ghost" onClick={()=>setStep(2)}>Back</button>
              <div style={{flex:1}}/>
              <button className="btn btn-primary" disabled={!(confirmSME&&confirmComp)} onClick={()=>setStep(5)} style={{opacity:(confirmSME&&confirmComp)?1:.5,cursor:(confirmSME&&confirmComp)?'pointer':'not-allowed'}}><Icon name="check" size={15}/>Confirm &amp; ingest</button>
            </div>
          </div>
          ); })()}

        {/* Step 5 — done */}
        {step===5 && (
          <div className="fade-in" style={{textAlign:'center',padding:'14px 0 6px'}}>
            <div style={{width:58,height:58,borderRadius:16,background:'var(--ok-bg)',color:'var(--ok)',display:'grid',placeItems:'center',margin:'0 auto 14px'}}><Icon name="check" size={26}/></div>
            <h3 style={{margin:'0 0 6px',fontSize:18}}>Ingested — <span className="mono">KN-3052</span></h3>
            <p className="muted" style={{maxWidth:'48ch',margin:'0 auto 18px',fontSize:13.5}}>The markdown and chunks were reviewed, then classified and mapped to a demand. It’s been sent for SME and compliance sign-off — Ada will see it once it’s published.</p>
            <div className="card card-pad" style={{maxWidth:420,margin:'0 auto 20px',textAlign:'left'}}>
              {[['Title','Change of address — proof & verification'],['Domain',domain],['Trusted source',trusted||'—'],['Mapped demand',maps.map(m=>DEMAND_LABELS[m]||m).join(', ')||'—'],['Status','In review']].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--line-2)',fontSize:13}}><span className="muted">{r[0]}</span><b style={{fontWeight:600}}>{r[1]}</b></div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button className="btn btn-ghost" onClick={()=>{setStep(0);setSrc(null);}}><Icon name="plus" size={15}/>Add another</button>
              <button className="btn btn-primary" onClick={()=>go('reviews')}>Track in reviews<Icon name="arrowR" size={15}/></button>
            </div>
          </div>
        )}

        {/* nav */}
        {step<3 && (
          <div style={{display:'flex',gap:10,marginTop:24,paddingTop:18,borderTop:'1px solid var(--line-2)'}}>
            {step>0 && <button className="btn btn-ghost" onClick={()=>setStep(s=>s-1)}>Back</button>}
            <div style={{flex:1}}/>
            <button className="btn btn-primary" disabled={step===0&&!src} onClick={()=>setStep(s=>s+1)} style={{opacity:(step===0&&!src)?.5:1}}>
              {step===2?'Process document':'Continue'}<Icon name="arrowR" size={15}/>
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window,{ AddDocument });

</script>

<script type="text/babel">
/* Knowledge page builder + Procedure guide builder */

/* ---------------- PAGE BUILDER ---------------- */
function EditorToolbar(){
  const tools=[['Bold','B'],['Italic','I'],['H','H2'],['list','•'],['link','link']];
  return (
    <div style={{display:'flex',gap:3,padding:'8px 12px',borderBottom:'1px solid var(--line-2)',alignItems:'center'}}>
      <span style={{fontWeight:800,padding:'5px 9px',borderRadius:7,cursor:'pointer',fontSize:13.5}} onMouseEnter={e=>e.currentTarget.style.background='var(--canvas)'} onMouseLeave={e=>e.currentTarget.style.background='none'}>B</span>
      <span style={{fontStyle:'italic',padding:'5px 9px',borderRadius:7,cursor:'pointer',fontSize:13.5}} onMouseEnter={e=>e.currentTarget.style.background='var(--canvas)'} onMouseLeave={e=>e.currentTarget.style.background='none'}>I</span>
      <span style={{fontWeight:700,padding:'5px 9px',borderRadius:7,cursor:'pointer',fontSize:12}} onMouseEnter={e=>e.currentTarget.style.background='var(--canvas)'} onMouseLeave={e=>e.currentTarget.style.background='none'}>H2</span>
      <div style={{width:1,height:18,background:'var(--line)',margin:'0 4px'}}/>
      <span style={{padding:'5px 8px',borderRadius:7,cursor:'pointer',color:'var(--ink-2)',display:'grid',placeItems:'center'}} onMouseEnter={e=>e.currentTarget.style.background='var(--canvas)'} onMouseLeave={e=>e.currentTarget.style.background='none'}><Icon name="list" size={15}/></span>
      <span style={{padding:'5px 8px',borderRadius:7,cursor:'pointer',color:'var(--ink-2)',display:'grid',placeItems:'center'}} onMouseEnter={e=>e.currentTarget.style.background='var(--canvas)'} onMouseLeave={e=>e.currentTarget.style.background='none'}><Icon name="link" size={15}/></span>
      <div style={{flex:1}}/>
      <span className="dotline" style={{fontSize:11.5}}><Icon name="check" size={13} style={{color:'var(--ok)'}}/>Saved</span>
    </div>
  );
}

const KPAGE={id:'DM-131',domain:'Pensions',owner:'Lewis Donaldson',sensitivity:'Internal',site:'Knowledge Store'};

function PagePreview({ snap, onClose }){
  const [mode,setMode]=useState('split');
  if(!snap) return null;
  const md=(()=>{
    const L=['# '+snap.title,'','> '+KPAGE.id+'  ·  '+KPAGE.domain+'  ·  Owner: '+KPAGE.owner,''];
    snap.blocks.forEach(b=>{
      if(b.type==='h2'){ L.push('## '+b.text,''); }
      else if(b.type==='ul'){ b.items.forEach(i=>L.push('- '+i)); L.push(''); }
      else { L.push(b.text,''); }
    });
    return L.join('\n').replace(/\n{3,}/g,'\n\n').trim();
  })();
  const slug=(snap.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''))||'page';
  const lbl={fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,display:'flex',alignItems:'center',gap:6};
  const mdLines=md.split('\n').map((ln,i)=>{
    let cls=''; if(ln.startsWith('# '))cls='md-h1'; else if(ln.startsWith('## '))cls='md-h2'; else if(ln.startsWith('> '))cls='md-q'; else if(ln.startsWith('- '))cls='md-li';
    return <span key={i} className={cls}>{ln+'\n'}</span>;
  });
  const MdPane=(
    <div className="md-pane">
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:14,opacity:.65,fontFamily:'var(--sans)',fontSize:11,letterSpacing:'.04em',textTransform:'uppercase'}}><Icon name="doc" size={13}/>{slug}.md</div>
      {mdLines}
    </div>
  );
  const SpPane=(
    <div className="sp">
      <div className="sp__suite"><span className="sp__waffle">☷</span><span className="sp__suitettl">SharePoint</span><div className="sp__suitesearch">Search this site</div></div>
      <div className="sp__site"><div className="sp__sitelogo">KS</div><span className="sp__sitename">{KPAGE.site}</span><div className="sp__nav"><span className="is-on">Pages</span><span>Documents</span><span>Demands</span></div></div>
      <div className="sp__cmd"><span className="sp__cmdi"><Icon name="edit" size={13}/>Edit</span><span className="sp__cmdi"><Icon name="upload" size={13}/>Share</span><span className="sp__cmdi"><Icon name="check" size={13}/>Published</span><span style={{marginLeft:'auto',color:'#605e5c'}}>Modified just now</span></div>
      <div className="sp__scroll">
        <div className="sp__banner"><div className="sp__bannerttl">{snap.title}</div></div>
        <div className="sp__article">
          <div className="sp__byline"><div className="sp__avatar">LD</div><div><div style={{fontSize:13.5,fontWeight:600,color:'#242424'}}>{KPAGE.owner}</div><div style={{fontSize:12,color:'#605e5c'}}>Published just now · 2 min read · {KPAGE.sensitivity}</div></div></div>
          {snap.blocks.length===0 && <p style={{color:'#a19f9d'}}>This page has no content yet.</p>}
          {snap.blocks.map((b,i)=>{
            if(b.type==='h2') return <h2 key={i}>{b.text}</h2>;
            if(b.type==='ul') return <ul key={i}>{b.items.map((it,j)=><li key={j}>{it}</li>)}</ul>;
            return <p key={i}>{b.text}</p>;
          })}
        </div>
      </div>
    </div>
  );
  return ReactDOM.createPortal(
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" style={{maxWidth:mode==='split'?1180:820,height:'88vh',maxHeight:'88vh'}} onClick={e=>e.stopPropagation()}>
        <div className="modal__head">
          <div className="stat__ico" style={{background:'var(--blue-050)',color:'var(--blue)'}}><Icon name="eye" size={18}/></div>
          <div style={{flex:1,minWidth:0}}><h3 style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>Preview · {snap.title}</h3><div className="muted" style={{fontSize:12}}>The SharePoint page colleagues open vs. the markdown Ada ingests — one source, two surfaces</div></div>
          <div className="seg">
            <button className={mode==='split'?'is-on':''} onClick={()=>setMode('split')}>Compare</button>
            <button className={mode==='sharepoint'?'is-on':''} onClick={()=>setMode('sharepoint')}>SharePoint</button>
            <button className={mode==='markdown'?'is-on':''} onClick={()=>setMode('markdown')}>Markdown</button>
          </div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34,flexShrink:0}}><Icon name="x" size={17}/></button>
        </div>
        <div className="modal__body" style={{padding:14,overflow:'hidden'}}>
          {mode==='split'
            ? <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,height:'100%'}}>
                <div style={{display:'flex',flexDirection:'column',minHeight:0}}><div style={lbl}><Icon name="doc" size={13}/>Markdown · what Ada ingests</div><div style={{flex:1,minHeight:0}}>{MdPane}</div></div>
                <div style={{display:'flex',flexDirection:'column',minHeight:0}}><div style={lbl}><Icon name="globe" size={13}/>SharePoint · what colleagues see</div><div style={{flex:1,minHeight:0}}>{SpPane}</div></div>
              </div>
            : mode==='markdown' ? MdPane : SpPane}
        </div>
        <div className="modal__foot">
          <div className="dotline"><Icon name="refresh" size={14}/>Edits to the page update both surfaces.</div>
          <div style={{flex:1}}/>
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
          <button className="btn btn-primary"><Icon name="upload" size={15}/>Publish to SharePoint</button>
        </div>
      </div>
    </div>
  , document.body);
}

function PageBuilder({ go }){
  const [snap,setSnap]=useState(null);
  const [demand,setDemand]=useState('DM-131');
  const [trusted,setTrusted]=useState('');
  const titleRef=React.useRef(null), bodyRef=React.useRef(null);
  const grab=()=>{
    const title=(titleRef.current&&titleRef.current.value.trim())||'Untitled page';
    const blocks=[];
    const root=bodyRef.current;
    if(root){
      root.childNodes.forEach(n=>{
        if(n.nodeType!==1) return;
        const tag=n.tagName.toLowerCase();
        const text=(n.textContent||'').trim();
        if(tag==='ul'||tag==='ol'){
          const items=[...n.querySelectorAll('li')].map(li=>li.textContent.trim()).filter(Boolean);
          if(items.length) blocks.push({type:'ul',items});
        } else if(!text){ return; }
        else if(tag==='h1'||tag==='h2'||tag==='h3'){ blocks.push({type:'h2',text}); }
        else { blocks.push({type:'p',text}); }
      });
    }
    setSnap({title,blocks});
  };
  return (
    <div className="wrap fade-in" style={{maxWidth:1180}}>
      <div className="page-head">
        <div><h1>New knowledge page</h1><p>Write once — Ada reads it and your colleagues can open the same page. Map it to a demand and a trusted source to keep it clear and compliant.</p></div>
        <div className="actions">
          <button className="btn btn-ghost btn-sm" onClick={()=>go('create')}>Discard</button>
          <button className="btn btn-ghost" onClick={grab}><Icon name="eye" size={15}/>Preview</button>
          <button className="btn btn-primary"><Icon name="upload" size={15}/>Save draft</button>
        </div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1fr 320px',alignItems:'start',gap:18}}>
        {/* editor */}
        <div className="card" style={{overflow:'hidden'}}>
          <div style={{padding:'18px 24px 6px'}}>

function ProcedureBuilder({ go }){

    {type:'key-points',label:'Key points',      icon:'list',   bg:'var(--teal-050)',   fg:'var(--teal)'},
    {type:'example',   label:'Worked example',  icon:'bolt',   bg:'var(--purple-050)', fg:'var(--purple)'},
    {type:'regulatory',label:'Regulatory note', icon:'shield', bg:'var(--warn-bg)',    fg:'var(--warn)'},
  ];

  const addBlock=(type)=>{
    const bt=BLOCK_TYPES.find(b=>b.type===type)||BLOCK_TYPES[0];
    setBlocks(b=>[...b,{id:Date.now(),type,label:bt.label,content:''}]);
  };
  const removeBlock=(id)=>setBlocks(b=>b.filter(x=>x.id!==id));
  const updateBlock=(id,val)=>setBlocks(b=>b.map(x=>x.id===id?{...x,content:val}:x));

  const addQuestion=()=>setQuestions(q=>[...q,{id:Date.now(),q:'',options:['','','',''],correct:0}]);
  const removeQuestion=(id)=>setQuestions(q=>q.filter(x=>x.id!==id));
  const updateQ=(id,val)=>setQuestions(q=>q.map(x=>x.id===id?{...x,q:val}:x));
  const updateOpt=(qid,oi,val)=>setQuestions(q=>q.map(x=>x.id===qid?{...x,options:x.options.map((o,i)=>i===oi?val:o)}:x));
  const setCorrect=(qid,oi)=>setQuestions(q=>q.map(x=>x.id===qid?{...x,correct:oi}:x));

  const learnSugg=[
    {t:'Add a regulatory note',d:'FCA conduct reference',ico:'shield'},
    {t:'Link to procedure PR-318',d:'Verify GAD rate step-by-step',ico:'link'},
    {t:'Simplify the worked example',d:'Use rounder numbers for clarity',ico:'spark'},
  ];
  const assessSugg=[
    {t:'Add a scenario question',d:'Real call-centre situation',ico:'msg'},
    {t:'Increase difficulty',d:'Add an edge-case distractor',ico:'bolt'},
    {t:'Shuffle option order',d:'Reduce pattern guessing',ico:'refresh'},
  ];
  const suggestions=tab==='learn'?learnSugg:assessSugg;
  const [appliedSugg,setAppliedSugg]=useState([]);

  return (
    <div className="wrap fade-in" style={{maxWidth:1180}}>
      <div className="page-head">
        <div><h1>New training module</h1><p>Build a handler learning module — structured content plus a multiple-choice assessment. Linked to the knowledge it covers.</p></div>
        <div className="actions">
          <button className="btn btn-ghost btn-sm" onClick={()=>go('create')}>Discard</button>
          <button className="btn btn-ghost"><Icon name="eye" size={15}/>Preview</button>
          <button className="btn btn-primary"><Icon name="upload" size={15}/>Save draft</button>
        </div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1fr 310px',alignItems:'start',gap:18}}>

        {/* ---- left column ---- */}
        <div style={{display:'grid',gap:14}}>

          {/* Title card */}
          <div className="card card-pad">
            <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Module title</label>
            <input value={title} onChange={e=>setTitle(e.target.value)}
              style={{width:'100%',border:'none',outline:'none',fontFamily:'inherit',fontSize:22,fontWeight:800,letterSpacing:'-.02em',color:'var(--ink)'}}/>
            <div className="dotline" style={{fontSize:12,marginTop:8}}>
              <Icon name="book" size={13} style={{color:'#3a8c35'}}/>
              Pensions · Drawdown · Draft
            </div>
          </div>

          {/* Tab toggle */}
          <div>
            <div className="seg">
              <button className={tab==='learn'?'is-on':''} onClick={()=>setTab('learn')}>
                <Icon name="book" size={13}/> Learning content
              </button>
              <button className={tab==='assess'?'is-on':''} onClick={()=>setTab('assess')}>
                <Icon name="checkCircle" size={13}/> Assessment ({questions.length} questions)
              </button>
            </div>
          </div>

          {/* Learning tab */}
          {tab==='learn' && (
            <div style={{display:'grid',gap:12}}>
              {blocks.map(bl=>{
                const bt=BLOCK_TYPES.find(b=>b.type===bl.type)||BLOCK_TYPES[0];
                return (
                  <div key={bl.id} className="card" style={{overflow:'hidden'}}>
                    <div className="card-head" style={{padding:'11px 16px'}}>
                      <div style={{width:26,height:26,borderRadius:8,background:bt.bg,color:bt.fg,display:'grid',placeItems:'center',flexShrink:0}}>
                        <Icon name={bt.icon} size={13}/>
                      </div>
                      <span style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.05em'}}>{bl.label}</span>
                      <div className="actions">
                        <button onClick={()=>removeBlock(bl.id)} style={{border:'none',background:'none',color:'var(--muted-2)',cursor:'pointer',padding:4,display:'grid',placeItems:'center'}}>
                          <Icon name="x" size={15}/>
                        </button>
                      </div>
                    </div>
                    <div style={{padding:'2px 16px 16px'}}>
                      <textarea value={bl.content} onChange={e=>updateBlock(bl.id,e.target.value)}
                        rows={4} style={{width:'100%',border:'none',outline:'none',resize:'vertical',
                          fontFamily:'inherit',fontSize:14,lineHeight:1.7,color:'var(--ink-2)',background:'transparent'}}/>
                    </div>
                  </div>
                );
              })}
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {BLOCK_TYPES.map(bt=>(
                  <button key={bt.type} className="btn btn-ghost btn-sm" onClick={()=>addBlock(bt.type)}>
                    <Icon name="plus" size={13}/>{bt.label}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Assessment tab */}
          {tab==='assess' && (
            <div style={{display:'grid',gap:12}}>
              {questions.map((q,qi)=>(
                <div key={q.id} className="card card-pad" style={{padding:'18px 20px'}}>
                  <div style={{display:'flex',gap:11,alignItems:'flex-start',marginBottom:14}}>
                    <div style={{width:26,height:26,borderRadius:99,background:'var(--navy)',color:'#fff',
                      display:'grid',placeItems:'center',fontSize:12,fontWeight:700,flexShrink:0,marginTop:2}}>{qi+1}</div>
                    <input value={q.q} onChange={e=>updateQ(q.id,e.target.value)}
                      placeholder="Question text…"
                      style={{flex:1,border:'none',borderBottom:'1.5px solid var(--line)',outline:'none',
                        fontFamily:'inherit',fontSize:14.5,fontWeight:600,color:'var(--ink)',
                        paddingBottom:8,background:'transparent'}}/>
                    <button onClick={()=>removeQuestion(q.id)}
                      style={{border:'none',background:'none',color:'var(--muted-2)',cursor:'pointer',padding:4,flexShrink:0}}>
                      <Icon name="x" size={15}/>
                    </button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    {q.options.map((opt,oi)=>(
                      <div key={oi}
                        style={{display:'flex',alignItems:'center',gap:9,padding:'9px 12px',borderRadius:9,cursor:'pointer',
                          border:`1.5px solid ${q.correct===oi?'var(--ok)':'var(--line)'}`,
                          background:q.correct===oi?'var(--ok-bg)':'#fff',transition:'.12s'}}
                        onClick={()=>setCorrect(q.id,oi)}>
                        <div style={{width:18,height:18,borderRadius:99,flexShrink:0,display:'grid',placeItems:'center',
                          border:`2px solid ${q.correct===oi?'var(--ok)':'var(--line)'}`,
                          background:q.correct===oi?'var(--ok)':'#fff'}}>
                          {q.correct===oi && <Icon name="check" size={10} style={{color:'#fff'}}/>}
                        </div>
                        <input value={opt} onChange={e=>updateOpt(q.id,oi,e.target.value)}
                          placeholder={`Option ${oi+1}`}
                          onClick={e=>e.stopPropagation()}
                          style={{border:'none',outline:'none',fontFamily:'inherit',fontSize:13,
                            color:'var(--ink)',flex:1,background:'transparent'}}/>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <button className="btn btn-ghost" onClick={addQuestion} style={{justifyContent:'center'}}>
                <Icon name="plus" size={15}/>Add question
              </button>
            </div>
          )}
        </div>

        {/* ---- right sidebar ---- */}
        <div style={{display:'grid',gap:18}}>

          {/* Module stats */}
          <div className="card card-pad">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <Icon name="gauge" size={17} style={{color:'var(--teal)'}}/>
              <b style={{fontSize:14}}>Module stats</b>
            </div>
            <div style={{display:'grid',gap:10}}>
              {[
                ['Content blocks', blocks.length, 'var(--blue)'],
                ['Questions',      questions.length, 'var(--teal)'],
                ['Est. completion',`${Math.max(2,blocks.length*2+questions.length)} min`,'var(--purple)'],
                ['Pass mark',      '80%','#3a8c35'],
              ].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:13,alignItems:'center'}}>
                  <span className="muted">{r[0]}</span>
                  <b style={{fontWeight:700,color:r[2],fontVariantNumeric:'tabular-nums'}}>{r[1]}</b>
                </div>
              ))}
            </div>
            <hr className="divider" style={{margin:'14px 0'}}/>
            <div style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',marginBottom:10}}>Knowledge coverage</div>
            {[
              ['KN-2041 · GAD rate assumptions',88],
              ['KN-2038 · Capped drawdown income',72],
              ['PR-318 · Verify GAD rate',60],
            ].map(r=>(
              <div key={r[0]} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:3}}>
                  <span className="muted" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'78%'}}>{r[0]}</span>
                  <span style={{fontWeight:600}}>{r[1]}%</span>
                </div>
                <Meter v={r[1]} tone={r[1]>=80?'green':r[1]>=60?'':'amber'}/>
              </div>
            ))}
          </div>

          {/* Details */}
          <div className="card card-pad">
            <div style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Details</div>
            <div style={{display:'grid',gap:11}}>
              {[
                ['Domain',  'Pensions'],
                ['Audience','Drawdown handlers'],
                ['Owner',   'Lewis Donaldson'],
                ['Pass mark','80%'],
              ].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                  <span className="muted">{r[0]}</span>
                  <b style={{fontWeight:600}}>{r[1]}</b>
                </div>
              ))}
            </div>
            <hr className="divider" style={{margin:'14px 0'}}/>
            <div className="dotline" style={{fontSize:12,marginBottom:12}}>
              <Icon name="shield" size={14} style={{color:'var(--warn)'}}/>
              Publish gate: <b style={{color:'var(--warn)'}}>review required</b>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>go('reviews')}>
              <Icon name="arrowR" size={15}/>Send for review
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window,{ TrainingBuilder });

</script>

<script type="text/babel">
/* Root app */
function App(){
  const REMAP={procedures:'knowledge',advice:'knowledge',measure:'reviews',agentlab:'reviews',arize:'reviews',audit:'reviews','create-procedure':'create-page','create-training':'create-page'};
  const [route,setRoute]=useState(()=>{ const r=localStorage.getItem('csmvp_route')||'home'; return REMAP[r]||r; });
  const [demandNew,setDemandNew]=useState(false);
  const go=(r,opts)=>{ r=REMAP[r]||r; setDemandNew(!!(r==='demand'&&opts&&opts.openNew)); setRoute(r); localStorage.setItem('csmvp_route',r); const c=document.querySelector('.content'); if(c) c.scrollTop=0; };
  const navActive = (route==='upload'||route==='create-doc')?'upload':route.startsWith('create')?'create':route;

  let page;
  switch(route){
    case 'home': page=<Home go={go}/>; break;
    case 'create': page=<CreateHub go={go}/>; break;
    case 'upload': page=<UploadHub go={go}/>; break;
    case 'create-doc': page=<AddDocument go={go}/>; break;
    case 'create-page': page=<PageBuilder go={go}/>; break;
    case 'create-procedure': page=<ProcedureBuilder go={go}/>; break;
    case 'create-training': page=<TrainingBuilder go={go}/>; break;
    case 'knowledge': page=<Knowledge go={go}/>; break;
    case 'demand': page=<Demand go={go} openNew={demandNew}/>; break;
    case 'procedures': page=<Procedures go={go}/>; break;
    case 'advice': page=<AdviceContext go={go}/>; break;
    case 'measure': page=<Measurement go={go}/>; break;
    case 'agentlab': page=<AgentLab go={go}/>; break;
    case 'arize': page=<Arize go={go}/>; break;
    case 'reviews': page=<Reviews go={go}/>; break;
    case 'audit': page=<Audit go={go}/>; break;
    default: page=<Home go={go}/>;
  }

  return (
    <div className="app">
      <Sidebar active={navActive} onNav={go}/>
      <div className="main">
        <Topbar route={route} onNav={go}/>
        <div className="content" key={route}>{page}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
