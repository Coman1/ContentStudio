              <div className="lrow__ico" style={{background:d.tone==='warn'?'var(--warn-bg)':'var(--info-bg)',color:d.tone==='warn'?'var(--warn)':'var(--info)',width:34,height:34,marginTop:2}}><Icon name="msg" size={15}/></div>
              <div className="lrow__main">
                <span style={{fontSize:12.5,color:'var(--ink-2)',fontStyle:'italic',lineHeight:1.45,display:'block'}}>{d.text}</span>
                <div className="dotline" style={{marginTop:7,fontSize:11.5}}><Icon name="bolt" size={12} style={{color:'var(--warn)'}}/>Trigger: {d.trigger}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Handoffs + agents */}
      <div className="grid" style={{gridTemplateColumns:'1fr 1fr',alignItems:'start'}}>
        <div className="card" style={{overflow:'hidden'}}>
          <div className="card-head"><Icon name="branch" size={18} style={{color:'var(--err)'}}/><h3>Escalation to a regulated adviser</h3><span className="sub">when the agent must stop and hand off</span></div>
          {HANDOFFS.map((h,i)=>(
            <div className="lrow" key={i}>
              <div className="lrow__ico" style={{background:'var(--err-bg)',color:'var(--err)',width:34,height:34}}><Icon name="arrowR" size={16}/></div>
              <div className="lrow__main"><b style={{fontSize:13,fontWeight:500}}>{h.q}</b><span>{h.why}</span></div>
              <Tag kind="neutral">{h.to}</Tag>
            </div>
          ))}
        </div>
        <div className="card" style={{overflow:'hidden'}}>
          <div className="card-head"><Icon name="spark" size={18} style={{color:'var(--purple)'}}/><h3>Agents using this layer</h3><span className="sub">applied at retrieval time</span><div className="actions"><button className="btn btn-ghost btn-sm" onClick={()=>go('agentlab')}>Connections<Icon name="arrowR" size={14}/></button></div></div>
          {LAYER_AGENTS.map((a,i)=>(
            <div className="lrow" key={i}>
              <span className="avatar" style={{background:a.oc,width:30,height:30,fontSize:12}}>{a.name[0]}</span>
              <div className="lrow__main"><b style={{fontSize:13.5}}>{a.name}</b><span>{a.full}</span></div>
              <Tag kind={a.tone} dot>{a.state}</Tag>
            </div>
          ))}
          <div style={{padding:'12px 20px',borderTop:'1px solid var(--line-2)'}}>
            <div className="dotline" style={{justifyContent:'center'}}><Icon name="shield" size={14}/>Enforced before publish — sits on top of the platform’s regulated-advice guardrail</div>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window,{ AdviceContext });

</script>

<script type="text/babel">
/* ---- Training Builder ---- */

function TrainingBuilder({ go }){
  const [tab,setTab]=useState('learn');
  const [title,setTitle]=useState('Capped drawdown — handler essentials');
  const [blocks,setBlocks]=useState([
    {id:1,type:'intro',label:'Introduction',content:'This module covers the key rules around capped drawdown income limits and the GAD rate calculation. Complete the assessment at the end to confirm your understanding.'},
    {id:2,type:'key-points',label:'Key points',content:'• Capped drawdown limits income to 150% of the GAD basis amount\n• The GAD rate is set quarterly by HM Treasury\n• Exceeding the limit triggers the money purchase annual allowance (MPAA)'},
    {id:3,type:'example',label:'Worked example',content:'A customer has a £120,000 fund. The GAD basis amount at 3.25% for a 68-year-old is £5,200 per £100,000. Maximum annual income = £5,200 × 1.2 × 150% = £9,360.'},
  ]);
  const [questions,setQuestions]=useState([
    {id:1,q:'What percentage of the GAD basis amount sets the capped drawdown income limit?',options:['100%','125%','150%','175%'],correct:2},
    {id:2,q:'How often is the GAD rate reviewed by HM Treasury?',options:['Monthly','Quarterly','Annually','Every 3 years'],correct:1},
    {id:3,q:'Which allowance is triggered if a customer exceeds the capped drawdown limit?',options:['Annual allowance','Lifetime allowance','Money purchase annual allowance','Tapered annual allowance'],correct:2},
  ]);

  const BLOCK_TYPES=[
    {type:'intro',     label:'Introduction',    icon:'doc',    bg:'var(--blue-050)',   fg:'var(--blue)'},
    {type:'key-points',label:'Key points',      icon:'list',   bg:'var(--teal-050)',   fg:'var(--teal)'},
    {type:'example',   label:'Worked example',  icon:'bolt',   bg:'var(--purple-050)', fg:'var(--purple)'},
    {type:'regulatory',label:'Regulatory note', icon:'shield', bg:'var(--warn-bg)',    fg:'var(--warn)'},
  ];

  const addBlock=(type)=>{
    const bt=BLOCK_TYPES.find(b=>b.type===type)||BLOCK_TYPES[0];
    setBlocks(b=>[...b,{id:Date.now(),type,label:bt.label,content:''}]);
  };
  const removeBlock=(id)=>setBlocks(b=>b.filter(x=>x.id!==id));
  const updateBlock=(id,val)=>setBlocks(b=>b.map(x=>x.id===id?{...x,content:val}:x));

  const addQuestion=()=>setQuestions(q=>[...q,{id:Date.now(),q:'',options:['','','',''],correct:0}]);
  const removeQuestion=(id)=>setQuestions(q=>q.filter(x=>x.id!==id));
  const updateQ=(id,val)=>setQuestions(q=>q.map(x=>x.id===id?{...x,q:val}:x));
  const updateOpt=(qid,oi,val)=>setQuestions(q=>q.map(x=>x.id===qid?{...x,options:x.options.map((o,i)=>i===oi?val:o)}:x));
  const setCorrect=(qid,oi)=>setQuestions(q=>q.map(x=>x.id===qid?{...x,correct:oi}:x));

  const learnSugg=[
    {t:'Add a regulatory note',d:'FCA Consumer Duty reference',ico:'shield'},
    {t:'Link to procedure PR-318',d:'Verify GAD rate step-by-step',ico:'link'},
    {t:'Simplify the worked example',d:'Use rounder numbers for clarity',ico:'spark'},
  ];
  const assessSugg=[
    {t:'Add a scenario question',d:'Real call-centre situation',ico:'msg'},
    {t:'Increase difficulty',d:'Add an edge-case distractor',ico:'bolt'},
    {t:'Shuffle option order',d:'Reduce pattern guessing',ico:'refresh'},
  ];
  const suggestions=tab==='learn'?learnSugg:assessSugg;
  const [appliedSugg,setAppliedSugg]=useState([]);

  return (
    <div className="wrap fade-in" style={{maxWidth:1180}}>
      <div className="page-head">
        <div><h1>New training module</h1><p>Build a handler learning module — structured content plus a multiple-choice assessment. Linked to the knowledge it covers.</p></div>
        <div className="actions">
          <button className="btn btn-ghost btn-sm" onClick={()=>go('create')}>Discard</button>
          <button className="btn btn-ghost"><Icon name="eye" size={15}/>Preview</button>
          <button className="btn btn-primary"><Icon name="upload" size={15}/>Save draft</button>
        </div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1fr 310px',alignItems:'start',gap:18}}>

        {/* ---- left column ---- */}
        <div style={{display:'grid',gap:14}}>

          {/* Title card */}
          <div className="card card-pad">
            <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Module title</label>
            <input value={title} onChange={e=>setTitle(e.target.value)}
              style={{width:'100%',border:'none',outline:'none',fontFamily:'inherit',fontSize:22,fontWeight:800,letterSpacing:'-.02em',color:'var(--ink)'}}/>
            <div className="dotline" style={{fontSize:12,marginTop:8}}>
              <Icon name="book" size={13} style={{color:'#3a8c35'}}/>
              Pensions · Drawdown · Draft
            </div>
          </div>

          {/* Tab toggle */}
          <div>
            <div className="seg">
              <button className={tab==='learn'?'is-on':''} onClick={()=>setTab('learn')}>
                <Icon name="book" size={13}/> Learning content
              </button>
              <button className={tab==='assess'?'is-on':''} onClick={()=>setTab('assess')}>
                <Icon name="checkCircle" size={13}/> Assessment ({questions.length} questions)
              </button>
            </div>
          </div>

          {/* Learning tab */}
          {tab==='learn' && (
            <div style={{display:'grid',gap:12}}>
              {blocks.map(bl=>{
                const bt=BLOCK_TYPES.find(b=>b.type===bl.type)||BLOCK_TYPES[0];
                return (
                  <div key={bl.id} className="card" style={{overflow:'hidden'}}>
                    <div className="card-head" style={{padding:'11px 16px'}}>
                      <div style={{width:26,height:26,borderRadius:8,background:bt.bg,color:bt.fg,display:'grid',placeItems:'center',flexShrink:0}}>
                        <Icon name={bt.icon} size={13}/>
                      </div>
                      <span style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.05em'}}>{bl.label}</span>
                      <div className="actions">
                        <button onClick={()=>removeBlock(bl.id)} style={{border:'none',background:'none',color:'var(--muted-2)',cursor:'pointer',padding:4,display:'grid',placeItems:'center'}}>
                          <Icon name="x" size={15}/>
                        </button>
                      </div>
                    </div>
                    <div style={{padding:'2px 16px 16px'}}>
                      <textarea value={bl.content} onChange={e=>updateBlock(bl.id,e.target.value)}
                        rows={4} style={{width:'100%',border:'none',outline:'none',resize:'vertical',
                          fontFamily:'inherit',fontSize:14,lineHeight:1.7,color:'var(--ink-2)',background:'transparent'}}/>
                    </div>
                  </div>
                );
              })}
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {BLOCK_TYPES.map(bt=>(
                  <button key={bt.type} className="btn btn-ghost btn-sm" onClick={()=>addBlock(bt.type)}>
                    <Icon name="plus" size={13}/>{bt.label}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Assessment tab */}
          {tab==='assess' && (
            <div style={{display:'grid',gap:12}}>
              {questions.map((q,qi)=>(
                <div key={q.id} className="card card-pad" style={{padding:'18px 20px'}}>
                  <div style={{display:'flex',gap:11,alignItems:'flex-start',marginBottom:14}}>
                    <div style={{width:26,height:26,borderRadius:99,background:'var(--navy)',color:'#fff',
                      display:'grid',placeItems:'center',fontSize:12,fontWeight:700,flexShrink:0,marginTop:2}}>{qi+1}</div>
                    <input value={q.q} onChange={e=>updateQ(q.id,e.target.value)}
                      placeholder="Question text…"
                      style={{flex:1,border:'none',borderBottom:'1.5px solid var(--line)',outline:'none',
                        fontFamily:'inherit',fontSize:14.5,fontWeight:600,color:'var(--ink)',
                        paddingBottom:8,background:'transparent'}}/>
                    <button onClick={()=>removeQuestion(q.id)}
                      style={{border:'none',background:'none',color:'var(--muted-2)',cursor:'pointer',padding:4,flexShrink:0}}>
                      <Icon name="x" size={15}/>
                    </button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    {q.options.map((opt,oi)=>(
                      <div key={oi}
                        style={{display:'flex',alignItems:'center',gap:9,padding:'9px 12px',borderRadius:9,cursor:'pointer',
                          border:`1.5px solid ${q.correct===oi?'var(--ok)':'var(--line)'}`,
                          background:q.correct===oi?'var(--ok-bg)':'#fff',transition:'.12s'}}
                        onClick={()=>setCorrect(q.id,oi)}>
                        <div style={{width:18,height:18,borderRadius:99,flexShrink:0,display:'grid',placeItems:'center',
                          border:`2px solid ${q.correct===oi?'var(--ok)':'var(--line)'}`,
                          background:q.correct===oi?'var(--ok)':'#fff'}}>
                          {q.correct===oi && <Icon name="check" size={10} style={{color:'#fff'}}/>}
                        </div>
                        <input value={opt} onChange={e=>updateOpt(q.id,oi,e.target.value)}
                          placeholder={`Option ${oi+1}`}
                          onClick={e=>e.stopPropagation()}
                          style={{border:'none',outline:'none',fontFamily:'inherit',fontSize:13,
                            color:'var(--ink)',flex:1,background:'transparent'}}/>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <button className="btn btn-ghost" onClick={addQuestion} style={{justifyContent:'center'}}>
                <Icon name="plus" size={15}/>Add question
              </button>
            </div>
          )}
        </div>

        {/* ---- right sidebar ---- */}
        <div style={{display:'grid',gap:18}}>

          {/* AI assist */}
          <div className="card" style={{overflow:'hidden'}}>
            <div className="card-head" style={{padding:'14px 16px'}}>
              <Icon name="spark" size={17} style={{color:'var(--purple)'}}/>
              <h3 style={{fontSize:14}}>AI assist</h3>
              <Tag kind="purple" style={{marginLeft:'auto'}}>{tab==='learn'?'Content':'Questions'}</Tag>
            </div>
            <div style={{padding:'6px 0'}}>
              {suggestions.map((s,i)=>(
                <div key={tab+i} className="lrow" style={{padding:'11px 16px',opacity:appliedSugg.includes(tab+i)?.45:1}}>
                  <div className="lrow__ico" style={{background:'var(--purple-050)',color:'var(--purple)',width:30,height:30}}>
                    <Icon name={s.ico} size={14}/>
                  </div>
                  <div className="lrow__main"><b style={{fontSize:12.5}}>{s.t}</b><span style={{fontSize:11}}>{s.d}</span></div>
                  {appliedSugg.includes(tab+i)
                    ? <Icon name="check" size={15} style={{color:'var(--ok)'}}/>
                    : <button className="btn btn-ghost btn-sm" style={{padding:'4px 9px'}}
                        onClick={()=>setAppliedSugg(a=>[...a,tab+i])}>Apply</button>}
                </div>
              ))}
            </div>
          </div>

          {/* Module stats */}
          <div className="card card-pad">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <Icon name="gauge" size={17} style={{color:'var(--teal)'}}/>
              <b style={{fontSize:14}}>Module stats</b>
            </div>
            <div style={{display:'grid',gap:10}}>
              {[
                ['Content blocks', blocks.length, 'var(--blue)'],
                ['Questions',      questions.length, 'var(--teal)'],
                ['Est. completion',`${Math.max(2,blocks.length*2+questions.length)} min`,'var(--purple)'],
                ['Pass mark',      '80%','#3a8c35'],
              ].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:13,alignItems:'center'}}>
                  <span className="muted">{r[0]}</span>
                  <b style={{fontWeight:700,color:r[2],fontVariantNumeric:'tabular-nums'}}>{r[1]}</b>
                </div>
              ))}
            </div>
            <hr className="divider" style={{margin:'14px 0'}}/>
            <div style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',marginBottom:10}}>Knowledge coverage</div>
            {[
              ['KN-2041 · GAD rate assumptions',88],
              ['KN-2038 · Capped drawdown income',72],
              ['PR-318 · Verify GAD rate',60],
            ].map(r=>(
              <div key={r[0]} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:3}}>
                  <span className="muted" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'78%'}}>{r[0]}</span>
                  <span style={{fontWeight:600}}>{r[1]}%</span>
                </div>
                <Meter v={r[1]} tone={r[1]>=80?'green':r[1]>=60?'':'amber'}/>
              </div>
            ))}
          </div>

          {/* Details */}
          <div className="card card-pad">
            <div style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Details</div>
            <div style={{display:'grid',gap:11}}>
              {[
                ['Domain',  'Pensions'],
                ['Audience','Drawdown handlers'],
                ['Owner',   'Priya Sharma'],
                ['Pass mark','80%'],
              ].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                  <span className="muted">{r[0]}</span>
                  <b style={{fontWeight:600}}>{r[1]}</b>
                </div>
              ))}
            </div>
            <hr className="divider" style={{margin:'14px 0'}}/>
            <div className="dotline" style={{fontSize:12,marginBottom:12}}>
              <Icon name="shield" size={14} style={{color:'var(--warn)'}}/>
              Publish gate: <b style={{color:'var(--warn)'}}>review required</b>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>go('reviews')}>
              <Icon name="arrowR" size={15}/>Send for review
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window,{ TrainingBuilder });

</script>

<script type="text/babel">
/* Root app */
function App(){
  const [route,setRoute]=useState(()=>localStorage.getItem('cs_route')||'home');
  const go=(r)=>{ setRoute(r); localStorage.setItem('cs_route',r); const c=document.querySelector('.content'); if(c) c.scrollTop=0; };
  const navActive = route.startsWith('create')?'create':route;

  let page;
  switch(route){
    case 'home': page=<Home go={go}/>; break;
    case 'create': page=<CreateHub go={go}/>; break;
    case 'create-doc': page=<AddDocument go={go}/>; break;
    case 'create-page': page=<PageBuilder go={go}/>; break;
    case 'create-procedure': page=<ProcedureBuilder go={go}/>; break;
    case 'create-training': page=<TrainingBuilder go={go}/>; break;
    case 'knowledge': page=<Knowledge go={go}/>; break;
    case 'demand': page=<Demand go={go}/>; break;
    case 'procedures': page=<Procedures go={go}/>; break;
    case 'advice': page=<AdviceContext go={go}/>; break;
    case 'measure': page=<Measurement go={go}/>; break;
    case 'agentlab': page=<AgentLab go={go}/>; break;
    case 'arize': page=<Arize go={go}/>; break;
    case 'reviews': page=<Reviews go={go}/>; break;
    case 'audit': page=<Audit go={go}/>; break;
    default: page=<Home go={go}/>;
  }

  return (
    <div className="app">
      <Sidebar active={navActive} onNav={go}/>
      <div className="main">
        <Topbar route={route}/>
        <div className="content" key={route}>{page}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
