<style>
/* ============================================================
   Aviva IWR · Content Studio — elevated ION design system
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  /* ---- ION brand ---- */
  --navy:#191D64;          /* primary */
  --navy-deep:#10133f;
  --blue:#0050B5;          /* Aviva action blue (logo) */
  --blue-600:#0a63d6;
  --blue-050:#eaf1fb;
  --yellow:#FFD900;        /* signature */
  --teal:#00596B;          /* secondary */
  --teal-050:#e6f2f4;
  --lightteal:#CDEBEE;     /* surface accent */
  --purple:#6C47FF;        /* Arize */
  --purple-050:#efebff;
  --green-leaf:#5DBB46;    /* Aviva leaf green */

  /* ---- neutrals (cool) ---- */
  --ink:#15172b;
  --ink-2:#3b3f57;
  --muted:#6a6f86;
  --muted-2:#9398ad;
  --line:#e7e9f1;
  --line-2:#eef0f6;
  --surface:#ffffff;
  --canvas:#f4f5fa;
  --canvas-2:#eceef6;

  /* ---- semantic ---- */
  --ok:#138a5a;     --ok-bg:#e6f5ee;
  --warn:#b26a00;   --warn-bg:#fdf2dd;
  --err:#c5364b;    --err-bg:#fce8eb;
  --info:#0050B5;   --info-bg:#eaf1fb;

  /* ---- type ---- */
  --sans:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',monospace;

  /* ---- radius ---- */
  --r-xs:6px; --r-sm:9px; --r-md:13px; --r-lg:18px; --r-xl:24px; --r-pill:999px;

  /* ---- shadow ---- */
  --sh-xs:0 1px 2px rgba(20,22,43,.06);
  --sh-sm:0 1px 3px rgba(20,22,43,.07),0 1px 2px rgba(20,22,43,.04);
  --sh-md:0 4px 14px rgba(20,22,43,.08),0 1px 3px rgba(20,22,43,.05);
  --sh-lg:0 16px 40px rgba(20,22,43,.14),0 4px 10px rgba(20,22,43,.06);
  --sh-nav:0 1px 0 rgba(255,255,255,.04) inset;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;font-family:var(--sans);color:var(--ink);
  background:var(--canvas);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  font-size:15px;line-height:1.5;
}
#root{height:100%}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--yellow);color:var(--navy)}

/* scrollbars */
*::-webkit-scrollbar{width:11px;height:11px}
*::-webkit-scrollbar-thumb{background:#d3d6e3;border-radius:99px;border:3px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:#bcc0d2;background-clip:padding-box}
*::-webkit-scrollbar-track{background:transparent}

/* ============================================================
   App shell
   ============================================================ */
.app{display:grid;grid-template-columns:266px 1fr;height:100%;overflow:hidden}

/* ---- Sidebar ---- */
.side{
  background:linear-gradient(190deg,#191D64 0%,#13163f 70%,#0e1138 100%);
  color:#cdd0ec;display:flex;flex-direction:column;position:relative;
  border-right:1px solid #0c0e30;
}
.side__brand{display:flex;align-items:center;gap:11px;padding:20px 20px 16px}
.side__logo{height:26px;width:auto;display:block;filter:brightness(0) invert(1)}
.side__brandtxt{display:flex;flex-direction:column;line-height:1.05}
.side__brandtxt b{font-size:14.5px;font-weight:700;color:#fff;letter-spacing:-.01em}
.side__brandtxt span{font-size:10.5px;color:#8f93c4;font-weight:500;letter-spacing:.06em;text-transform:uppercase}

.side__scroll{flex:1;overflow-y:auto;padding:6px 12px 12px}
.side__scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14)}
.navgroup{margin-top:14px}
.navgroup__label{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:#7378ac;font-weight:700;padding:0 12px 7px}
.navitem{
  display:flex;align-items:center;gap:11px;padding:8.5px 12px;border-radius:10px;
  color:#bcc0e6;font-size:13.5px;font-weight:500;border:none;background:none;width:100%;text-align:left;
  position:relative;transition:background .12s,color .12s;margin-bottom:1px;white-space:nowrap;
}
.navitem>span:first-of-type{flex:1;overflow:hidden;text-overflow:ellipsis}
.navitem:hover{background:rgba(255,255,255,.06);color:#fff}
.navitem.is-active{background:rgba(255,255,255,.10);color:#fff;font-weight:600}
.navitem.is-active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--yellow)}
.navitem .ico{flex:0 0 18px;color:inherit;opacity:.92}
.navitem__badge{margin-left:auto;font-size:11px;font-weight:700;background:var(--yellow);color:var(--navy);border-radius:99px;padding:1px 7px;min-width:20px;text-align:center}
.navitem__badge.amber{background:#ffb547;color:#3a2400}
.navitem__badge.dot{background:none;padding:0;min-width:0}
.navitem__badge.dot::after{content:"";display:block;width:7px;height:7px;border-radius:99px;background:var(--yellow)}

.side__user{border-top:1px solid rgba(255,255,255,.08);padding:12px;display:flex;align-items:center;gap:11px}
.side__user .av{width:34px;height:34px;border-radius:99px;background:var(--yellow);color:var(--navy);display:grid;place-items:center;font-weight:800;font-size:13px;flex:0 0 auto}
.side__user .meta{line-height:1.15;min-width:0}
.side__user .meta b{display:block;font-size:13px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side__user .meta span{font-size:11px;color:#8f93c4}
.side__user .gear{margin-left:auto;color:#8f93c4;background:none;border:none;display:grid;place-items:center;padding:6px;border-radius:8px}
.side__user .gear:hover{background:rgba(255,255,255,.08);color:#fff}
.side__env-pill{display:inline-flex;align-items:center;gap:5px;margin-top:5px;font-size:10.5px;font-weight:600;color:#7ecfd8;background:rgba(0,89,107,.35);border:1px solid rgba(0,89,107,.5);border-radius:var(--r-pill);padding:3px 8px;white-space:nowrap}
.side__env-dot{width:6px;height:6px;border-radius:99px;background:#7ecfd8;flex:0 0 auto}

/* ---- Main column ---- */
.main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{
  height:62px;flex:0 0 auto;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 26px;z-index:5;
}
.crumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.crumb b{color:var(--ink);font-weight:600}
.crumb .sep{color:var(--muted-2)}
.topbar__search{
  margin-left:8px;flex:0 1 360px;display:flex;align-items:center;gap:9px;
  background:var(--canvas);border:1px solid var(--line);border-radius:var(--r-pill);
  padding:8px 14px;color:var(--muted);font-size:13px;
}
.topbar__search input{border:none;background:none;outline:none;font-family:inherit;font-size:13.5px;color:var(--ink);flex:1;width:100%}
.topbar__search kbd{font-family:var(--mono);font-size:11px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--muted)}
.topbar__spacer{flex:1}
.iconbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;color:var(--ink-2);position:relative}
.iconbtn:hover{background:var(--canvas);color:var(--navy)}
.iconbtn .ndot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:99px;background:var(--err);border:2px solid #fff}
.env-pill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--teal);background:var(--teal-050);border:1px solid #cce3e7;border-radius:var(--r-pill);padding:5px 12px}
.env-pill .d{width:7px;height:7px;border-radius:99px;background:var(--teal)}

/* ---- content scroll ---- */
.content{flex:1;overflow-y:auto;padding:26px 30px 60px;scroll-behavior:smooth}
.wrap{max-width:1240px;margin:0 auto}

/* ============================================================
   Primitives
   ============================================================ */
.page-head{display:flex;align-items:flex-end;gap:20px;margin-bottom:22px}
.page-head h1{font-size:25px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px;color:var(--ink)}
.page-head p{margin:0;color:var(--muted);font-size:14px;max-width:64ch}
.page-head .actions{margin-left:auto;display:flex;gap:10px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:8px;border-radius:10px;border:1px solid transparent;
  font-weight:600;font-size:13.5px;padding:9px 15px;transition:.12s;white-space:nowrap}
.btn .ico{flex:0 0 auto}
.btn-primary{background:var(--navy);color:#fff;box-shadow:var(--sh-xs)}
.btn-primary:hover{background:#23288a}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-600)}
.btn-ghost{background:#fff;color:var(--ink-2);border-color:var(--line)}
.btn-ghost:hover{background:var(--canvas);color:var(--navy);border-color:#d8dbe9}
.btn-yellow{background:var(--yellow);color:var(--navy)}
.btn-yellow:hover{background:#ffe23d}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.btn-icon-only{padding:9px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm)}
.card-pad{padding:20px}
.card-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line-2)}
.card-head h3{margin:0;font-size:15px;font-weight:700;letter-spacing:-.01em}
.card-head .sub{font-size:12.5px;color:var(--muted);font-weight:500}
.card-head .actions{margin-left:auto;display:flex;gap:8px;align-items:center}

.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;border-radius:var(--r-pill);padding:3px 9px;line-height:1.4;white-space:nowrap}
.tag .d{width:6px;height:6px;border-radius:99px;background:currentColor}
.tag-ok{color:var(--ok);background:var(--ok-bg)}
.tag-warn{color:var(--warn);background:var(--warn-bg)}
.tag-err{color:var(--err);background:var(--err-bg)}
.tag-info{color:var(--info);background:var(--info-bg)}
.tag-purple{color:var(--purple);background:var(--purple-050)}
.tag-teal{color:var(--teal);background:var(--teal-050)}
.tag-neutral{color:var(--ink-2);background:var(--canvas-2)}
.tag-navy{color:#fff;background:var(--navy)}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--ink-2);
  background:#fff;border:1px solid var(--line);border-radius:var(--r-pill);padding:5px 11px}
.chip.is-on{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip:hover:not(.is-on){border-color:#cfd3e4;background:var(--canvas)}

.kpi{font-family:var(--mono);font-weight:600}
.mono{font-family:var(--mono)}
.muted{color:var(--muted)}
.divider{height:1px;background:var(--line-2);border:none;margin:0}

/* progress / meter */
.meter{height:7px;border-radius:99px;background:var(--canvas-2);overflow:hidden}
.meter>i{display:block;height:100%;border-radius:99px;background:var(--blue)}
.meter.teal>i{background:var(--teal)}
.meter.green>i{background:var(--ok)}
.meter.amber>i{background:#e89b2a}
.meter.purple>i{background:var(--purple)}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:1}
.tbl td{padding:13px 16px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .1s}
.tbl tbody tr:hover{background:var(--canvas)}
.tbl .row-click{cursor:pointer}

/* stat tile */
.stat{display:flex;flex-direction:column;gap:6px}
.stat__top{display:flex;align-items:center;gap:9px}
.stat__ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
.stat__val{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1;font-family:var(--sans)}
.stat__label{font-size:12.5px;color:var(--muted);font-weight:500}
.stat__delta{font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.delta-up{color:var(--ok)} .delta-down{color:var(--err)} .delta-flat{color:var(--muted)}

.grid{display:grid;gap:18px}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1180px){.g-4{grid-template-columns:repeat(2,1fr)}.g-3{grid-template-columns:repeat(2,1fr)}}

.avatar{width:28px;height:28px;border-radius:99px;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex:0 0 auto}

/* segmented */
.seg{display:inline-flex;background:var(--canvas-2);border-radius:10px;padding:3px;gap:2px}
.seg button{border:none;background:none;font-size:12.5px;font-weight:600;color:var(--muted);padding:6px 13px;border-radius:8px}
.seg button.is-on{background:#fff;color:var(--navy);box-shadow:var(--sh-xs)}

/* link list rows */
.lrow{display:flex;align-items:center;gap:13px;padding:13px 20px;border-bottom:1px solid var(--line-2);transition:background .1s}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:var(--canvas)}
.lrow__ico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
.lrow__main{min-width:0;flex:1}
.lrow__main b{font-size:13.5px;font-weight:600;display:block;letter-spacing:-.01em}
.lrow__main span{font-size:12px;color:var(--muted)}

/* alert banner */
.alertbar{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--r-md);border:1px solid;position:relative;overflow:hidden}
.alertbar__ico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
.alertbar.err{background:linear-gradient(90deg,#fdf0f2,#fff);border-color:#f3cdd4}
.alertbar.warn{background:linear-gradient(90deg,#fef6e8,#fff);border-color:#f3e0b8}
.alertbar.purple{background:linear-gradient(90deg,#f1edff,#fff);border-color:#ddd4fb}

/* flow / timeline pills */
.flow{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:4px}
.flow__step{flex:0 0 auto;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:13px 15px;position:relative}
.flow__step .n{font-family:var(--mono);font-size:11px;color:var(--muted-2);font-weight:600}
.flow__step b{display:block;font-size:13.5px;font-weight:700;margin:2px 0 3px;letter-spacing:-.01em}
.flow__step span{font-size:11.5px;color:var(--muted);display:block;line-height:1.35}
.flow__arrow{flex:0 0 28px;display:grid;place-items:center;color:var(--muted-2)}
.flow__step.is-active{border-color:var(--navy);box-shadow:0 0 0 3px rgba(25,29,100,.08)}
.flow__step.done{background:var(--ok-bg);border-color:#bfe6d2}
.flow__step.done .tagdot{position:absolute;top:11px;right:11px;color:var(--ok)}

/* node graph (relationship) */
.relnode{border:1.5px solid var(--line);border-radius:var(--r-md);padding:11px 13px;background:#fff;min-width:0}
.relnode b{font-size:12.5px;font-weight:700;display:block;letter-spacing:-.01em}
.relnode span{font-size:11px;color:var(--muted)}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px}
.tabs button{border:none;background:none;font-size:13.5px;font-weight:600;color:var(--muted);padding:11px 14px;position:relative;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button:hover{color:var(--ink)}
.tabs button.is-on{color:var(--navy);border-bottom-color:var(--navy)}

/* drawer */
.drawer-scrim{position:fixed;inset:0 0 0 266px;background:rgba(17,19,45,.34);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:580px;max-width:calc(100% - 266px);background:var(--canvas);box-shadow:var(--sh-lg);z-index:41;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer__head{background:#fff;border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:flex-start;gap:12px}
.drawer__body{flex:1;overflow-y:auto;padding:22px}
.drawer__foot{border-top:1px solid var(--line);background:#fff;padding:14px 22px;display:flex;gap:10px;align-items:center}

/* misc */
.dotline{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}
.spark{display:flex;align-items:flex-end;gap:3px;height:34px}
.spark i{flex:1;background:var(--blue);border-radius:2px 2px 0 0;opacity:.85;min-height:3px}
.fade-in{animation:fade .32s ease}
@keyframes fade{from{transform:translateY(7px)}to{transform:none}}

</style>

      {d.split('M').filter(Boolean).map((seg,i)=><path key={i} d={'M'+seg}/>)}
    </svg>
  );
}

/* ---------- Small primitives ---------- */
function Tag({ kind='neutral', dot, children }){
  return <span className={'tag tag-'+kind}>{dot&&<i className="d"/>}{children}</span>;
}
function Avatar({ name, color }){
  const init = name.split(' ').map(w=>w[0]).slice(0,2).join('');
  return <span className="avatar" style={{background:color||'var(--navy)'}}>{init}</span>;
}
function Meter({ v, tone='', className='' }){
  return <div className={'meter '+tone+' '+className}><i style={{width:Math.max(0,Math.min(100,v))+'%'}}/></div>;
}
function Stat({ icon, iconbg, iconfg, val, label, delta, deltaDir }){
  return (

<script type="text/babel">
/* Knowledge Owner Home */

function ThreadStrip({ go }){
  return (
    <div className="card" style={{overflow:'hidden'}}>
      <div className="card-head">
        <Icon name="branch" size={18} style={{color:'var(--purple)'}}/>
        <h3>Live thread · GAD rate change</h3>
        <span className="sub">one event, every layer</span>
        <div className="actions">
          <Tag kind="purple" dot>tracing in Arize AX</Tag>
          <button className="btn btn-ghost btn-sm" onClick={()=>go('measure')}>Follow<Icon name="arrowR" size={14}/></button>
        </div>
      </div>
      <div style={{padding:'16px 20px'}}>
        <div className="flow">
          {THREAD.map((s,i)=>(
            <React.Fragment key={s.n}>
              <div className={'flow__step '+(s.state==='done'?'done':s.state==='active'?'is-active':'')}>
                {s.state==='done' && <span className="tagdot"><Icon name="check" size={15}/></span>}
                <span className="n">{s.n} · {s.area}</span>
                <b>{s.t}</b>
                <span>{s.d}</span>
              </div>
              {i<THREAD.length-1 && <div className="flow__arrow"><Icon name="chevR" size={16}/></div>}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

function PriorityRow({ t, onGo }){
  const toneIco = { err:['var(--err)','var(--err-bg)'], warn:['var(--warn)','var(--warn-bg)'], info:['var(--info)','var(--info-bg)'] }[t.tone];
  return (
    <div className="lrow">
      <div className="lrow__ico" style={{background:toneIco[1],color:toneIco[0]}}><Icon name={t.ico} size={18}/></div>
      <div className="lrow__main">
        <b>{t.title}</b>
        <span>{t.meta}</span>
      </div>
      <button className="btn btn-ghost btn-sm" onClick={onGo}>{t.cta}<Icon name="arrowR" size={14}/></button>
    </div>
  );
}

function RepoCard({ icon, color, bg, title, count, sub, meterv, tone, onGo }){
  return (
    <button className="card card-pad" style={{textAlign:'left',display:'block',width:'100%',cursor:'pointer'}} onClick={onGo}>
      <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:14}}>
        <div className="stat__ico" style={{background:bg,color}}><Icon name={icon} size={18}/></div>
        <div style={{flex:1}}><b style={{fontSize:14,letterSpacing:'-.01em'}}>{title}</b></div>
        <Icon name="arrowR" size={16} style={{color:'var(--muted-2)'}}/>
      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:8}}>
        <span style={{fontSize:26,fontWeight:800,letterSpacing:'-.02em'}}>{count}</span>
        <span className="muted" style={{fontSize:12.5}}>{sub}</span>
      </div>
      <Meter v={meterv} tone={tone}/>
    </button>
  );
}

/* freshness ring — time since last review vs cadence */
function FreshRing({ days, cadence }){
  const r=46, c=2*Math.PI*r;
  const pct=Math.min(100, days/cadence*100);
  const over=days>cadence;
  const col=over?'var(--err)':days>cadence*0.7?'var(--warn)':'var(--ok)';
  return (
    <div style={{position:'relative',width:120,height:120,flexShrink:0}}>
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r={r} fill="none" stroke="var(--canvas-2)" strokeWidth="11"/>
        <circle cx="60" cy="60" r={r} fill="none" stroke={col} strokeWidth="11" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c*(1-pct/100)} transform="rotate(-90 60 60)"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontSize:30,fontWeight:800,letterSpacing:'-.03em',color:col,lineHeight:1}}>{days}</span>
        <span className="muted" style={{fontSize:10.5,fontWeight:600}}>days since</span>
      </div>
    </div>
  );
}

function ReviewDue({ go }){
  const d=REVIEW_DUE, over=d.daysAgo-d.cadence;
  return (
    <div className="card" style={{overflow:'hidden',border:'1px solid #f3cdd4'}}>
      <div className="card-head" style={{background:'linear-gradient(90deg,#fdf0f2,#fff)',borderBottom:'1px solid #f3e0e3'}}>
        <Icon name="clock" size={18} style={{color:'var(--err)'}}/>
        <h3>Review due</h3>
        <span className="sub">overdue by {over} days</span>
      </div>
      <div className="card-pad" style={{display:'flex',gap:18,alignItems:'center'}}>
        <FreshRing days={d.daysAgo} cadence={d.cadence}/>
        <div style={{flex:1,minWidth:0}}>
          <div className="mono" style={{fontSize:11,color:'var(--muted-2)'}}>{d.id} · {d.version}</div>
          <b style={{fontSize:15,letterSpacing:'-.01em',display:'block',margin:'3px 0 6px'}}>{d.title}</b>
          <div className="dotline" style={{fontSize:12,marginBottom:4}}><Icon name="shield" size={13} style={{color:'var(--err)'}}/>{d.reason}</div>
          <div className="dotline" style={{fontSize:12}}><Icon name="pulse" size={13} style={{color:'var(--purple)'}}/>{d.impact}</div>
        </div>
      </div>
      <div style={{padding:'0 20px 16px',display:'flex',gap:10}}>
        <button className="btn btn-blue btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>go('knowledge')}><Icon name="edit" size={14}/>Review now</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>go('knowledge')}>Snooze</button>
      </div>
    </div>
  );
}

function Home({ go }){
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div>
          <h1>Good morning, Chris</h1>
          <p>You own <b>Pensions</b> knowledge. There are <b>4 things</b> that need your attention today.</p>
        </div>
        <div className="actions">

}
function statusTag(s){
  const map={live:['ok','live'],review:['warn','in review'],conflict:['err','conflict'],stale:['warn','stale']};

}

<script type="text/babel">
/* Demand Identification */

function StatusTag({ s }){
  if(s==='documented') return <Tag kind="ok" dot>Documented</Tag>;
  if(s==='draft') return <Tag kind="warn" dot>Draft</Tag>;
  if(s==='needs-review') return <Tag kind="err" dot>Needs review</Tag>;
  return <Tag kind="neutral">Unknown</Tag>;
}

function AreaPill({ areaId }){
  const a = DEMAND_AREAS.find(x=>x.id===areaId);
  if(!a) return null;
  const kind = areaId==='generic'?'neutral':areaId==='equity-release'?'teal':areaId==='my-money'?'purple':areaId==='pensions'?'info':'warn';
  return <Tag kind={kind}>{a.name}</Tag>;
}

                {relatedDemands.map(rd=>(
                  <div className="lrow" key={rd.id} style={{padding:'11px 16px',cursor:'default'}}>

/* ---- Main page ---- */
function Demand({ go }){
  const [sel,setSel]=useState(null);
  const [areaFilter,setAreaFilter]=useState('all');
  const [statusFilter,setStatusFilter]=useState('all');
  const [search,setSearch]=useState('');

  const areaCounts = useMemo(()=>{
    const c = {};
    DEMAND_AREAS.forEach(a=>c[a.id]=0);
    DEMANDS.forEach(d=>{ if(c[d.area]!==undefined) c[d.area]++; });
    return c;
  },[]);

  const rows = useMemo(()=>{
    return DEMANDS.filter(d=>{
      if(areaFilter!=='all'&&d.area!==areaFilter) return false;
      if(statusFilter==='documented'&&d.status!=='documented') return false;
      if(statusFilter==='draft'&&d.status!=='draft') return false;
      if(statusFilter==='needs-review'&&d.status!=='needs-review') return false;
      if(search){
        const s=search.toLowerCase();
        if(!d.name.toLowerCase().includes(s)&&!d.id.toLowerCase().includes(s)&&!d.desc.toLowerCase().includes(s)) return false;
      }
      return true;
    });
  },[areaFilter,statusFilter,search]);

  const documented = DEMANDS.filter(d=>d.status==='documented').length;
  const drafts = DEMANDS.filter(d=>d.status==='draft').length;
  const needsReview = DEMANDS.filter(d=>d.status==='needs-review').length;

  return (
    <div className="wrap fade-in">

        <div className="card card-pad"><Stat icon="warn" iconbg="var(--err-bg)" iconfg="var(--err)" val={needsReview} label="Needs review"/></div>
      </div>

      {/* Area cards */}

      <div className="grid" style={{gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:24}}>
        {DEMAND_AREAS.map(a=>(
          <AreaCard
            key={a.id}
            area={a}
            count={areaCounts[a.id]||0}
            isActive={areaFilter===a.id}
            onClick={()=>setAreaFilter(areaFilter===a.id?'all':a.id)}
          />
        ))}
      </div>

      {/* Demands table card */}
      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head" style={{flexWrap:'wrap',gap:10}}>
          <div className="seg">
            {[['all','All'],['documented','Documented'],['draft','Draft'],['needs-review','Needs review']].map(([k,l])=>(
              <button key={k} className={statusFilter===k?'is-on':''} onClick={()=>setStatusFilter(k)}>{l}</button>
            ))}
          </div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
            {areaFilter!=='all' && (
              <button className="chip is-on" onClick={()=>setAreaFilter('all')} style={{gap:4}}>
                {(DEMAND_AREAS.find(a=>a.id===areaFilter)||{}).name}
                <Icon name="x" size={13}/>

<script type="text/babel">
/* Procedure Repository */

const PROC_STEPS = {

    {t:'Confirm customer identity and plan type', k:'KN-1990', note:'Capped drawdown only — flexi-access uses a different path'},
    {t:'Retrieve the current-quarter GAD rate', k:'KN-2041', affected:true, note:'Rate changed 2.75% → 3.25% — pending re-publish'},
    {t:'Calculate the maximum income (150% of GAD basis amount)', k:'KN-2038', note:'Conflict: source files disagree on basis'},
    {t:'Check the requested increase against the cap', k:null},
    {t:'Confirm no MPAA or tax-relief implications', k:'KN-1944'},
    {t:'Record the instruction and effective date', k:null},
    {t:'Confirm the outcome to the customer in writing', k:null},

};
function stepsFor(p){
  if(PROC_STEPS[p.id]) return PROC_STEPS[p.id];

function ImpactRow({ r }){

<script type="text/babel">
/* Agent connections (formerly Agent lab) */

function Switch({ on, onClick }){
  return <button onClick={onClick} style={{width:38,height:22,borderRadius:99,border:'none',padding:2,background:on?'var(--ok)':'#cfd3e4',transition:'.15s',display:'inline-flex'}}>
    <span style={{width:18,height:18,borderRadius:99,background:'#fff',transform:on?'translateX(16px)':'none',transition:'.15s',boxShadow:'var(--sh-xs)'}}/>
  </button>;
}

const KIND_TONE={'Retrieval':'info','Intent match':'teal','Reference':'neutral','Execution check':'purple','Procedure':'purple','Grounding':'warn'};

function ConnCell({ kind }){
  if(!kind) return <span style={{color:'var(--muted-2)'}}>—</span>;
  return <Tag kind={KIND_TONE[kind]||'neutral'} dot>{kind}</Tag>;
}

/* ---- secondary: Playground ---- */
function Playground(){
  const [qk,setQk]=useState('q1');
  const [phase,setPhase]=useState('idle');
  const q=PLAYGROUND[qk];
  const run=()=>{ setPhase('running'); setTimeout(()=>setPhase('done'),900); };
  useEffect(()=>{ setPhase('idle'); },[qk]);
  const statusTone = q.status==='ok'?'ok':q.status==='low'?'err':'warn';
  return (
    <div className="grid" style={{gridTemplateColumns:'1fr 340px',alignItems:'start',gap:18}}>
      <div style={{display:'grid',gap:16}}>
        <div className="card card-pad">
          <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Ask Ada a question</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
            {Object.entries(PLAYGROUND).map(([k,v])=>(<button key={k} className={'chip'+(qk===k?' is-on':'')} onClick={()=>setQk(k)} style={{maxWidth:'100%'}}>{v.q}</button>))}
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center',background:'var(--canvas)',border:'1px solid var(--line)',borderRadius:12,padding:'12px 14px'}}>
            <Icon name="msg" size={18} style={{color:'var(--purple)'}}/>
            <span style={{flex:1,fontSize:14,color:'var(--ink)'}}>{q.q}</span>
            <button className="btn btn-primary btn-sm" onClick={run} disabled={phase==='running'}>{phase==='running'?<React.Fragment><Icon name="refresh" size={14}/>Running…</React.Fragment>:<React.Fragment><Icon name="play" size={14}/>Run</React.Fragment>}</button>
          </div>
        </div>
        {phase==='done' && (
          <div className="card fade-in" style={{overflow:'hidden'}}>
            <div className="card-head"><Icon name="spark" size={18} style={{color:'var(--purple)'}}/><h3>Ada response</h3><div className="actions"><Tag kind={statusTone} dot>{q.status==='ok'?'grounded':q.status==='gap'?'knowledge gap':'low confidence'}</Tag><span className="dotline" style={{fontSize:11.5}}><Icon name="clock" size={13}/>{q.latency}ms</span></div></div>
            <div className="card-pad" style={{display:'grid',gap:16}}>
              <p style={{margin:0,fontSize:14.5,lineHeight:1.6,color:'var(--ink)'}}>{q.answer}</p>
              <div style={{display:'flex',gap:18,alignItems:'center'}}>
                <div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5}}><span className="muted">Answer confidence</span><b className="mono" style={{color:q.conf>=80?'var(--ok)':q.conf>=60?'var(--warn)':'var(--err)'}}>{q.conf}%</b></div><Meter v={q.conf} tone={q.conf>=80?'green':q.conf>=60?'amber':''}/></div>
                <div style={{textAlign:'center'}}><div className="muted" style={{fontSize:12}}>Groundedness</div><Tag kind={q.guard==='passed'?'ok':'err'} dot>{q.guard}</Tag></div>
              </div>
              <div className="alertbar" style={{border:'1px solid var(--line)',background:'var(--canvas)',padding:'11px 14px'}}><Icon name="warn" size={17} style={{color:statusTone==='ok'?'var(--ok)':'var(--warn)',flexShrink:0}}/><span style={{fontSize:12.5,color:'var(--ink-2)'}}>{q.note}</span></div>
            </div>
          </div>
        )}
        {phase==='idle' && <div className="card card-pad" style={{textAlign:'center',padding:'40px',color:'var(--muted)'}}><Icon name="play" size={26} style={{marginBottom:8}}/><div style={{fontSize:13.5}}>Pick a question and press Run to see how a connected agent answers from your content.</div></div>}
        {phase==='running' && <div className="card card-pad" style={{textAlign:'center',padding:'40px',color:'var(--purple)'}}><Icon name="refresh" size={26} style={{marginBottom:8}}/><div style={{fontSize:13.5}}>Retrieving knowledge, generating, checking guardrails…</div></div>}
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head"><Icon name="sliders" size={18}/><h3>Agent config · Ada</h3></div>
        <div className="card-pad" style={{display:'grid',gap:14}}>
          {[['Knowledge scope','Pensions + Wealth'],['Retrieval','Top 6 · rerank on'],['Model','gpt-4o · temp 0.2'],['Confidence gate','70%'],['Persona','Customer assistant']].map(r=>(<div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span className="muted">{r[0]}</span><b style={{fontWeight:600}}>{r[1]}</b></div>))}
          <hr className="divider"/><button className="btn btn-ghost btn-sm" style={{justifyContent:'center'}}><Icon name="edit" size={14}/>Edit configuration</button>
        </div>
      </div>
    </div>
  );
}

/* ---- secondary: Guardrails ---- */
function GuardrailsTab(){
  const [rails,setRails]=useState(GUARDRAILS.map(g=>g.on));
  return (
    <div className="card" style={{overflow:'hidden'}}>
      <div className="card-head"><Icon name="shield" size={18}/><h3>Guardrails</h3><span className="sub">applied to every connected agent</span><div className="actions"><button className="btn btn-ghost btn-sm"><Icon name="plus" size={14}/>New guardrail</button></div></div>
      {GUARDRAILS.map((g,i)=>(
        <div key={g.name} className="lrow">
          <div className="lrow__ico" style={{background:rails[i]?'var(--ok-bg)':'var(--canvas-2)',color:rails[i]?'var(--ok)':'var(--muted)',width:36,height:36}}><Icon name="shield" size={17}/></div>
          <div className="lrow__main"><b style={{fontSize:13.5}}>{g.name}</b><span>{g.desc}</span></div>
          <Tag kind="neutral">{g.type}</Tag>
          <span className="dotline" style={{fontSize:11.5,minWidth:70}}><b className="mono" style={{color:g.trips?'var(--warn)':'var(--muted)'}}>{g.trips}</b> trips</span>
          <Switch on={rails[i]} onClick={()=>setRails(r=>r.map((v,j)=>j===i?!v:v))}/>
        </div>
      ))}
    </div>

}

function AgentLab({ go }){
  const [tab,setTab]=useState('conn');
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div><h1>Agent connections</h1><p>Every AI agent that consumes your knowledge — what each one is connected to, and how. One source of truth, many agents.</p></div>
        <div className="actions"><span className="env-pill"><i className="d"/>6 live · 1 planned</span></div>
      </div>
      <div className="tabs">
        {[['conn','Connections'],['play','Test an agent'],['guard','Guardrails']].map(([k,l])=>(
          <button key={k} className={tab===k?'is-on':''} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      {tab==='conn'&&<Connections go={go}/>}
      {tab==='play'&&<Playground/>}
      {tab==='guard'&&<GuardrailsTab/>}
    </div>
  );
}

Object.assign(window,{ AgentLab });

</script>

<script type="text/babel">
/* Arize AX */

const KIND_COLOR = { io:'#9398ad', embed:'var(--blue)', retrieve:'var(--teal)', rerank:'var(--navy)', guard:'#e89b2a', llm:'var(--purple)' };

function Waterfall(){
  const total = Math.max(...SPANS.map(s=>s.start+s.dur));
  return (
    <div style={{display:'grid',gap:7}}>
      {SPANS.map((s,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:188,flexShrink:0,fontSize:12.5,display:'flex',alignItems:'center',gap:7}}>
            <span style={{width:8,height:8,borderRadius:2,background:s.trip?'var(--err)':KIND_COLOR[s.kind],flexShrink:0}}/>
            <span style={{color:s.trip?'var(--err)':'var(--ink)',fontWeight:s.trip?700:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</span>
          </div>
          <div style={{flex:1,position:'relative',height:22,background:'var(--canvas)',borderRadius:6}}>
            <div style={{position:'absolute',left:(s.start/total*100)+'%',width:Math.max(1.5,s.dur/total*100)+'%',top:3,bottom:3,borderRadius:5,
              background:s.trip?'var(--err)':KIND_COLOR[s.kind],opacity:s.trip?1:.9,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:5}}>
            </div>
            <span style={{position:'absolute',left:'calc('+(s.start/total*100)+'% + '+Math.max(1.5,s.dur/total*100)+'%)',top:3,marginLeft:6,fontSize:10.5,color:'var(--muted)',fontFamily:'var(--mono)'}}>{s.dur}ms</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function Arize({ go }){
  const sTone={breach:'err',ok:'ok'};
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div><h1>Arize AX</h1><p>Production observability for Ada — LLM tracing, hallucination detection, guardrail trips and human annotation. This is where step 07 of the GAD thread lands.</p></div>
        <div className="actions"><Tag kind="purple" dot>2 monitors breached</Tag><button className="btn btn-ghost"><Icon name="external" size={15}/>Open in Arize</button></div>
      </div>

      {/* monitors */}
      <div className="grid g-4" style={{marginBottom:18}}>
        {MONITORS.map(m=>(
          <div key={m.name} className="card card-pad">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div><div style={{fontSize:23,fontWeight:800,letterSpacing:'-.02em',color:m.state==='breach'?'var(--err)':'var(--ink)'}}>{m.val}</div><div className="muted" style={{fontSize:12}}>{m.name}</div></div>
              <Tag kind={sTone[m.state]} dot>{m.state==='breach'?'breach':'ok'}</Tag>
            </div>
            <Spark data={m.trend} color={m.state==='breach'?'var(--err)':'var(--purple)'}/>
            <div className="muted mono" style={{fontSize:10.5,marginTop:6}}>threshold {m.thr}</div>
          </div>
        ))}
      </div>

      {/* waterfall */}
      <div className="card" style={{overflow:'hidden',marginBottom:18}}>
        <div className="card-head">
          <Icon name="pulse" size={18} style={{color:'var(--purple)'}}/>
          <h3>Trace · trc_9f2a</h3>
          <span className="sub mono">“What income can I take from capped drawdown?”</span>
          <div className="actions"><Tag kind="err" dot>guardrail tripped</Tag><span className="dotline" style={{fontSize:11.5}}><Icon name="clock" size={13}/>1,204ms total</span></div>
        </div>
        <div className="card-pad"><Waterfall/></div>
        <div style={{padding:'12px 20px',borderTop:'1px solid var(--line-2)'}} className="dotline"><Icon name="warn" size={14} style={{color:'var(--err)'}}/><span>Groundedness guardrail tripped on the LLM output — the answer cited a GAD rate not supported by the (conflicting) retrieved knowledge. <b style={{color:'var(--purple)',cursor:'pointer'}} onClick={()=>go('measure')}>Root cause → KN-2041 conflict.</b></span></div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1.3fr 1fr',alignItems:'start'}}>
        {/* trace list */}
        <div className="card" style={{overflow:'hidden'}}>
          <div className="card-head"><Icon name="list" size={18}/><h3>Recent traces</h3><span className="sub">live from production</span></div>
          <table className="tbl">
            <thead><tr><th>Trace</th><th>Question</th><th>Conf</th><th>Latency</th><th>Status</th></tr></thead>
            <tbody>
              {TRACES.map(t=>(
                <tr key={t.id} className="row-click">
                  <td><span className="mono" style={{fontSize:12}}>{t.id}</span></td>
                  <td><span style={{fontSize:13}}>{t.q}</span><div className="muted" style={{fontSize:11}}>{t.when}</div></td>
                  <td><b className="mono" style={{color:t.conf>=80?'var(--ok)':t.conf>=60?'var(--warn)':'var(--err)'}}>{t.conf}%</b></td>
                  <td><span className="mono" style={{fontSize:12}}>{t.latency}</span></td>
                  <td><Tag kind={t.status==='ok'?'ok':t.status==='gap'?'warn':'err'} dot>{t.status==='ok'?'ok':t.status==='gap'?'gap':'halluc'}</Tag></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* annotations */}
        <div className="card" style={{overflow:'hidden'}}>
          <div className="card-head"><Icon name="users" size={18} style={{color:'var(--purple)'}}/><h3>Annotation queue</h3><span className="sub">human review</span></div>
          {ANNOTATIONS.map(a=>(
            <div key={a.id} className="lrow" style={{alignItems:'flex-start'}}>
              <div className="lrow__ico" style={{background:'var(--purple-050)',color:'var(--purple)',width:34,height:34}}><Icon name="eye" size={16}/></div>
              <div className="lrow__main"><b style={{fontSize:13}}>{a.q}</b><span>{a.label}</span></div>
              <div style={{textAlign:'right',flexShrink:0}}><div className="mono" style={{fontSize:10.5,color:'var(--muted-2)'}}>{a.id}</div><span style={{fontSize:11,color:a.who==='Unassigned'?'var(--warn)':'var(--muted)'}}>{a.who}</span></div>
            </div>
          ))}
          <div style={{padding:'12px 20px',borderTop:'1px solid var(--line-2)'}}><button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center'}}>Open review queue<Icon name="arrowR" size={14}/></button></div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window,{ Arize });

</script>

<script type="text/babel">
/* Governance — Reviews & sign-off + Audit log */

function stageBadge(stage){
  const map={'SME review':'info','Compliance':'warn','Approved':'ok','Published':'teal'};
  return <Tag kind={map[stage]||'neutral'} dot>{stage}</Tag>;
}

function ReviewDrawer({ r, onClose }){
  if(!r) return null;
  return (
    <React.Fragment>
      <div className="drawer-scrim open" onClick={onClose}/>

        <div className="drawer__head">
          <div className="stat__ico" style={{background:'var(--blue-050)',color:'var(--blue)'}}><Icon name="shield" size={19}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><span className="mono" style={{fontSize:11.5,color:'var(--muted)'}}>{r.id}</span>{stageBadge(r.stage)}{r.gate==='held'&&<Tag kind="err" dot>gate held</Tag>}</div>
            <h3 style={{margin:'3px 0 0',fontSize:17,letterSpacing:'-.02em'}}>{r.title}</h3>
          </div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34}}><Icon name="x" size={17}/></button>
        </div>
        <div className="drawer__body" style={{display:'grid',gap:18}}>
          <div className="card card-pad" style={{display:'flex',gap:18}}>
            <div><div className="muted" style={{fontSize:11.5}}>Type</div><b>{r.type}</b></div>
            <div><div className="muted" style={{fontSize:11.5}}>Submitted by</div><div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}><span className="avatar" style={{background:r.oc,width:22,height:22,fontSize:10}}>{r.by.split(' ').map(w=>w[0]).join('')}</span><b style={{fontWeight:600}}>{r.by}</b></div></div>
            <div><div className="muted" style={{fontSize:11.5}}>SME</div><b style={{fontWeight:600}}>{r.sme}</b></div>
          </div>

            <div><b style={{fontSize:13}}>SME portal — no platform account needed</b><div className="muted" style={{fontSize:12.5,marginTop:2}}>The subject-matter expert reviews via a secure email link and approves in-browser. Their decision is captured in the trail below.</div></div>

            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:14}}>Sign-off trail</div>
            <div style={{display:'grid',gap:0}}>
              {REVIEW_TRAIL.map((e,i)=>{

                  <div key={i} style={{display:'flex',gap:13,paddingBottom:i<REVIEW_TRAIL.length-1?14:0}}>

                      {i<REVIEW_TRAIL.length-1&&<div style={{width:2,flex:1,minHeight:18,background:'var(--line)',marginTop:3}}/>}
                    </div>
                    <div style={{paddingTop:2}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}><b style={{fontSize:13.5}}>{e.who}</b><Tag kind="neutral">{e.role}</Tag></div>
                      <div style={{fontSize:12.5,color:'var(--ink-2)',margin:'3px 0'}}>{e.act}</div>
                      <div className="muted mono" style={{fontSize:11}}>{e.when}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        <div className="drawer__foot">
          <button className="btn btn-ghost"><Icon name="download" size={15}/>Export for FCA</button>
          <div style={{flex:1}}/>
          <button className="btn btn-ghost">Request changes</button>
          <button className="btn btn-primary"><Icon name="check" size={16}/>Sign off</button>
        </div>
      </aside>
    </React.Fragment>
  );
}

function Reviews({ go }){
  const [sel,setSel]=useState(null);
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div><h1>Reviews & sign-off</h1><p>Structured review workflows with SME input and compliance sign-off — every published change carries an exportable FCA audit trail.</p></div>
        <div className="actions"><button className="btn btn-primary"><Icon name="plus" size={16}/>New review</button></div>
      </div>
      <div className="grid g-4" style={{marginBottom:18}}>
        <div className="card card-pad"><Stat icon="shield" iconbg="var(--blue-050)" iconfg="var(--blue)" val="3" label="In review"/></div>
        <div className="card card-pad"><Stat icon="users" iconbg="var(--info-bg)" iconfg="var(--info)" val="2" label="Awaiting SME"/></div>
        <div className="card card-pad"><Stat icon="lock" iconbg="var(--warn-bg)" iconfg="var(--warn)" val="1" label="Awaiting compliance"/></div>
        <div className="card card-pad"><Stat icon="checkCircle" iconbg="var(--ok-bg)" iconfg="var(--ok)" val="18" label="Published this month"/></div>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head"><Icon name="shield" size={18}/><h3>Review queue</h3></div>
        <table className="tbl">
          <thead><tr><th>Item</th><th>Type</th><th>Owner</th><th>SME</th><th>Stage</th><th>Gate</th><th></th></tr></thead>
          <tbody>
            {REVIEWS.map(r=>(
              <tr key={r.id} className="row-click" onClick={()=>setSel(r)}>
                <td><div style={{display:'flex',alignItems:'center',gap:10}}><span className="mono" style={{fontSize:11,color:'var(--muted-2)'}}>{r.id}</span><b style={{fontSize:13.5}}>{r.title}</b></div></td>
                <td><Tag kind="neutral">{r.type}</Tag></td>
                <td><div style={{display:'flex',alignItems:'center',gap:7}}><span className="avatar" style={{background:r.oc,width:24,height:24,fontSize:10}}>{r.by.split(' ').map(w=>w[0]).join('')}</span><span style={{fontSize:12.5}}>{r.by.split(' ')[0]}</span></div></td>
                <td><span style={{fontSize:12.5,color:r.sme.includes('Pending')?'var(--warn)':'var(--ink)'}}>{r.sme}</span></td>
                <td>{stageBadge(r.stage)}</td>
                <td>{r.gate==='passed'?<Tag kind="ok" dot>passed</Tag>:r.gate==='held'?<Tag kind="err" dot>held</Tag>:r.gate==='pending'?<Tag kind="warn" dot>pending</Tag>:<span className="muted">—</span>}</td>
                <td><Icon name="chevR" size={16} style={{color:'var(--muted-2)'}}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <ReviewDrawer r={sel} onClose={()=>setSel(null)}/>
    </div>
  );
}

function Audit({ go }){
  const [f,setF]=useState('All');
  const rows=AUDIT.filter(a=>f==='All'||a.domain===f);
  const actionTone={'publish.blocked':'err','alert.raised':'err','content.published':'ok','review.signed':'ok','access.granted':'info'};
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div><h1>Audit log</h1><p>Immutable record of every action across the platform — who changed what, when, and the evaluation gate that governed it.</p></div>
        <div className="actions"><button className="btn btn-ghost"><Icon name="download" size={16}/>Export</button></div>
      </div>
      <div className="alertbar" style={{border:'1px solid var(--line)',background:'#fff',marginBottom:18}}>
        <div className="alertbar__ico" style={{background:'var(--teal-050)',color:'var(--teal)'}}><Icon name="lock" size={18}/></div>
        <div style={{flex:1}}><b style={{fontSize:13.5}}>Immutable · 7-year retention · Entra ID identity</b><div className="muted" style={{fontSize:12.5}}>Entries are write-once and hash-chained. Sensitivity tiers and publish gates are recorded for FCA audit.</div></div>
        <Tag kind="teal" dot>tamper-evident</Tag>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head"><Icon name="lock" size={18}/><h3>Activity</h3><div className="actions">{['All','Pensions','Wealth'].map(x=><button key={x} className={'chip'+(f===x?' is-on':'')} onClick={()=>setF(x)}>{x}</button>)}</div></div>
        <table className="tbl">
          <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Entity</th><th>Domain</th><th>Sensitivity</th><th>Hash</th></tr></thead>
          <tbody>
            {rows.map((a,i)=>(
              <tr key={i}>
                <td><span className="mono" style={{fontSize:12,color:'var(--muted)'}}>{a.time}</span></td>
                <td><b style={{fontSize:13,fontWeight:600}}>{a.actor}</b></td>
                <td><span className="mono" style={{fontSize:12,color:actionTone[a.action]==='err'?'var(--err)':actionTone[a.action]==='ok'?'var(--ok)':'var(--ink-2)'}}>{a.action}</span></td>
                <td><span className="mono" style={{fontSize:12}}>{a.entity}</span></td>
                <td>{a.domain==='—'?<span className="muted">—</span>:<Tag kind={a.domain==='Pensions'?'info':'purple'}>{a.domain}</Tag>}</td>
                <td>{a.sens==='—'?<span className="muted">—</span>:<Tag kind={a.sens==='Restricted'?'warn':'neutral'}>{a.sens}</Tag>}</td>
                <td><span className="mono" style={{fontSize:11.5,color:'var(--muted-2)'}}>{a.hash}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

Object.assign(window,{ Reviews, Audit });

</script>

              <div className="lrow__main"><b style={{fontSize:13.5}}>{d.title}</b><span>{d.type} · {d.id} · edited {d.edited}</span></div>
              <div style={{width:90}}><div className="muted" style={{fontSize:11,textAlign:'right',marginBottom:3}}>{d.pct}%</div><Meter v={d.pct} tone="green"/></div>

          {[['Regulatory knowledge page','doc','var(--blue)'],['Customer journey procedure','list','var(--purple)'],['FAQ / quick answer','msg','var(--teal)'],['Handler assessment quiz','book','#3a8c35']].map((t,i)=>(

            <div key={i} className="lrow" style={{cursor:'pointer'}} onClick={()=>go(t[1]==='book'?'create-training':'create-page')}>

<script type="text/babel">
/* Add a document — multi-step ingestion wizard */

const STEPS = ['Source','File','Classify','Process','Done'];
const PIPELINE = [
  {k:'Extract text', icon:'doc'},
  {k:'Detect metadata', icon:'tag'},
  {k:'Chunk · 1,000 tokens', icon:'layers'},
  {k:'Generate embeddings', icon:'spark'},
  {k:'Quality & readability', icon:'gauge'},
  {k:'Evaluation gate', icon:'shield'},
];

function Stepper({ step }){
  return (
    <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:24}}>
      {STEPS.map((s,i)=>(
        <React.Fragment key={s}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:28,height:28,borderRadius:99,display:'grid',placeItems:'center',fontSize:12.5,fontWeight:700,
              background:i<step?'var(--ok)':i===step?'var(--navy)':'var(--canvas-2)',color:i<=step?'#fff':'var(--muted)'}}>
              {i<step?<Icon name="check" size={14}/>:i+1}</div>
            <span style={{fontSize:13,fontWeight:i===step?700:500,color:i===step?'var(--ink)':'var(--muted)'}}>{s}</span>
          </div>
          {i<STEPS.length-1 && <div style={{flex:1,height:2,background:i<step?'var(--ok)':'var(--line)',margin:'0 12px',minWidth:24}}/>}
        </React.Fragment>
      ))}
    </div>
  );
}

function AddDocument({ go }){
  const [step,setStep]=useState(0);
  const [src,setSrc]=useState(null);
  const [file,setFile]=useState('GAD-rates-2025-Q2.pdf');
  const [domain,setDomain]=useState('Pensions');
  const [sens,setSens]=useState('Internal');
  const [maps,setMaps]=useState(['DM-117','DM-118']);
  const [prog,setProg]=useState(-1); // pipeline index

  useEffect(()=>{
    if(step!==3) return;
    setProg(0);
    const t=setInterval(()=>{
      setProg(p=>{ if(p>=PIPELINE.length-1){ clearInterval(t); setTimeout(()=>setStep(4),700); return p; } return p+1; });
    },650);
    return ()=>clearInterval(t);
  },[step]);

  const sources=[
    {id:'sp-modern',name:'SharePoint (Modern)',desc:'Connected · 4 libraries',icon:'globe'},
    {id:'sp-classic',name:'SharePoint (Classic)',desc:'Connected · 2 sites',icon:'globe'},
    {id:'pdf',name:'PDF document',desc:'Upload from your device',icon:'doc'},
    {id:'word',name:'Word document',desc:'Upload from your device',icon:'doc'},
  ];

  return (
    <div className="wrap fade-in" style={{maxWidth:860}}>
      <div className="page-head"><div><h1>Add a document</h1><p>Bring an existing file into the knowledge store. We extract, classify and run it through the eval gate before it reaches Ada.</p></div>
        <div className="actions"><button className="btn btn-ghost btn-sm" onClick={()=>go('create')}><Icon name="x" size={14}/>Cancel</button></div></div>

      <div className="card card-pad" style={{padding:'24px 26px'}}>
        <Stepper step={step}/>

        {/* Step 0 — source */}
        {step===0 && (
          <div className="fade-in">
            <h3 style={{margin:'0 0 14px',fontSize:15}}>Where is the document coming from?</h3>
            <div className="grid g-2">
              {sources.map(s=>(
                <button key={s.id} className="card card-pad" onClick={()=>setSrc(s.id)} style={{textAlign:'left',cursor:'pointer',border:src===s.id?'1.5px solid var(--navy)':'1px solid var(--line)',boxShadow:src===s.id?'0 0 0 3px rgba(25,29,100,.08)':'var(--sh-sm)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:11}}>
                    <div style={{width:38,height:38,borderRadius:10,background:'var(--canvas-2)',color:'var(--navy)',display:'grid',placeItems:'center'}}><Icon name={s.icon} size={18}/></div>
                    <div style={{flex:1}}><b style={{fontSize:13.5,display:'block'}}>{s.name}</b><span className="muted" style={{fontSize:12}}>{s.desc}</span></div>
                    {src===s.id&&<Icon name="checkCircle" size={18} style={{color:'var(--navy)'}}/>}
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 1 — file */}
        {step===1 && (
          <div className="fade-in">
            <h3 style={{margin:'0 0 14px',fontSize:15}}>Select the file</h3>
            <div style={{border:'2px dashed var(--line)',borderRadius:14,padding:'30px',textAlign:'center',background:'var(--canvas)',marginBottom:16}}>
              <div style={{width:46,height:46,borderRadius:12,background:'#fff',border:'1px solid var(--line)',display:'grid',placeItems:'center',margin:'0 auto 10px',color:'var(--blue)'}}><Icon name="upload" size={22}/></div>
              <b style={{fontSize:14}}>Drop a file here</b>
              <div className="muted" style={{fontSize:12.5}}>PDF, Word or selected SharePoint library · max 25MB</div>
            </div>
            <div className="card" style={{overflow:'hidden'}}>
              <div className="lrow" style={{background:'var(--blue-050)'}}>
                <div className="lrow__ico" style={{background:'#fff',color:'var(--blue)',width:36,height:36}}><Icon name="doc" size={17}/></div>
                <div className="lrow__main"><b style={{fontSize:13.5}}>{file}</b><span>1.2 MB · selected from {src&&src.startsWith('sp')?'SharePoint':'upload'}</span></div>
                <Tag kind="info" dot>ready</Tag>
              </div>
            </div>
          </div>
        )}

        {/* Step 2 — classify */}
        {step===2 && (
          <div className="fade-in" style={{display:'grid',gap:18}}>
            <h3 style={{margin:0,fontSize:15}}>Classify the content</h3>
            <div>
              <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Title</label>
              <input defaultValue="GAD interest rate assumptions — Q2 2025" style={{width:'100%',padding:'10px 13px',border:'1px solid var(--line)',borderRadius:10,fontFamily:'inherit',fontSize:14}}/>
            </div>
            <div className="grid g-2">
              <div>
                <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Domain</label>
                <div style={{display:'flex',gap:8}}>{['Pensions','Wealth'].map(d=><button key={d} className={'chip'+(domain===d?' is-on':'')} onClick={()=>setDomain(d)}>{d}</button>)}</div>
              </div>
              <div>
                <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Owner</label>
                <div className="chip" style={{cursor:'default'}}><span className="avatar" style={{background:'var(--blue)',width:20,height:20,fontSize:9}}>PS</span>Priya Sharma</div>
              </div>
            </div>
            <div>
              <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Sensitivity</label>
              <div style={{display:'flex',gap:8}}>{['Internal','Restricted','Highly Restricted'].map(s=><button key={s} className={'chip'+(sens===s?' is-on':'')} onClick={()=>setSens(s)}>{s}</button>)}</div>
            </div>
            <div>
              <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Map to demand <span className="muted" style={{fontWeight:400}}>· helps Ada retrieve it</span></label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {['DM-117','DM-118','DM-112'].map(d=><button key={d} className={'chip'+(maps.includes(d)?' is-on':'')} onClick={()=>setMaps(m=>m.includes(d)?m.filter(x=>x!==d):[...m,d])}>{maps.includes(d)&&<Icon name="check" size={12}/>}{d}</button>)}
              </div>
            </div>
          </div>
        )}

        {/* Step 3 — process */}
        {step===3 && (
          <div className="fade-in">
            <h3 style={{margin:'0 0 16px',fontSize:15}}>Processing “{file}”</h3>
            <div style={{display:'grid',gap:10}}>
              {PIPELINE.map((p,i)=>{
                const state=i<prog?'done':i===prog?'run':'todo';
                const last=i===PIPELINE.length-1;
                return (
                  <div key={p.k} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:11,border:'1px solid '+(state==='run'?'var(--navy)':'var(--line)'),background:state==='todo'?'var(--canvas)':'#fff'}}>
                    <div style={{width:32,height:32,borderRadius:9,display:'grid',placeItems:'center',flexShrink:0,
                      background:state==='done'?(last?'var(--warn-bg)':'var(--ok-bg)'):state==='run'?'var(--blue-050)':'var(--canvas-2)',
                      color:state==='done'?(last?'var(--warn)':'var(--ok)'):state==='run'?'var(--blue)':'var(--muted-2)'}}>
                      <Icon name={state==='done'?(last?'warn':'check'):p.icon} size={16}/>
                    </div>
                    <b style={{flex:1,fontSize:13.5,color:state==='todo'?'var(--muted)':'var(--ink)'}}>{p.k}</b>
                    {state==='run'&&<span className="dotline" style={{fontSize:12,color:'var(--blue)'}}><Icon name="refresh" size={14}/>running</span>}
                    {state==='done'&&!last&&<Tag kind="ok" dot>done</Tag>}
                    {state==='done'&&last&&<Tag kind="warn" dot>1 conflict</Tag>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Step 4 — done */}
        {step===4 && (
          <div className="fade-in" style={{textAlign:'center',padding:'14px 0 6px'}}>
            <div style={{width:58,height:58,borderRadius:16,background:'var(--warn-bg)',color:'var(--warn)',display:'grid',placeItems:'center',margin:'0 auto 14px'}}><Icon name="warn" size={26}/></div>
            <h3 style={{margin:'0 0 6px',fontSize:18}}>Saved as draft — <span className="mono">KN-2051</span></h3>
            <p className="muted" style={{maxWidth:'46ch',margin:'0 auto 18px',fontSize:13.5}}>The document was ingested and classified, but the eval gate found it <b>conflicts with KN-2038</b> on the GAD rate. It’s held as a draft until you resolve the conflict — Ada won’t see it yet.</p>
            <div className="card card-pad" style={{maxWidth:420,margin:'0 auto 20px',textAlign:'left'}}>
              {[['Title','GAD interest rate assumptions — Q2 2025'],['Domain',domain],['Sensitivity',sens],['Mapped demand',maps.join(', ')||'—'],['Status','Draft · conflict']].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--line-2)',fontSize:13}}><span className="muted">{r[0]}</span><b style={{fontWeight:600}}>{r[1]}</b></div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button className="btn btn-ghost" onClick={()=>{setStep(0);setSrc(null);}}><Icon name="plus" size={15}/>Add another</button>
              <button className="btn btn-primary" onClick={()=>go('knowledge')}>Resolve conflict in editor<Icon name="arrowR" size={15}/></button>
            </div>
          </div>
        )}

        {/* nav */}
        {step<3 && (
          <div style={{display:'flex',gap:10,marginTop:24,paddingTop:18,borderTop:'1px solid var(--line-2)'}}>
            {step>0 && <button className="btn btn-ghost" onClick={()=>setStep(s=>s-1)}>Back</button>}
            <div style={{flex:1}}/>
            <button className="btn btn-primary" disabled={step===0&&!src} onClick={()=>setStep(s=>s+1)} style={{opacity:(step===0&&!src)?.5:1}}>
              {step===2?'Process document':'Continue'}<Icon name="arrowR" size={15}/>
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window,{ AddDocument });

</script>
