            </div>
          )}

          {/* metadata tiles */}
          <div className="grid g-4" style={{gap:10}}>
            <MetaTile label="Domain">
              {edit
                ? <div style={{display:'flex',flexWrap:'wrap',gap:5}}>{['Generic',...new Set(DOMAIN_TREE.flatMap(dv=>dv.areas.flatMap(a=>a.depts)))].map(d=><button key={d} className={'chip'+(form.domain===d?' is-on':'')} style={{fontSize:11,padding:'3px 8px'}} onClick={()=>set('domain',d)}>{d}</button>)}</div>
                : domainTag(k.domain)}
            </MetaTile>
            <MetaTile label="Sensitivity">
              {edit
                ? <div style={{display:'flex',flexWrap:'wrap',gap:5}}>{['Internal','Restricted','Highly Restricted'].map(s=><button key={s} className={'chip'+(form.sens===s?' is-on':'')} style={{fontSize:11,padding:'3px 8px'}} onClick={()=>set('sens',s)}>{s}</button>)}</div>
                : sensTag(k.sens)}
            </MetaTile>
            <MetaTile label="Review status">
              <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-start'}}>{reviewTag(k.reviewState)}<span style={{fontSize:11.5,color:'var(--muted)'}}>Next · {String(k.nextReview).replace('Overdue · ','')}</span></div>
            </MetaTile>
            <MetaTile label="Linked to">
              <span className="dotline" style={{fontSize:12.5}}><Icon name="target" size={14} style={{color:'var(--teal)'}}/>{k.demands}<Icon name="list" size={14} style={{color:'var(--purple)',marginLeft:8}}/>{k.procs}</span>
            </MetaTile>
          </div>

          {/* properties panel */}
          <div className="card card-pad" style={{display:'grid',gap:edit?14:11}}>
            <div style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Properties</div>
            {edit ? (
              <React.Fragment>
                <div className="grid g-2" style={{gap:12}}>
                  <div><label style={lbl}>Owner</label><input value={form.owner} onChange={e=>set('owner',e.target.value)} style={fld}/></div>
                  <div><label style={lbl}>Source of truth</label><input value={form.source} onChange={e=>set('source',e.target.value)} style={fld}/></div>
                </div>
                <div className="grid g-2" style={{gap:12}}>
                  <div><label style={lbl}>Review cycle</label>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{['Monthly','Quarterly','Half-yearly','Annual'].map(c=><button key={c} className={'chip'+(form.reviewCycle===c?' is-on':'')} style={{fontSize:11,padding:'4px 9px'}} onClick={()=>set('reviewCycle',c)}>{c}</button>)}</div>
                  </div>
                  <div><label style={lbl}>Category</label><input defaultValue={k.category} style={fld}/></div>
                </div>
                <div><label style={lbl}>Summary</label><textarea value={form.summary} onChange={e=>set('summary',e.target.value)} rows={3} style={{...fld,resize:'vertical',lineHeight:1.5}}/></div>
              </React.Fragment>
            ) : (
              [['Owner',<span style={{display:'inline-flex',alignItems:'center',gap:7}}><Avatar name={k.owner} color={k.oc}/><b style={{fontWeight:600}}>{k.owner}</b></span>],
               ['Owning team',k.owned],['Source of truth',k.source],['Category',k.category],
               ['Review cycle',k.reviewCycle],['Next review',<b style={{fontWeight:600,color:String(k.nextReview).includes('Overdue')?'var(--err)':'var(--ink)'}}>{k.nextReview}</b>],
               ['Last updated',k.updated]].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13}}><span className="muted">{r[0]}</span><span style={{textAlign:'right'}}>{r[1]}</span></div>
              ))
            )}
            {!edit && k.tags && <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:2}}>{k.tags.map(t=><span key={t} className="chip" style={{fontSize:11,padding:'3px 9px',cursor:'default'}}><Icon name="tag" size={11}/>{t}</span>)}</div>}
          </div>

          {/* tabbed: content / versions / links */}
          <div className="tabs" style={{marginTop:-2}}>
            {[['content','Content'],['versions','Version history'],['links','Linked items']].map(t=>(
              <button key={t[0]} className={tab===t[0]?'is-on':''} onClick={()=>setTab(t[0])}>{t[1]}</button>
            ))}
          </div>

          {tab==='content' && (
            <div className="card" style={{overflow:'hidden'}}>
              <div className="card-head" style={{padding:'11px 16px'}}>
                <Icon name="doc" size={16} style={{color:'var(--blue)'}}/><h3 style={{fontSize:13.5}}>Article body</h3>
                <div className="actions"><span className="dotline" style={{fontSize:11.5}}>{edit?<React.Fragment><Icon name="edit" size={13} style={{color:'var(--blue)'}}/>editing</React.Fragment>:<React.Fragment><Icon name="check" size={13} style={{color:'var(--ok)'}}/>{k.version} · published view</React.Fragment>}</span></div>
              </div>
              <div contentEditable={edit} suppressContentEditableWarning
                style={{padding:'16px 20px 22px',fontSize:13.5,lineHeight:1.65,color:'var(--ink-2)',outline:edit?'2px solid rgba(10,99,214,.18)':'none',outlineOffset:-2,background:edit?'#fcfcff':'#fff'}}>
                <p style={{margin:'0 0 14px',fontSize:13.5,color:'var(--ink-2)'}}><b style={{color:'var(--ink)'}}>Summary — </b>{form.summary}</p>
                {(k.sections||[]).map((s,i)=>(
                  <div key={i} style={{marginBottom:i<k.sections.length-1?16:0}}>
                    <h2 style={{fontSize:15,color:'var(--ink)',margin:'0 0 6px'}}>{s.h}</h2>
                    <p style={{margin:0}}>{s.p}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab==='versions' && (
            <div className="card" style={{overflow:'hidden'}}>
              {(k.history||[]).map((h,i)=>(
                <div key={i} className="lrow" style={{padding:'12px 16px',cursor:'default',alignItems:'flex-start'}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,marginTop:2}}>
                    <span className="mono" style={{fontSize:11,fontWeight:700,color:i===0?'var(--blue)':'var(--muted)',background:i===0?'var(--blue-050)':'var(--canvas-2)',borderRadius:6,padding:'2px 7px'}}>{h.v}</span>
                  </div>
                  <div className="lrow__main"><b style={{fontSize:13}}>{h.note}</b><span>{h.who} · {h.date}</span></div>
                  {i===0?<Tag kind="info" dot>current</Tag>:<button className="btn btn-ghost btn-sm" style={{padding:'4px 9px'}}><Icon name="refresh" size={13}/>Restore</button>}
                </div>
              ))}
            </div>
          )}

          {tab==='links' && (
            <div style={{display:'grid',gap:14}}>
              <div>
                <div style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:9,display:'flex',justifyContent:'space-between'}}>Demands answered<span style={{color:'var(--muted-2)'}}>{linkedDemands.length}</span></div>
                <div className="card" style={{overflow:'hidden'}}>
                  {linkedDemands.map(d=>(
                    <div className="lrow" key={d.id} style={{padding:'11px 16px',cursor:'pointer'}} onClick={()=>{onClose();go('demand');}}>
                      <div className="lrow__ico" style={{background:'var(--teal-050)',color:'var(--teal)',width:32,height:32}}><Icon name="target" size={16}/></div>
                      <div className="lrow__main"><b style={{fontSize:13}}>{d.name}</b><span>{d.id} · {d.volume}</span></div>
                      <Icon name="chevR" size={15} style={{color:'var(--muted-2)'}}/>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:9,display:'flex',justifyContent:'space-between'}}>Procedures<span style={{color:'var(--muted-2)'}}>{(k.linkedProcs||[]).length}</span></div>
                <div className="card" style={{overflow:'hidden'}}>
                  {(k.linkedProcs||[]).map(pid=>(
                    <div className="lrow" key={pid} style={{padding:'11px 16px',cursor:'pointer'}} onClick={()=>{onClose();go('procedures');}}>
                      <div className="lrow__ico" style={{background:'var(--purple-050)',color:'var(--purple)',width:32,height:32}}><Icon name="list" size={16}/></div>
                      <div className="lrow__main"><b style={{fontSize:13}}>Work instruction</b><span>{pid}</span></div>
                      <Icon name="chevR" size={15} style={{color:'var(--muted-2)'}}/>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>

        <div className="drawer__foot">
          {edit
            ? <React.Fragment><button className="btn btn-ghost" onClick={()=>setEdit(false)}>Cancel</button><div style={{flex:1}}/><button className="btn btn-blue" onClick={()=>{setEdit(false);window.toast('Changes saved','ok', k.title+' · draft updated');}}><Icon name="check" size={16}/>Save changes</button><button className="btn btn-primary" onClick={()=>{setEdit(false);window.toast('Sent for review','ok','Entered the sign-off pipeline');go('reviews');}}><Icon name="arrowR" size={15}/>Save &amp; send for review</button></React.Fragment>
            : <React.Fragment>
                <button className="btn btn-primary" onClick={()=>setEdit(true)}><Icon name="edit" size={16}/>Edit content</button>
                <button className="btn btn-ghost" onClick={()=>window.toast('New version started','info', 'Draft v-next created from '+k.version)}><Icon name="branch" size={15}/>New version</button>
                <div style={{flex:1}}/>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setEdit(true);window.toast('Editing in drawer','info','Full editor opens inline');}}><Icon name="external" size={14}/>Open full editor</button>
              </React.Fragment>}
        </div>
      </aside>
    </React.Fragment>
  );
}

/* Domains of knowledge — horizontal panel: how much knowledge sits in each business area. */
function DomainsBar({ sel, onSelect }){
  const isOn=(kind,value)=> sel.kind===kind && (value===undefined?true:sel.value===value);
  const deptsOf=dv=>dv.areas.flatMap(a=>a.depts).filter((d,i,arr)=>arr.indexOf(d)===i);
  return (
    <div className="card" style={{overflow:'hidden',marginBottom:18}}>
      <div className="card-head">
        <Icon name="layers" size={18} style={{color:'var(--navy)'}}/>
        <h3 style={{margin:0,fontSize:15}}>Domains of knowledge</h3>
        <span className="sub" style={{color:'var(--muted)',fontSize:12.5}}>Assets held in each business area — select to filter</span>
        <div className="actions"><span className="mono" style={{fontSize:12,color:'var(--muted)'}}>{KNOWLEDGE.length} assets</span></div>
      </div>
      <div className="card-pad" style={{display:'flex',flexWrap:'wrap',gap:'16px 26px',alignItems:'flex-start'}}>
        <div style={{display:'flex',gap:7}}>
          <button className={'domchip'+(isOn('all')?' is-on':'')} onClick={()=>onSelect({kind:'all'})}><Icon name="grid" size={13}/>All knowledge<i>{KNOWLEDGE.length}</i></button>
          <button className={'domchip'+(isOn('generic')?' is-on':'')} onClick={()=>onSelect({kind:'generic'})}><Icon name="globe" size={13}/>Generic<i>{domCount(['Generic'])}</i></button>
        </div>
        {DOMAIN_TREE.map(dv=>(
          <div key={dv.id} style={{display:'flex',flexDirection:'column',gap:8,minWidth:0}}>
            <button className={'domchip'+(isOn('division',dv.id)?' is-on':'')} onClick={()=>onSelect({kind:'division',value:dv.id})} style={{fontWeight:700,alignSelf:'flex-start'}}>
              <span className="domdot" style={{background:dv.tone}}/>{dv.name}<i>{domCount(deptsOf(dv))}</i>
            </button>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,maxWidth:560}}>
              {deptsOf(dv).map(d=>(
                <button key={dv.id+d} className={'domchip'+(sel.kind==='dept'&&sel.value===d?' is-on':'')} onClick={()=>onSelect({kind:'dept',value:d})}>{d}<i>{domCount([d])}</i></button>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Knowledge({ go }){
  const [domSel,setDomSel]=useState({kind:'all'});
  const [q,setQ]=useState('');
  const [sel,setSel]=useState(null);
  const matchDom=(k)=>{
    if(domSel.kind==='all') return true;
    if(domSel.kind==='generic') return k.domain==='Generic';
    if(domSel.kind==='dept') return k.domain===domSel.value;
    if(domSel.kind==='area'){ const a=DOMAIN_TREE.flatMap(d=>d.areas).find(x=>x.id===domSel.value); return a?a.depts.includes(k.domain):false; }
    if(domSel.kind==='division'){ const d=DOMAIN_TREE.find(x=>x.id===domSel.value); return d?d.areas.some(a=>a.depts.includes(k.domain)):false; }
    return true;
  };
  const rows = KNOWLEDGE.filter(k=>matchDom(k)&&(!q||k.title.toLowerCase().includes(q.toLowerCase())||k.id.toLowerCase().includes(q.toLowerCase())||(k.domain||'').toLowerCase().includes(q.toLowerCase())));
  const selLabel = domSel.kind==='all'?'All knowledge'
    : domSel.kind==='generic'?'Generic'
    : domSel.kind==='dept'?domSel.value
    : domSel.kind==='area'?(DOMAIN_TREE.flatMap(d=>d.areas).find(a=>a.id===domSel.value)||{}).name
    : (DOMAIN_TREE.find(d=>d.id===domSel.value)||{}).name;
  const openId=id=>{ const k=KNOWLEDGE.find(x=>x.id===id); if(k) setSel(k); };
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div>
          <h1>Knowledge store</h1>
          <p>The single source of truth Ada reads from for customer policy changes — version-controlled, classified by sensitivity, and mapped to the demand it answers.</p>
        </div>
        <div className="actions">
          <button className="btn btn-ghost" onClick={()=>go('create-doc')}><Icon name="upload" size={16}/>Upload</button>
          <button className="btn btn-primary" onClick={()=>go('create-page')}><Icon name="plus" size={16}/>New content</button>
        </div>
      </div>

      <div className="grid g-4" style={{marginBottom:18}}>
        <div className="card card-pad"><Stat icon="book" iconbg="var(--blue-050)" iconfg="var(--blue)" val="186" label="Policy-change assets"/></div>
        <div className="card card-pad"><Stat icon="warn" iconbg="var(--err-bg)" iconfg="var(--err)" val="1" label="Active conflict" delta="Change of address" deltaDir="down"/></div>
        <div className="card card-pad"><Stat icon="clock" iconbg="var(--warn-bg)" iconfg="var(--warn)" val="1" label="Review overdue" delta="Vulnerable customers" deltaDir="down"/></div>
        <div className="card card-pad"><Stat icon="branch" iconbg="var(--teal-050)" iconfg="var(--teal)" val="100%" label="Version-controlled"/></div>
      </div>

      <div className="alertbar err" style={{marginBottom:18}}>
        <div className="alertbar__ico" style={{background:'var(--err-bg)',color:'var(--err)'}}><Icon name="branch" size={19}/></div>
        <div style={{flex:1}}>
          <b style={{fontSize:13.5}}>Conflict: KN-3041 and KN-3038 (OUK) disagree on proof-of-address requirements</b>
          <div className="muted" style={{fontSize:12.5}}>The core page requires proof above £50,000; the OUK page accepts any value on verbal confirmation. The eval gate is holding both from publish.</div>
        </div>
        <button className="btn btn-blue btn-sm" onClick={()=>openId('KN-3041')}><Icon name="edit" size={14}/>Open editor</button>
      </div>

      <DomainsBar sel={domSel} onSelect={setDomSel}/>

      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head">
          <div className="topbar__search" style={{margin:0,flex:'0 1 240px'}}>
            <Icon name="search" size={15}/>
            <input placeholder="Search knowledge or domain…" value={q} onChange={e=>setQ(e.target.value)}/>
          </div>
          <div className="actions" style={{flexWrap:'wrap',alignItems:'center'}}>
            <span className="muted" style={{fontSize:12}}>Domain</span>
            <span className="chip is-on">{selLabel}</span>
            {domSel.kind!=='all' && <button className="chip" onClick={()=>setDomSel({kind:'all'})}><Icon name="x" size={12}/>Clear</button>}
          </div>
        </div>
        <table className="tbl">
          <thead><tr><th>Asset</th><th>Domain</th><th>Owner</th><th>Ver</th><th style={{width:150}}>Next review</th><th>Sensitivity</th><th>Links</th><th>Status</th></tr></thead>
          <tbody>
            {rows.map(k=>(
              <tr key={k.id} className="row-click" onClick={()=>setSel(k)} style={{cursor:'pointer'}}>
                <td><div style={{display:'flex',alignItems:'center',gap:10}}><span className="mono" style={{fontSize:11,color:'var(--muted-2)'}}>{k.id}</span><b style={{fontSize:13.5}}>{k.title}</b>{(k.flag==='conflict')&&<Tag kind="err" dot>conflict</Tag>}{(k.flag==='stale')&&<Tag kind="warn" dot>stale</Tag>}</div></td>
                <td>{domainTag(k.domain)}</td>
                <td><div style={{display:'flex',alignItems:'center',gap:7}}><span className="avatar" style={{background:k.oc,width:24,height:24,fontSize:10}}>{k.owner.split(' ').map(w=>w[0]).join('')}</span><span style={{fontSize:12.5}}>{k.owner.split(' ')[0]}</span></div></td>
                <td><span className="mono" style={{fontSize:12}}>{k.version}</span></td>
                <td><div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-start'}}><span style={{fontSize:12.5,color:k.reviewState==='overdue'?'var(--err)':'var(--ink-2)'}}>{String(k.nextReview).replace('Overdue · ','')}</span>{reviewTag(k.reviewState)}</div></td>
                <td>{sensTag(k.sens)}</td>
                <td><span className="dotline" style={{fontSize:11.5}}><Icon name="target" size={13} style={{color:'var(--teal)'}}/>{k.demands}<Icon name="list" size={13} style={{color:'var(--purple)',marginLeft:6}}/>{k.procs}</span></td>
                <td>{statusTag(k.status)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <KnowledgeDrawer k={sel} onClose={()=>setSel(null)} go={go}/>
    </div>
  );
}

Object.assign(window,{ Knowledge, MetaTile });

</script>

<script type="text/babel">
/* Demand Identification */

function StatusTag({ s }){
  if(s==='documented') return <Tag kind="ok" dot>Documented</Tag>;
  if(s==='draft') return <Tag kind="warn" dot>Draft</Tag>;
  if(s==='needs-review') return <Tag kind="err" dot>Needs review</Tag>;
  return <Tag kind="neutral">Unknown</Tag>;
}

function AreaPill({ areaId }){
  const a = DEMAND_AREAS.find(x=>x.id===areaId);
  if(!a) return null;
  const kind = areaId==='generic'?'neutral':areaId==='equity-release'?'teal':areaId==='my-money'?'purple':areaId==='pensions'?'info':'warn';
  return <Tag kind={kind}>{a.name}</Tag>;
}

/* ---- Demand detail drawer ---- */
function DemandDrawer({ d, onClose, go }){
  if(!d) return null;
  const area = DEMAND_AREAS.find(a=>a.id===d.area);
  const relatedDemands = (d.related||[]).map(rid=>DEMANDS.find(x=>x.id===rid)).filter(Boolean);
  const needsWork = d.status==='draft'||d.status==='needs-review';

  return (
    <React.Fragment>
      <div className={'drawer-scrim'+(d?' open':'')} onClick={onClose}></div>
      <aside className={'drawer'+(d?' open':'')}>
        <div className="drawer__head">
          <div className="stat__ico" style={{background:area?area.bg:'var(--canvas-2)',color:area?area.color:'var(--muted)'}}><Icon name="target" size={19}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span className="mono" style={{fontSize:11.5,color:'var(--muted)'}}>{d.id}</span>
              <StatusTag s={d.status}/>
            </div>
            <h3 style={{margin:'3px 0 0',fontSize:18,letterSpacing:'-.02em'}}>{d.name}</h3>
          </div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34}}><Icon name="x" size={17}/></button>
        </div>

        <div className="drawer__body" style={{display:'grid',gap:18}}>
          {/* top stats */}
          <div className="grid g-3" style={{gap:12}}>
            <div className="card card-pad" style={{padding:14}}>
              <div className="muted" style={{fontSize:11.5}}>Area &amp; domain</div>
              <div style={{fontSize:15,fontWeight:700,margin:'4px 0 7px'}}>{area?area.name:'—'}</div>
              {domainTag(d.domain)}
            </div>
            <div className="card card-pad" style={{padding:14}}>
              <div className="muted" style={{fontSize:11.5}}>Question volume</div>
              <div style={{fontSize:20,fontWeight:800}}>{d.volume}</div>
            </div>
            <div className="card card-pad" style={{padding:14}}>
              <div className="muted" style={{fontSize:11.5}}>Owner</div>
              <div style={{display:'flex',alignItems:'center',gap:7,marginTop:5}}>
                <Avatar name={d.owner} color={d.oc}/>
                <span style={{fontSize:13.5,fontWeight:600}}>{d.owner}</span>
              </div>
            </div>
          </div>

          {/* review cadence */}
          <div className="card card-pad" style={{display:'flex',alignItems:'center',gap:14}}>
            <div className="stat__ico" style={{background:'var(--warn-bg)',color:'var(--warn)',flex:'0 0 auto'}}><Icon name="clock" size={18}/></div>
            <div style={{flex:1}}>
              <div className="muted" style={{fontSize:11.5}}>Review cadence · {d.reviewCycle}</div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginTop:5}}>{reviewTag(d.reviewState)}<span style={{fontSize:13,color:String(d.nextReview).includes('Overdue')?'var(--err)':'var(--ink-2)'}}>Next · {String(d.nextReview).replace('Overdue · ','')}</span>{d.lastReview&&<span className="muted" style={{fontSize:12}}>· Last {d.lastReview}</span>}</div>
            </div>
          </div>

          {/* description */}
          <div className="card card-pad">
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>What is this demand?</div>
            <p style={{margin:0,fontSize:14,lineHeight:1.6,color:'var(--ink-2)'}}>{d.desc}</p>
          </div>

          {/* needs-work alert */}
          {needsWork && (
            <div className={'alertbar '+(d.status==='needs-review'?'err':'warn')} style={{alignItems:'flex-start'}}>
              <div className="alertbar__ico" style={{background:d.status==='needs-review'?'var(--err-bg)':'var(--warn-bg)',color:d.status==='needs-review'?'var(--err)':'var(--warn)'}}><Icon name="warn" size={19}/></div>
              <div>
                <b style={{fontSize:13.5}}>{d.status==='needs-review'?'This demand needs review':'This demand is still in draft'}</b>
                <div className="muted" style={{fontSize:12.5,marginTop:2}}>{d.status==='needs-review'?'Identifiers and linked content need SME sign-off before going live.':'Complete the identifiers and link supporting knowledge to move this to documented.'}</div>
              </div>
            </div>
          )}

          {/* how to identify */}
          <div className="card card-pad">
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>How to identify this demand</div>
            <div style={{display:'grid',gap:10}}>
              {(d.identifiers||[]).map((ident,i)=>(
                <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10}}>
                  <div style={{width:24,height:24,borderRadius:7,background:'var(--teal-050)',color:'var(--teal)',display:'grid',placeItems:'center',flexShrink:0,marginTop:1}}>
                    <Icon name="check" size={14}/>
                  </div>
                  <span style={{fontSize:13.5,color:'var(--ink-2)',lineHeight:1.5}}>{ident}</span>
                </div>
              ))}
            </div>
          </div>

          {/* example customer phrases */}
          {d.examples && d.examples.length>0 && (
            <div className="card card-pad">
              <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Example customer phrases</div>
              <div style={{display:'grid',gap:9}}>
                {d.examples.map((ex,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'flex-start',gap:9}}>
                    <Icon name="msg" size={15} style={{color:'var(--blue)',marginTop:3,flexShrink:0}}/>
                    <span style={{color:'var(--ink-2)',fontStyle:'italic',fontSize:13.5,lineHeight:1.5}}>{ex}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* linked content */}
          <div className="grid g-2" style={{gap:12}}>
            <div className="card card-pad" style={{padding:14,textAlign:'center'}}>
              <div className="muted" style={{fontSize:11.5}}>Knowledge articles</div>
              <div style={{fontSize:24,fontWeight:800,color:d.knowledge?'var(--ink)':'var(--err)',marginTop:4}}>{d.knowledge}</div>
            </div>
            <div className="card card-pad" style={{padding:14,textAlign:'center'}}>
              <div className="muted" style={{fontSize:11.5}}>Procedures</div>
              <div style={{fontSize:24,fontWeight:800,color:d.procs?'var(--ink)':'var(--err)',marginTop:4}}>{d.procs}</div>
            </div>
          </div>

          {/* related demands */}
          {relatedDemands.length>0 && (
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10,display:'flex',justifyContent:'space-between'}}>Related demands<span style={{color:'var(--muted-2)'}}>{relatedDemands.length}</span></div>
              <div className="card" style={{overflow:'hidden'}}>
                {relatedDemands.map(rd=>(
                  <div className="lrow" key={rd.id} style={{padding:'11px 16px',cursor:'default'}}>
                    <div className="lrow__ico" style={{background:'var(--teal-050)',color:'var(--teal)',width:32,height:32}}><Icon name="target" size={16}/></div>
                    <div className="lrow__main"><b style={{fontSize:13}}>{rd.name}</b><span>{rd.id} · {(DEMAND_AREAS.find(a=>a.id===rd.area)||{}).name}</span></div>
                    <AreaPill areaId={rd.area}/>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div className="drawer__foot">
          {needsWork
            ? <React.Fragment><button className="btn btn-blue" style={{flex:1,justifyContent:'center'}} onClick={()=>window.toast('Completing definition','info', d.name+' · add identifiers & examples')}><Icon name="edit" size={16}/>Complete definition</button><button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={()=>{onClose();go('knowledge');}}><Icon name="link" size={16}/>Link knowledge</button></React.Fragment>
            : <React.Fragment><button className="btn btn-ghost" onClick={()=>window.toast('Editing definition','info', d.name)}><Icon name="edit" size={16}/>Edit definition</button><div style={{flex:1}}></div><button className="btn btn-ghost btn-sm" onClick={()=>{onClose();go('knowledge');}}><Icon name="external" size={14}/>View in knowledge store</button></React.Fragment>}
        </div>
      </aside>
    </React.Fragment>
  );
}

/* ---- Area card ---- */
function AreaCard({ area, count, isActive, onClick }){
  const iconMap = {generic:'grid','equity-release':'home','my-money':'star',pensions:'shield',protection:'lock'};
  return (
    <div className="card" onClick={onClick} style={{padding:'16px 18px',cursor:'pointer',border:isActive?'2px solid var(--navy)':'1px solid var(--line)',background:isActive?'#f8f8ff':'#fff',transition:'border .15s, background .15s'}}>
      <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:10}}>
        <div style={{width:36,height:36,borderRadius:10,background:area.bg,color:area.color,display:'grid',placeItems:'center'}}>
          <Icon name={iconMap[area.id]||area.icon} size={18}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <b style={{fontSize:14,letterSpacing:'-.01em',display:'block'}}>{area.name}</b>
        </div>
        <span className="mono" style={{fontSize:20,fontWeight:800,color:isActive?'var(--navy)':'var(--ink)'}}>{count}</span>
      </div>
      <div className="muted" style={{fontSize:12,lineHeight:1.4}}>{area.desc}</div>
    </div>
  );
}

/* ---- New demand modal ---- */
function NewDemand({ onClose, onCreate }){
  const [name,setName]=useState('');
  const [fullName,setFullName]=useState('');
  const [domain,setDomain]=useState((DEMAND_AREAS[0]&&DEMAND_AREAS[0].id)||'generic');
  const [def,setDef]=useState('');
  const [ids,setIds]=useState(['']);
  const fld={width:'100%',padding:'9px 12px',border:'1px solid var(--line)',borderRadius:9,fontFamily:'inherit',fontSize:13.5,color:'var(--ink)',background:'#fff',outline:'none'};
  const lblS={fontSize:12,fontWeight:700,color:'var(--muted)',marginBottom:7,display:'block'};
  const setAt=(i,v)=>setIds(a=>a.map((x,j)=>j===i?v:x));
  const addRow=()=>setIds(a=>[...a,'']);
  const delRow=(i)=>setIds(a=>a.length>1?a.filter((_,j)=>j!==i):['']);
  const canSave=name.trim()&&def.trim();
  const save=()=>{ if(!canSave) return; onCreate({ name:name.trim(), domain }); };
  return ReactDOM.createPortal(
    <div className="modal-scrim" onClick={onClose}>
      <div className="modal" style={{maxWidth:720}} onClick={e=>e.stopPropagation()}>
        <div className="modal__head">
          <div className="stat__ico" style={{background:'var(--teal-050)',color:'var(--teal)'}}><Icon name="target" size={18}/></div>
          <div style={{flex:1,minWidth:0}}><h3 style={{margin:0,fontSize:17}}>New demand</h3><div className="muted" style={{fontSize:12}}>Define a customer intent so Ada can recognise it</div></div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34,flexShrink:0}}><Icon name="x" size={17}/></button>
        </div>
        <div className="modal__body" style={{display:'grid',gap:18}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 220px',gap:14}}>
            <div><label style={lblS}>Demand name <span style={{fontWeight:500,color:'var(--muted-2)'}}>· short working title</span></label><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Small pots lump sum withdrawal" style={fld} autoFocus/></div>
            <div><label style={lblS}>Area / domain</label><select value={domain} onChange={e=>setDomain(e.target.value)} style={fld}>{DEMAND_AREAS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
          </div>
          <div><label style={lblS}>Full name <span style={{fontWeight:500,color:'var(--muted-2)'}}>· as it appears in regulatory or policy documents (optional)</span></label>
            <input value={fullName} onChange={e=>setFullName(e.target.value)} placeholder="e.g. Small pension pots lump sum payment — under HMRC trivial commutation rules" style={fld}/>
          </div>
          <div><label style={lblS}>Definition <span style={{fontWeight:500,color:'var(--muted-2)'}}>· what is this demand?</span></label>
            <textarea value={def} onChange={e=>setDef(e.target.value)} placeholder="Describe what the customer is asking for in plain English…" style={{...fld,minHeight:78,resize:'vertical',lineHeight:1.55}}/>
          </div>
          <div><label style={lblS}>How to identify <span style={{fontWeight:500,color:'var(--muted-2)'}}>· signals that point to this demand</span></label>
            <div style={{display:'grid',gap:8}}>
              {ids.map((v,i)=>(
                <div key={i} style={{display:'flex',gap:8,alignItems:'center'}}>
                  <div style={{width:7,height:7,borderRadius:99,background:'var(--teal)',flexShrink:0}}/>
                  <input value={v} onChange={e=>setAt(i,e.target.value)} placeholder="e.g. Customer mentions taking a small pension pot" style={fld}/>
                  <button className="iconbtn" style={{width:34,height:34,flexShrink:0}} onClick={()=>delRow(i)}><Icon name="x" size={15}/></button>
                </div>
              ))}
              <button className="btn btn-ghost btn-sm" onClick={addRow} style={{justifyContent:'center',borderStyle:'dashed',alignSelf:'start'}}><Icon name="plus" size={14}/>Add identifier</button>
            </div>
          </div>
        </div>
        <div className="modal__foot">
          <div className="dotline" style={{fontSize:12}}><Icon name="target" size={14} style={{color:'var(--teal)'}}/>Saved as a draft demand for sign-off</div>
          <div style={{flex:1}}/>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={!canSave} style={{opacity:canSave?1:.5,cursor:canSave?'pointer':'not-allowed'}} onClick={save}><Icon name="plus" size={15}/>Create demand</button>
        </div>
      </div>
    </div>
  , document.body);
}

/* ---- Main page ---- */
function Demand({ go }){
  const [sel,setSel]=useState(null);
  const [newOpen,setNewOpen]=useState(false);
  const [areaFilter,setAreaFilter]=useState('all');
  const [statusFilter,setStatusFilter]=useState('all');
  const [search,setSearch]=useState('');

  const areaCounts = useMemo(()=>{
    const c = {};
    DEMAND_AREAS.forEach(a=>c[a.id]=0);
    DEMANDS.forEach(d=>{ if(c[d.area]!==undefined) c[d.area]++; });
    return c;
  },[]);

  const rows = useMemo(()=>{
    return DEMANDS.filter(d=>{
      if(areaFilter!=='all'&&d.area!==areaFilter) return false;
      if(statusFilter==='documented'&&d.status!=='documented') return false;
      if(statusFilter==='draft'&&d.status!=='draft') return false;
      if(statusFilter==='needs-review'&&d.status!=='needs-review') return false;
      if(search){
        const s=search.toLowerCase();
        if(!d.name.toLowerCase().includes(s)&&!d.id.toLowerCase().includes(s)&&!d.desc.toLowerCase().includes(s)&&!(d.domain||'').toLowerCase().includes(s)) return false;
      }
      return true;
    });
  },[areaFilter,statusFilter,search]);

  const documented = DEMANDS.filter(d=>d.status==='documented').length;
  const drafts = DEMANDS.filter(d=>d.status==='draft').length;
  const needsReview = DEMANDS.filter(d=>d.status==='needs-review').length;

  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div>
          <h1>Demand identification</h1>
          <p>How to recognise what a customer is asking for. Browse demands by area or search for specific service requests, with identifiers and example phrases.</p>
        </div>
        <div className="actions">
          <button className="btn btn-ghost" onClick={()=>window.toast('Demands exported','info', DEMANDS.length+' definitions · CSV with identifiers')}><Icon name="download" size={16}/>Export</button>
          <button className="btn btn-primary" onClick={()=>setNewOpen(true)}><Icon name="plus" size={16}/>New demand</button>
        </div>
      </div>

      {/* KPI row */}
      <div className="grid g-4" style={{marginBottom:22}}>
        <div className="card card-pad"><Stat icon="target" iconbg="var(--teal-050)" iconfg="var(--teal)" val={DEMANDS.length} label="Total demands"/></div>
        <div className="card card-pad"><Stat icon="check" iconbg="var(--ok-bg)" iconfg="var(--ok)" val={documented} label="Documented"/></div>
        <div className="card card-pad"><Stat icon="edit" iconbg="var(--warn-bg)" iconfg="var(--warn)" val={drafts} label="In draft"/></div>
        <div className="card card-pad"><Stat icon="warn" iconbg="var(--err-bg)" iconfg="var(--err)" val={needsReview} label="Needs review"/></div>
      </div>

      {/* Area cards */}
      <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Browse by area</div>
      <div className="grid" style={{gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:24}}>
        {DEMAND_AREAS.map(a=>(
          <AreaCard
            key={a.id}
            area={a}
            count={areaCounts[a.id]||0}
            isActive={areaFilter===a.id}
            onClick={()=>setAreaFilter(areaFilter===a.id?'all':a.id)}
          />
        ))}
      </div>

      {/* Demands table card */}
      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head" style={{flexWrap:'wrap',gap:10}}>
          <div className="seg">
            {[['all','All'],['documented','Documented'],['draft','Draft'],['needs-review','Needs review']].map(([k,l])=>(
              <button key={k} className={statusFilter===k?'is-on':''} onClick={()=>setStatusFilter(k)}>{l}</button>
            ))}
          </div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
            {areaFilter!=='all' && (
              <button className="chip is-on" onClick={()=>setAreaFilter('all')} style={{gap:4}}>
                {(DEMAND_AREAS.find(a=>a.id===areaFilter)||{}).name}
                <Icon name="x" size={13}/>
              </button>
            )}
            <div style={{display:'flex',alignItems:'center',gap:7,background:'var(--canvas)',border:'1px solid var(--line)',borderRadius:'var(--r-pill)',padding:'6px 12px',minWidth:200}}>
              <Icon name="search" size={15} style={{color:'var(--muted)',flexShrink:0}}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search demands or domains…" style={{border:'none',background:'none',outline:'none',fontFamily:'inherit',fontSize:13,color:'var(--ink)',width:'100%'}}/>
            </div>
          </div>
        </div>

        <table className="tbl">
          <thead>
            <tr>
              <th style={{width:56}}></th>
              <th>Demand</th>
              <th>Area</th>
              <th>Domain</th>
              <th>Status</th>
              <th>Volume</th>
              <th style={{width:150}}>Next review</th>
              <th>Knowledge</th>
              <th>Procs</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {rows.length===0 && (
              <tr><td colSpan={9} style={{textAlign:'center',padding:40,color:'var(--muted)'}}>No demands match your filters</td></tr>
            )}
            {rows.map(d=>{
              const area = DEMAND_AREAS.find(a=>a.id===d.area);
              return (
                <tr key={d.id} className="row-click" onClick={()=>setSel(d)}>
                  <td>
                    <div style={{width:32,height:32,borderRadius:9,background:area?area.bg:'var(--canvas-2)',color:area?area.color:'var(--muted)',display:'grid',placeItems:'center'}}>
                      <Icon name="target" size={15}/>
                    </div>
                  </td>
                  <td>
                    <div>
                      <b style={{display:'block',fontSize:13.5}}>{d.name}</b>
                      <span className="mono" style={{fontSize:11,color:'var(--muted-2)'}}>{d.id}</span>
                    </div>
                  </td>
                  <td><AreaPill areaId={d.area}/></td>
                  <td>{domainTag(d.domain)}</td>
                  <td><StatusTag s={d.status}/></td>
                  <td><span className="mono" style={{fontSize:12.5}}>{d.volume}</span></td>
                  <td><div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-start'}}><span style={{fontSize:12.5,color:d.reviewState==='overdue'?'var(--err)':'var(--ink-2)'}}>{String(d.nextReview).replace('Overdue · ','')}</span>{reviewTag(d.reviewState)}</div></td>
                  <td><span className="mono" style={{color:d.knowledge?'var(--ink)':'var(--err)',fontWeight:600}}>{d.knowledge}</span></td>
                  <td><span className="mono" style={{color:d.procs?'var(--ink)':'var(--err)',fontWeight:600}}>{d.procs}</span></td>
                  <td><Icon name="chevR" size={16} style={{color:'var(--muted-2)'}}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <DemandDrawer d={sel} onClose={()=>setSel(null)} go={go}/>
      {newOpen && <NewDemand onClose={()=>setNewOpen(false)} onCreate={(d)=>{ setNewOpen(false); window.toast('Demand created','ok', d.name+' · saved as draft for sign-off'); }}/>}
    </div>
  );
}

Object.assign(window,{ Demand });

</script>

<script type="text/babel">
/* Procedure Repository */

const PROC_STEPS = {
  'PR-340':[
    {t:'Confirm customer identity and plan type', k:'KN-1990', note:'Capped drawdown only — flexi-access uses a different path'},
    {t:'Retrieve the current-quarter GAD rate', k:'KN-2041', affected:true, note:'Rate changed 2.75% → 3.25% — pending re-publish'},
    {t:'Calculate the maximum income (150% of GAD basis amount)', k:'KN-2038', note:'Conflict: source files disagree on basis'},
    {t:'Check the requested increase against the cap', k:null},
    {t:'Confirm no MPAA or tax-relief implications', k:'KN-1944'},
    {t:'Record the instruction and effective date', k:null},
    {t:'Confirm the outcome to the customer in writing', k:null},
  ],
};
function stepsFor(p){
  if(PROC_STEPS[p.id]) return PROC_STEPS[p.id];
  return Array.from({length:p.steps}).map((_,i)=>({t:'Step '+(i+1)+' — '+p.title.split(' ').slice(0,3).join(' '),k:i%2?null:'KN-1990'}));
}

function ProcDrawer({ p, onClose, go }){
  if(!p) return null;
  const steps = stepsFor(p);
  return (
    <React.Fragment>
      <div className={'drawer-scrim open'} onClick={onClose}/>
      <aside className={'drawer open'}>
        <div className="drawer__head">
          <div className="stat__ico" style={{background:'var(--purple-050)',color:'var(--purple)'}}><Icon name="list" size={19}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}><span className="mono" style={{fontSize:11.5,color:'var(--muted)'}}>{p.id}</span><Tag kind={p.status==='live'?'ok':p.status==='review'?'warn':'neutral'} dot>{p.status}</Tag>{domainTag(p.domain)}{p.flag==='affected'&&<Tag kind="err" dot>affected by change</Tag>}</div>
            <h3 style={{margin:'3px 0 0',fontSize:18,letterSpacing:'-.02em'}}>{p.title}</h3>
          </div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34}}><Icon name="x" size={17}/></button>
        </div>
        <div className="drawer__body" style={{display:'grid',gap:18}}>
          {p.flag==='affected' && (
            <div className="alertbar err" style={{alignItems:'flex-start'}}>
              <div className="alertbar__ico" style={{background:'var(--err-bg)',color:'var(--err)'}}><Icon name="warn" size={19}/></div>
              <div><b style={{fontSize:13.5}}>Step 2 references knowledge that just changed</b><div className="muted" style={{fontSize:12.5,marginTop:2}}>KN-2041 (GAD rate) is mid-fix. This procedure auto-flagged for review so handlers don’t follow stale guidance.</div></div>
            </div>
          )}

          <div className="grid g-3" style={{gap:12}}>
            <div className="card card-pad" style={{padding:14}}><div className="muted" style={{fontSize:11.5}}>Steps</div><div style={{fontSize:20,fontWeight:800}}>{p.steps}</div></div>
            <div className="card card-pad" style={{padding:14}}><div className="muted" style={{fontSize:11.5}}>Linked demand</div><div style={{fontSize:20,fontWeight:800}}>{p.demands}</div></div>
            <div className="card card-pad" style={{padding:14}}><div className="muted" style={{fontSize:11.5}}>Linked knowledge</div><div style={{fontSize:20,fontWeight:800}}>{p.knowledge}</div></div>
          </div>

          <div className="card card-pad" style={{display:'flex',alignItems:'center',gap:14}}>
            <div className="stat__ico" style={{background:'var(--warn-bg)',color:'var(--warn)',flex:'0 0 auto'}}><Icon name="clock" size={18}/></div>
            <div style={{flex:1}}>
              <div className="muted" style={{fontSize:11.5}}>Review cadence · {p.reviewCycle}</div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginTop:5}}>{reviewTag(p.reviewState)}<span style={{fontSize:13,color:String(p.nextReview).includes('Overdue')?'var(--err)':'var(--ink-2)'}}>Next · {String(p.nextReview).replace('Overdue · ','')}</span></div>
            </div>
          </div>

          <div>
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Work instruction</div>
            <div style={{display:'grid',gap:0,position:'relative'}}>
              {steps.map((s,i)=>(
                <div key={i} style={{display:'flex',gap:13,paddingBottom:i<steps.length-1?16:0}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                    <div style={{width:28,height:28,borderRadius:99,display:'grid',placeItems:'center',fontSize:12.5,fontWeight:700,
                      background:s.affected?'var(--err)':'var(--navy)',color:'#fff'}}>{i+1}</div>
                    {i<steps.length-1 && <div style={{width:2,flex:1,background:'var(--line)',marginTop:4,minHeight:14}}/>}
                  </div>
                  <div className="card card-pad" style={{padding:'12px 14px',flex:1,marginBottom:0,borderColor:s.affected?'#f3cdd4':'var(--line)',background:s.affected?'#fdf6f7':'#fff'}}>
                    <b style={{fontSize:13.5,letterSpacing:'-.01em'}}>{s.t}</b>
                    {s.note && <div className="muted" style={{fontSize:12,marginTop:3}}>{s.note}</div>}
                    {s.k && <div style={{marginTop:8,display:'inline-flex'}}><span className="chip" style={{fontSize:11,padding:'3px 9px',borderColor:s.affected?'#f3cdd4':'var(--line)'}}><Icon name="doc" size={13} style={{color:s.affected?'var(--err)':'var(--blue)'}}/>{s.k}{s.affected&&' · changed'}</span></div>}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="card card-pad">
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Relationships</div>
            <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <div className="relnode" style={{borderColor:'#cce3e7'}}><span style={{color:'var(--teal)'}}>Demand</span><b>Increase drawdown income</b></div>
              <Icon name="arrowR" size={16} style={{color:'var(--muted-2)'}}/>
              <div className="relnode" style={{borderColor:'#c9b8ff'}}><span style={{color:'var(--purple)'}}>Procedure</span><b>{p.id}</b></div>
              <Icon name="arrowR" size={16} style={{color:'var(--muted-2)'}}/>
              <div className="relnode" style={{borderColor:'#bcd4f5'}}><span style={{color:'var(--blue)'}}>Knowledge ×{p.knowledge}</span><b>GAD · drawdown</b></div>
            </div>
          </div>
        </div>
        <div className="drawer__foot">
          <button className="btn btn-primary" onClick={()=>{onClose();go('create-procedure');}}><Icon name="edit" size={16}/>Edit procedure</button>
          <button className="btn btn-ghost" onClick={()=>{onClose();go('knowledge');}}><Icon name="link" size={16}/>Link knowledge</button>
          <button className="btn btn-ghost" onClick={()=>downloadGuide({
            id:p.id, title:p.title, team:'CASS — Client Assets', type:'Procedure guide',
            meta:[['Domain',p.domain],['Owner',p.owner],['Status',p.status],['Steps',p.steps],
                  ['Linked demand',p.demands],['Linked knowledge',p.knowledge],['Last updated',p.updated]],
            sections:[{h:'Work instruction', html:'<ol class="steps">'+steps.map(s=>
              '<li><b>'+(s.t||'').replace(/[<>]/g,'')+'</b>'+(s.note?'<div class="note">'+s.note.replace(/[<>]/g,'')+'</div>':'')+(s.k?'<span class="kn">'+s.k+(s.affected?' · changed':'')+'</span>':'')+'</li>'
            ).join('')+'</ol>'}]
          })}><Icon name="download" size={16}/>Download for CASS</button>
          <div style={{flex:1}}/>
          {p.flag==='affected'&&<button className="btn btn-blue btn-sm" onClick={()=>{onClose();go('measure');}}>Resolve via thread<Icon name="arrowR" size={14}/></button>}
        </div>
      </aside>
    </React.Fragment>
  );
}

function Procedures({ go }){
  const [sel,setSel]=useState(null);
  const [dom,setDom]=useState('All');
  const rows = PROCEDURES.filter(p=>dom==='All'||p.domain===dom);
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div>
          <h1>Procedure repository</h1>
          <p>Operational work instructions structured for AI consumption — each linked to the demand it serves and the knowledge it relies on.</p>
        </div>
        <div className="actions">
          <button className="btn btn-ghost" onClick={()=>window.toast('Procedure standard','info','House style & required fields for work instructions')}><Icon name="sliders" size={16}/>Procedure standard</button>
          <button className="btn btn-primary" onClick={()=>go('create-procedure')}><Icon name="plus" size={16}/>New procedure</button>
        </div>
      </div>

      <div className="grid g-4" style={{marginBottom:18}}>
        <div className="card card-pad"><Stat icon="list" iconbg="var(--purple-050)" iconfg="var(--purple)" val="34" label="Procedures live"/></div>
        <div className="card card-pad"><Stat icon="link" iconbg="var(--blue-050)" iconfg="var(--blue)" val="86%" label="Linked to demand"/></div>
        <div className="card card-pad"><Stat icon="warn" iconbg="var(--err-bg)" iconfg="var(--err)" val="1" label="Affected by change" delta="review" deltaDir="down"/></div>
        <div className="card card-pad"><Stat icon="clock" iconbg="var(--warn-bg)" iconfg="var(--warn)" val={PROCEDURES.filter(p=>p.reviewState==='overdue').length} label="Review overdue"/></div>
      </div>

      <div className="alertbar err" style={{marginBottom:18}}>
        <div className="alertbar__ico" style={{background:'var(--err-bg)',color:'var(--err)'}}><Icon name="branch" size={19}/></div>
        <div style={{flex:1}}>
          <b style={{fontSize:13.5}}>PR-340 auto-flagged — a linked knowledge file changed</b>
          <div className="muted" style={{fontSize:12.5}}>“Process a capped drawdown income increase” depends on the GAD rate currently being fixed. Review before handlers use it.</div>
        </div>
        <button className="btn btn-blue btn-sm" onClick={()=>setSel(PROCEDURES.find(p=>p.id==='PR-340'))}>Review<Icon name="arrowR" size={14}/></button>
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head">
          <Icon name="list" size={18}/>
          <h3>All procedures</h3>
          <div className="actions">
            {['All',...Array.from(new Set(PROCEDURES.map(p=>p.domain)))].map(x=><button key={x} className={'chip'+(dom===x?' is-on':'')} onClick={()=>setDom(x)}>{x}</button>)}
          </div>
        </div>
        <table className="tbl">
          <thead><tr><th>Procedure</th><th>Domain</th><th>Steps</th><th>Demand</th><th>Knowledge</th><th style={{width:150}}>Next review</th><th>Owner</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {rows.map(p=>(
              <tr key={p.id} className="row-click" onClick={()=>setSel(p)}>
                <td><div style={{display:'flex',alignItems:'center',gap:10}}><span className="mono" style={{fontSize:11,color:'var(--muted-2)'}}>{p.id}</span><b style={{fontSize:13.5}}>{p.title}</b>{p.flag==='affected'&&<Tag kind="err" dot>affected</Tag>}{p.flag==='stale'&&<Tag kind="warn" dot>stale</Tag>}</div></td>
                <td>{domainTag(p.domain)}</td>
                <td><span className="mono">{p.steps}</span></td>
                <td><span className="mono">{p.demands}</span></td>
                <td><span className="mono">{p.knowledge}</span></td>
                <td><div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-start'}}><span style={{fontSize:12.5,color:p.reviewState==='overdue'?'var(--err)':'var(--ink-2)'}}>{String(p.nextReview).replace('Overdue · ','')}</span>{reviewTag(p.reviewState)}</div></td>
                <td><div style={{display:'flex',alignItems:'center',gap:7}}><span className="avatar" style={{background:p.oc,width:24,height:24,fontSize:10}}>{p.owner.split(' ').map(w=>w[0]).join('')}</span><span style={{fontSize:12.5}}>{p.owner.split(' ')[0]}</span></div></td>
                <td><Tag kind={p.status==='live'?'ok':p.status==='review'?'warn':'neutral'} dot>{p.status}</Tag></td>
                <td><Icon name="chevR" size={16} style={{color:'var(--muted-2)'}}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {sel && <ProcDrawer p={sel} onClose={()=>setSel(null)} go={go}/>}
    </div>
  );
}

Object.assign(window,{ Procedures });

</script>

<script type="text/babel">
/* Agent Feedback / Measurement — the Ada feedback loop */

function LoopNode({ icon, color, bg, label, sub }){
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,flex:'0 0 auto',width:128,textAlign:'center'}}>
      <div style={{width:52,height:52,borderRadius:15,background:bg,color,display:'grid',placeItems:'center',boxShadow:'var(--sh-sm)'}}><Icon name={icon} size={23}/></div>
      <div><b style={{fontSize:12.5,display:'block',letterSpacing:'-.01em'}}>{label}</b><span className="muted" style={{fontSize:11}}>{sub}</span></div>
    </div>
  );
}

function ImpactRow({ r }){
  const up = r.after>=r.before;
  return (
    <div className="lrow" style={{alignItems:'center'}}>
      <div className="lrow__ico" style={{background:r.state==='pending'?'var(--warn-bg)':'var(--ok-bg)',color:r.state==='pending'?'var(--warn)':'var(--ok)',width:34,height:34}}>
        <Icon name={r.state==='pending'?'clock':'trend'} size={17}/>
      </div>
      <div className="lrow__main">
        <b style={{fontSize:13}}>{r.change}</b>
        <span>{r.metric} · {r.when}</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <span className="mono" style={{fontSize:12.5,color:'var(--muted)'}}>{r.before}%</span>
        <Icon name="arrowR" size={13} style={{color:'var(--muted-2)'}}/>
        <span className="mono" style={{fontSize:14,fontWeight:700,color:up?'var(--ok)':'var(--err)'}}>{r.after}%</span>
      </div>
    </div>
  );
}

function FeedbackItem({ item, go }){
  const TYPE = {
    'halluc':   {label:'Hallucination', kind:'err',  icon:'warn',    bg:'var(--err-bg)',    fg:'var(--err)'},
    'gap':      {label:'Knowledge gap', kind:'warn',  icon:'inbox',   bg:'var(--warn-bg)',   fg:'var(--warn)'},
    'low-conf': {label:'Low confidence',kind:'info',  icon:'gauge',   bg:'var(--blue-050)',  fg:'var(--blue)'},
  };
  const PRI = { high:'err', med:'warn', low:'neutral' };
  const t = TYPE[item.type]||TYPE['gap'];
  const ACT = {
    'halluc':  {label:'Fix conflict',  dest:'knowledge',    icon:'edit'},
    'gap':     {label:'Create page',   dest:'create-page',  icon:'plus'},
    'low-conf':{label:'Edit source',   dest:'knowledge',    icon:'edit'},
  };
  const act = ACT[item.type]||ACT['gap'];
  return (
    <div className="lrow" style={{alignItems:'flex-start',gap:14,padding:'13px 18px'}}>
      <div style={{width:34,height:34,borderRadius:9,background:t.bg,color:t.fg,display:'grid',placeItems:'center',flexShrink:0,marginTop:1}}>
        <Icon name={t.icon} size={16}/>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
          <Tag kind={t.kind} dot>{t.label}</Tag>
          <Tag kind={PRI[item.priority]}>{item.priority}</Tag>
          {item.kn&&<span className="mono" style={{fontSize:10.5,color:'var(--muted-2)'}}>{item.kn}</span>}
          {item.trace&&<span className="mono" style={{fontSize:10.5,color:'var(--muted-2)'}}>{item.trace}</span>}
        </div>
        <b style={{fontSize:13.5,display:'block',marginBottom:2}}>{item.q}</b>
        <div style={{display:'flex',gap:12,alignItems:'center',fontSize:11.5,color:'var(--muted)'}}>
          <span><Icon name="msg" size={11}/> {item.vol} asks</span>
          <span>{item.when} · {item.agent}</span>
          {item.assigned
            ? <span style={{color:item.oc||'var(--teal)'}}><Icon name="user" size={11}/> {item.assigned}</span>
            : <span style={{color:'var(--warn)'}}><Icon name="user" size={11}/> Unassigned</span>}
        </div>
      </div>
      <div style={{display:'flex',gap:7,alignItems:'center',flexShrink:0}}>
        {item.trace&&<button className="btn btn-ghost btn-sm" onClick={()=>go('arize')} style={{padding:'5px 9px',fontSize:12}}><Icon name="pulse" size={13}/>Knowledge eval</button>}
        <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Assigned to you','ok','Item moved to your queue')} style={{padding:'5px 9px',fontSize:12}}>Assign</button>
        <button className="btn btn-primary btn-sm" onClick={()=>{window.toast(act.label,'ok','Navigating to editor');go(act.dest);}} style={{padding:'5px 10px',fontSize:12}}><Icon name={act.icon} size={13}/>{act.label}</button>
      </div>
    </div>
  );
}

function Measurement({ go }){
  const [filter,setFilter]=useState('all');
  const [dismissed,setDismissed]=useState([]);
  const items = FEEDBACK_INBOX.filter(i=>!dismissed.includes(i.id)&&(filter==='all'||i.type===filter));
  const open  = FEEDBACK_INBOX.filter(i=>!dismissed.includes(i.id)&&i.state==='open').length;
  const high  = FEEDBACK_INBOX.filter(i=>!dismissed.includes(i.id)&&i.priority==='high').length;
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div style={{flex:1,minWidth:0}}>
          <h1>Agent Feedback</h1>
          <p>Did your last edit make Ada better? Agent Feedback closes the loop — every content change is traced to a measurable shift in agent accuracy, coverage and confidence.</p>
        </div>
        <div className="actions" style={{marginLeft:0}}>
          <div className="seg"><button className="is-on">Pensions</button><button>Wealth</button><button>All</button></div>
          <button className="btn btn-ghost" onClick={()=>window.toast('Exported','info','Impact report downloaded')}><Icon name="download" size={16}/>Export</button>
        </div>
      </div>

      {/* Value callout */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:18}}>
        <div className="card card-pad" style={{borderLeft:'3px solid var(--navy)',display:'flex',gap:14,alignItems:'flex-start'}}>
          <div style={{width:36,height:36,borderRadius:10,background:'#e7e8f5',color:'var(--navy)',display:'grid',placeItems:'center',flexShrink:0}}><Icon name="msg" size={18}/></div>
          <div><b style={{fontSize:13,display:'block',marginBottom:4}}>The problem it solves</b><span style={{fontSize:12.5,color:'var(--ink-2)',lineHeight:1.5}}>Without it, content changes are published blind — no way to know if fixing a knowledge article actually improved what Ada tells customers.</span></div>
        </div>
        <div className="card card-pad" style={{borderLeft:'3px solid var(--teal)',display:'flex',gap:14,alignItems:'flex-start'}}>
          <div style={{width:36,height:36,borderRadius:10,background:'var(--teal-050)',color:'var(--teal)',display:'grid',placeItems:'center',flexShrink:0}}><Icon name="refresh" size={18}/></div>
          <div><b style={{fontSize:13,display:'block',marginBottom:4}}>What it does</b><span style={{fontSize:12.5,color:'var(--ink-2)',lineHeight:1.5}}>Every question Ada answers is captured here as feedback. Arize signals land back here as coverage gaps and accuracy shifts — and become tomorrow's priorities on your home screen.</span></div>
        </div>
        <div className="card card-pad" style={{borderLeft:'3px solid var(--ok)',display:'flex',gap:14,alignItems:'flex-start'}}>
          <div style={{width:36,height:36,borderRadius:10,background:'var(--ok-bg)',color:'var(--ok)',display:'grid',placeItems:'center',flexShrink:0}}><Icon name="trend" size={18}/></div>
          <div><b style={{fontSize:13,display:'block',marginBottom:4}}>The payoff</b><span style={{fontSize:12.5,color:'var(--ink-2)',lineHeight:1.5}}>Point to a specific fix, a specific date, and say: Ada's accuracy on drawdown questions went from 62% to 93% because of this change.</span></div>
        </div>
      </div>

      {/* KPIs */}
      <div className="grid g-4" style={{marginBottom:18}}>
        <div className="card card-pad"><Stat icon="checkCircle" iconbg="var(--ok-bg)" iconfg="var(--ok)" val="93%" label="Answer accuracy" delta="re-run pending" deltaDir="flat"/></div>
        <div className="card card-pad"><Stat icon="warn" iconbg="var(--err-bg)" iconfg="var(--err)" val="4.2%" label="Hallucination rate" delta="1.8pt" deltaDir="down"/></div>
        <div className="card card-pad"><Stat icon="layers" iconbg="var(--teal-050)" iconfg="var(--teal)" val="82%" label="Knowledge coverage" delta="3 this wk" deltaDir="up"/></div>
        <div className="card card-pad"><Stat icon="inbox" iconbg="var(--warn-bg)" iconfg="var(--warn)" val={open} label="Inbox items" delta={high+" high priority"} deltaDir="down"/></div>
      </div>

      {/* ---- Feedback inbox ---- */}
      <div className="card" style={{overflow:'hidden',marginBottom:18}}>
        <div className="card-head">
          <Icon name="inbox" size={18} style={{color:'var(--err)'}}/>
          <h3>Feedback inbox</h3>
          <span className="sub">actions Ada is waiting on</span>
          <div className="actions" style={{gap:6}}>
            {[['all','All'],['halluc','Hallucination'],['gap','Knowledge gap'],['low-conf','Low confidence']].map(([v,l])=>(
              <button key={v} onClick={()=>setFilter(v)}
                style={{padding:'4px 10px',borderRadius:99,border:'1px solid '+(filter===v?'var(--navy)':'var(--line)'),background:filter===v?'var(--navy)':'#fff',color:filter===v?'#fff':'var(--muted)',fontSize:12,fontWeight:600,cursor:'pointer',transition:'.12s'}}>
                {l}{v==='all'&&items.length>0&&<span style={{marginLeft:5,background:'var(--yellow)',color:'var(--navy)',borderRadius:99,padding:'0 5px',fontSize:11}}>{items.length}</span>}
              </button>
            ))}
            {dismissed.length>0&&<button className="btn btn-ghost btn-sm" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>setDismissed([])}>Restore {dismissed.length} dismissed</button>}
          </div>
        </div>
        {items.length===0
          ? <div style={{padding:'28px',textAlign:'center',color:'var(--muted)',fontSize:13}}>
              <Icon name="checkCircle" size={24} style={{color:'var(--ok)',marginBottom:8,display:'block',margin:'0 auto 8px'}}/>
              {filter==='all'?'Inbox clear — no open items':'No items of this type'}
            </div>
          : <div style={{display:'grid'}}>
              {items.map((item,i)=>(
                <div key={item.id} style={{borderBottom:i<items.length-1?'1px solid var(--line-2)':'none'}}>
                  <FeedbackItem item={item} go={go}/>
                </div>
              ))}
            </div>
        }
        <div style={{padding:'11px 18px',borderTop:'1px solid var(--line-2)',display:'flex',gap:10,alignItems:'center'}}>
          <span style={{fontSize:12,color:'var(--muted)'}}>{items.length} item{items.length!==1?'s':''} · questions asked to Ada</span>
          <div style={{flex:1}}/>
          <button className="btn btn-ghost btn-sm" onClick={()=>setDismissed(FEEDBACK_INBOX.map(i=>i.id))} style={{fontSize:12}}>Dismiss all</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>go('arize')} style={{fontSize:12}}><Icon name="pulse" size={13}/>Open Arize<Icon name="arrowR" size={13}/></button>
        </div>
      </div>

      {/* Feedback loop */}
      <div className="card" style={{overflow:'hidden',marginBottom:18}}>
        <div className="card-head"><Icon name="refresh" size={18} style={{color:'var(--navy)'}}/><h3>The feedback loop</h3><span className="sub">content change → measured agent impact</span>
          <div className="actions"><Tag kind="purple" dot>GAD thread · step 07</Tag></div>
        </div>
        <div className="card-pad" style={{paddingTop:24,paddingBottom:24}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,flexWrap:'wrap'}}>
            <LoopNode icon="user" color="var(--navy)" bg="#e7e8f5" label="Knowledge Owner" sub="fixes content"/>
            <Icon name="arrowR" size={18} style={{color:'var(--muted-2)'}}/>
            <LoopNode icon="layers" color="var(--blue)" bg="var(--blue-050)" label="Repositories" sub="K · Demand · Proc"/>
            <Icon name="arrowR" size={18} style={{color:'var(--muted-2)'}}/>
            <LoopNode icon="check" color="var(--teal)" bg="var(--teal-050)" label="Eval gate" sub="passes at 93%"/>
            <Icon name="arrowR" size={18} style={{color:'var(--muted-2)'}}/>
            <LoopNode icon="spark" color="var(--purple)" bg="var(--purple-050)" label="Ada & agents" sub="consume update"/>
            <Icon name="arrowR" size={18} style={{color:'var(--muted-2)'}}/>
            <LoopNode icon="pulse" color="var(--err)" bg="var(--err-bg)" label="Arize signals" sub="measures impact"/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,justifyContent:'center',marginTop:20,color:'var(--muted)',fontSize:12.5}}>
            <div style={{height:1,width:60,background:'var(--line)'}}/>
            <Icon name="refresh" size={15}/>
            <span>signals become tomorrow's priorities on the owner's home</span>
            <div style={{height:1,width:60,background:'var(--line)'}}/>
          </div>
        </div>
      </div>

      {/* coverage matrix */}
      <div className="card" style={{overflow:'hidden',marginBottom:18}}>
        <div className="card-head"><Icon name="grid" size={18}/><h3>Coverage by area</h3><span className="sub">knowledge · demand · procedure</span></div>
        <table className="tbl">
          <thead><tr><th>Area</th><th style={{width:170}}>Knowledge</th><th style={{width:170}}>Demand</th><th style={{width:170}}>Procedure</th><th>Open gaps</th></tr></thead>
          <tbody>
            {COVERAGE_ROWS.map(r=>(
              <tr key={r.area}>
                <td><b style={{fontSize:13.5}}>{r.area}</b></td>
                {[['k','blue'],['d','teal'],['p','purple']].map(([key,tone])=>(
                  <td key={key}><div style={{display:'flex',alignItems:'center',gap:9}}><div style={{flex:1}}><Meter v={r[key]} tone={tone}/></div><span className="mono" style={{fontSize:11.5,width:30,color:'var(--muted)'}}>{r[key]}%</span></div></td>
                ))}
                <td>{r.gaps>2?<Tag kind="err" dot>{r.gaps} gaps</Tag>:<Tag kind="ok" dot>{r.gaps} gap{r.gaps>1?'s':''}</Tag>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1.1fr 1fr',alignItems:'start'}}>
        {/* content impact */}
        <div className="card" style={{overflow:'hidden'}}>
          <div className="card-head"><Icon name="trend" size={18} style={{color:'var(--ok)'}}/><h3>Content impact</h3><span className="sub">which changes moved the needle</span></div>
          {IMPACT.map((r,i)=><ImpactRow key={i} r={r}/>)}
          <div style={{padding:'12px 20px',borderTop:'1px solid var(--line-2)'}}>
            <div className="dotline" style={{justifyContent:'center'}}><Icon name="lock" size={14}/>Evidence-based investment — every change attributable to a measured outcome</div>
          </div>
        </div>

        {/* unanswered */}
        <div className="card" style={{overflow:'hidden'}}>
          <div className="card-head"><Icon name="inbox" size={18} style={{color:'var(--err)'}}/><h3>Unanswered & low-confidence</h3><span className="sub">turn into new content</span></div>
          {UNANSWERED.map((u,i)=>(
            <div className="lrow" key={i}>
              <div className="lrow__ico" style={{background:u.conf===0?'var(--err-bg)':'var(--warn-bg)',color:u.conf===0?'var(--err)':'var(--warn)',width:34,height:34}}><Icon name="msg" size={16}/></div>
              <div className="lrow__main"><b style={{fontSize:13,fontWeight:500}}>{u.q}</b><span>{u.vol} asks · {u.conf===0?'no answer':u.conf+'% confidence'} · {u.intent}</span></div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-ghost btn-sm" style={{padding:'4px 8px',fontSize:12}} onClick={()=>go('create-page')}><Icon name="plus" size={12}/>Create page</button>
                <button className="btn btn-ghost btn-sm" style={{padding:'4px 8px',fontSize:12}} onClick={()=>go('demand')}><Icon name="target" size={12}/>Map</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
Object.assign(window,{ Measurement });

</script>

<script type="text/babel">
/* Agent connections (formerly Agent lab) */

function Switch({ on, onClick }){
  return <button onClick={onClick} style={{width:38,height:22,borderRadius:99,border:'none',padding:2,background:on?'var(--ok)':'#cfd3e4',transition:'.15s',display:'inline-flex'}}>
    <span style={{width:18,height:18,borderRadius:99,background:'#fff',transform:on?'translateX(16px)':'none',transition:'.15s',boxShadow:'var(--sh-xs)'}}/>
  </button>;
}

const KIND_TONE={'Retrieval':'info','Intent match':'teal','Reference':'neutral','Execution check':'purple','Procedure':'purple','Grounding':'warn'};

function ConnCell({ kind }){
  if(!kind) return <span style={{color:'var(--muted-2)'}}>—</span>;
  return <Tag kind={KIND_TONE[kind]||'neutral'} dot>{kind}</Tag>;
}

function AgentDrawer({ a, onClose, go }){
  if(!a) return null;
  return (
    <React.Fragment>
      <div className="drawer-scrim open" onClick={onClose}/>
      <aside className="drawer open">
        <div className="drawer__head">
          <div className="stat__ico" style={{background:a.oc,color:'#fff'}}><Icon name={a.icon} size={19}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><h3 style={{margin:0,fontSize:18,letterSpacing:'-.02em'}}>{a.name}</h3><Tag kind={a.status==='live'?'ok':a.status==='beta'?'warn':'neutral'} dot>{a.status}</Tag></div>
            <div className="muted" style={{fontSize:12.5}}>{a.full}</div>
          </div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34}}><Icon name="x" size={17}/></button>

/* ---- secondary: Playground ---- */
function Playground(){
  const [qk,setQk]=useState('q1');
  const [phase,setPhase]=useState('idle');
  const q=PLAYGROUND[qk];
  const run=()=>{ setPhase('running'); setTimeout(()=>setPhase('done'),900); };
  useEffect(()=>{ setPhase('idle'); },[qk]);
  const statusTone = q.status==='ok'?'ok':q.status==='low'?'err':'warn';
  return (
    <div className="grid" style={{gridTemplateColumns:'1fr 340px',alignItems:'start',gap:18}}>
      <div style={{display:'grid',gap:16}}>
        <div className="card card-pad">
          <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Ask Ada a question</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
            {Object.entries(PLAYGROUND).map(([k,v])=>(<button key={k} className={'chip'+(qk===k?' is-on':'')} onClick={()=>setQk(k)} style={{maxWidth:'100%'}}>{v.q}</button>))}
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center',background:'var(--canvas)',border:'1px solid var(--line)',borderRadius:12,padding:'12px 14px'}}>
            <Icon name="msg" size={18} style={{color:'var(--purple)'}}/>
            <span style={{flex:1,fontSize:14,color:'var(--ink)'}}>{q.q}</span>
            <button className="btn btn-primary btn-sm" onClick={run} disabled={phase==='running'}>{phase==='running'?<React.Fragment><Icon name="refresh" size={14}/>Running…</React.Fragment>:<React.Fragment><Icon name="play" size={14}/>Run</React.Fragment>}</button>
          </div>
        </div>
        {phase==='done' && (
          <div className="card fade-in" style={{overflow:'hidden'}}>
            <div className="card-head"><Icon name="spark" size={18} style={{color:'var(--purple)'}}/><h3>Ada response</h3><div className="actions"><Tag kind={statusTone} dot>{q.status==='ok'?'grounded':q.status==='gap'?'knowledge gap':'low confidence'}</Tag><span className="dotline" style={{fontSize:11.5}}><Icon name="clock" size={13}/>{q.latency}ms</span></div></div>
            <div className="card-pad" style={{display:'grid',gap:16}}>
              <p style={{margin:0,fontSize:14.5,lineHeight:1.6,color:'var(--ink)'}}>{q.answer}</p>
              <div style={{display:'flex',gap:18,alignItems:'center'}}>
                <div style={{flex:1}}><div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5}}><span className="muted">Answer confidence</span><b className="mono" style={{color:q.conf>=80?'var(--ok)':q.conf>=60?'var(--warn)':'var(--err)'}}>{q.conf}%</b></div><Meter v={q.conf} tone={q.conf>=80?'green':q.conf>=60?'amber':''}/></div>
                <div style={{textAlign:'center'}}><div className="muted" style={{fontSize:12}}>Groundedness</div><Tag kind={q.guard==='passed'?'ok':'err'} dot>{q.guard}</Tag></div>
              </div>
              <div className="alertbar" style={{border:'1px solid var(--line)',background:'var(--canvas)',padding:'11px 14px'}}><Icon name="warn" size={17} style={{color:statusTone==='ok'?'var(--ok)':'var(--warn)',flexShrink:0}}/><span style={{fontSize:12.5,color:'var(--ink-2)'}}>{q.note}</span></div>
            </div>
          </div>
        )}
        {phase==='idle' && <div className="card card-pad" style={{textAlign:'center',padding:'40px',color:'var(--muted)'}}><Icon name="play" size={26} style={{marginBottom:8}}/><div style={{fontSize:13.5}}>Pick a question and press Run to see how a connected agent answers from your content.</div></div>}
        {phase==='running' && <div className="card card-pad" style={{textAlign:'center',padding:'40px',color:'var(--purple)'}}><Icon name="refresh" size={26} style={{marginBottom:8}}/><div style={{fontSize:13.5}}>Retrieving knowledge, generating, checking guardrails…</div></div>}
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div className="card-head"><Icon name="sliders" size={18}/><h3>Agent config · Ada</h3></div>
        <div className="card-pad" style={{display:'grid',gap:14}}>
          {[['Knowledge scope','Pensions + Wealth'],['Retrieval','Top 6 · rerank on'],['Model','gpt-4o · temp 0.2'],['Confidence gate','70%'],['Persona','Customer assistant']].map(r=>(<div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span className="muted">{r[0]}</span><b style={{fontWeight:600}}>{r[1]}</b></div>))}
          <hr className="divider"/><button className="btn btn-ghost btn-sm" style={{justifyContent:'center'}}><Icon name="edit" size={14}/>Edit configuration</button>
        </div>
      </div>
    </div>
  );
}

          <Tag kind="neutral">{g.type}</Tag>

          <Switch on={rails[i]} onClick={()=>setRails(r=>r.map((v,j)=>j===i?!v:v))}/>

function AgentLab({ go }){
  const [tab,setTab]=useState('conn');
  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div><h1>Agent connections</h1><p>Every AI agent that consumes your knowledge — what each one is connected to, and how. One source of truth, many agents.</p></div>
        <div className="actions"><span className="env-pill"><i className="d"/>6 live · 1 planned</span></div>
      </div>
      <div className="tabs">
        {[['conn','Connections'],['play','Test an agent'],['guard','Guardrails']].map(([k,l])=>(

}

Object.assign(window,{ AgentLab });
