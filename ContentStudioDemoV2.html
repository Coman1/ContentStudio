<script type="text/babel">
/* Arize AX */

const KIND_COLOR = { io:'#9398ad', embed:'var(--blue)', retrieve:'var(--teal)', rerank:'var(--navy)', guard:'#e89b2a', llm:'var(--purple)' };

function Waterfall(){
  const total = Math.max(...SPANS.map(s=>s.start+s.dur));
  return (
    <div style={{display:'grid',gap:7}}>
      {SPANS.map((s,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:188,flexShrink:0,fontSize:12.5,display:'flex',alignItems:'center',gap:7}}>
            <span style={{width:8,height:8,borderRadius:2,background:s.trip?'var(--err)':KIND_COLOR[s.kind],flexShrink:0}}/>
            <span style={{color:s.trip?'var(--err)':'var(--ink)',fontWeight:s.trip?700:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</span>
          </div>
          <div style={{flex:1,position:'relative',height:22,background:'var(--canvas)',borderRadius:6}}>
            <div style={{position:'absolute',left:(s.start/total*100)+'%',width:Math.max(1.5,s.dur/total*100)+'%',top:3,bottom:3,borderRadius:5,
              background:s.trip?'var(--err)':KIND_COLOR[s.kind],opacity:s.trip?1:.9,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:5}}>
            </div>
            <span style={{position:'absolute',left:'calc('+(s.start/total*100)+'% + '+Math.max(1.5,s.dur/total*100)+'%)',top:3,marginLeft:6,fontSize:10.5,color:'var(--muted)',fontFamily:'var(--mono)'}}>{s.dur}ms</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function Arize({ go }){
  const [selEval, setSelEval] = React.useState(null);

  /* ---- knowledge eval sign-off PDF ---- */
  const buildEvalSignOff = (audience) => {
    const evHtml = '<table class="meta"><tr><th>ID</th><th>Title</th><th>Faithfulness</th><th>Groundedness</th><th>Accuracy</th><th>Gate</th><th>Ingest</th></tr>'+
      KNOWLEDGE_EVALS.map(e=>'<tr><td>'+e.id+'</td><td>'+e.title+'</td><td>'+(e.faithfulness!=null?e.faithfulness+'%':'—')+'</td><td>'+(e.groundedness!=null?e.groundedness+'%':'—')+'</td><td>'+(e.accuracy!=null?e.accuracy+'%':'—')+'</td><td>'+e.status+'</td><td>'+e.ingestStatus+'</td></tr>').join('')+'</table>';
    const monHtml = '<table class="meta"><tr><th>Monitor</th><th>Value</th><th>Threshold</th><th>Result</th></tr>'+
      MONITORS.map(m=>'<tr><td>'+m.name+'</td><td>'+m.val+'</td><td>'+m.thr+'</td><td>'+(m.state==='breach'?'⚠ BREACH':'✓ OK')+'</td></tr>').join('')+'</table>';
    const concHtml = '<table class="meta"><tr><th>ID</th><th>Title</th><th>Concern</th><th>Assigned</th></tr>'+
      ANNOTATIONS.map(a=>'<tr><td>'+a.id+'</td><td>'+a.title+'</td><td>'+a.concern+'</td><td>'+a.who+'</td></tr>').join('')+'</table>';
    const passed = KNOWLEDGE_EVALS.filter(e=>e.status==='passed').length;
    const blocked = KNOWLEDGE_EVALS.filter(e=>e.status==='blocked').length;
    const pending = KNOWLEDGE_EVALS.filter(e=>e.status==='pending').length;
    downloadSignOff({ audience, id:'ARIZE-KNEVAL-2406', title:'Knowledge eval run — 24 Jun 2026', type:'Eval run',
      meta:[
        ['Run date','24 Jun 2026'],['Scope','Knowledge base · Pensions domain'],
        ['Items evaluated', KNOWLEDGE_EVALS.filter(e=>e.ran).length+' of '+KNOWLEDGE_EVALS.length],
        ['Passed gate', String(passed)],
        ['Blocked at gate', String(blocked)],
        ['Awaiting eval', String(pending)],
        ['Open concerns', String(ANNOTATIONS.filter(a=>a.state==='open').length)],
      ],
      sections:[
        {h:'Summary', html:'<p>This Arize AX eval run covers all knowledge articles and procedure guides in the Pensions domain as of 24 Jun 2026. '+passed+' items passed the eval gate; '+blocked+' are blocked; '+pending+' are awaiting eval. KN-2041 is blocked due to a source conflict on the GAD rate (faithfulness 72%, groundedness 68%). KN-3041 is blocked due to two unsupported claims (groundedness 71%). Both are held in the review pipeline pending SME resolution before they can be ingested.</p>'},
        {h:'Monitor summary', html:monHtml},
        {h:'Knowledge eval results', html:evHtml},
        {h:'Eval concerns', html:concHtml},
      ]
    });
  };

  /* ---- per-item sign-off PDF ---- */
  const buildItemSignOff = (e) => {
    const ran = e.ran ? e.ran : 'Not yet run';
    const fPass = e.faithfulness!=null && e.faithfulness>=e.threshold;
    const gPass = e.groundedness!=null && e.groundedness>=e.threshold;
    downloadSignOff({ audience:'FCA', id:e.id, title:'Knowledge eval: '+e.title, type:'Knowledge eval record',
      meta:[
        ['ID',e.id],['Title',e.title],['Type',e.type],['Version',e.version],
        ['Eval run',ran],['Faithfulness',e.faithfulness!=null?e.faithfulness+'%':'Not run'],
        ['Groundedness',e.groundedness!=null?e.groundedness+'%':'Not run'],
        ['Accuracy',e.accuracy!=null?e.accuracy+'%':'Not run'],
        ['Gate threshold',e.threshold+'%'],['Result',e.status],
        ['Ingest status',e.ingestStatus],
      ],
      sections:[
        {h:'Eval outcome', html:'<p><b>'+e.id+' · '+e.title+'</b> ('+e.version+'). Eval run: '+ran+'.</p>'
          +(e.status==='blocked'?'<p><b>Blocked:</b> '+e.concern+'</p>':'')
          +(e.status==='passed'?'<p><b>Passed:</b> All scores above the '+e.threshold+'% threshold. Faithfulness '+e.faithfulness+'%, groundedness '+e.groundedness+'%, accuracy '+e.accuracy+'%. Cleared for ingest.</p>':'')
          +(e.status==='pending'?'<p><b>Pending:</b> '+e.concern+'</p>':'')},
      ]
    });
  };

  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div style={{flex:1,minWidth:0}}>
          <h1>Arize AX</h1>
          <p>Knowledge eval observatory — faithfulness, groundedness and accuracy scored on every knowledge article and procedure guide before it is ingested into the database.</p>
          <div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
            <Tag kind="err" dot>2 blocked at gate</Tag>
            <Tag kind="warn" dot>3 awaiting eval</Tag>
          </div>
        </div>
        <div className="actions" style={{marginLeft:0,minWidth:0,flexShrink:0}}>
          <button className="btn btn-ghost" onClick={()=>window.toast('Opening Arize AX','info','Knowledge eval monitors & results')}><Icon name="external" size={15}/>Open in Arize</button>
          <SignOffMenu label="Eval sign-off PDF" audiences={['Compliance','FCA']} build={buildEvalSignOff} primaryAudience="FCA" drop="down" align="right"/>
        </div>
      </div>

      {/* monitors */}
      <div className="grid g-4" style={{marginBottom:18}}>
        {MONITORS.map(m=>(
          <div key={m.name} className="card card-pad">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <div style={{fontSize:23,fontWeight:800,letterSpacing:'-.02em',color:m.state==='breach'?'var(--err)':'var(--ink)'}}>{m.val}</div>
                <div className="muted" style={{fontSize:12}}>{m.name}</div>
              </div>
              <Tag kind={m.state==='breach'?'err':'ok'} dot>{m.state==='breach'?'breach':'ok'}</Tag>
            </div>
            <Spark data={m.trend} color={m.state==='breach'?'var(--err)':'var(--purple)'}/>
            <div className="muted mono" style={{fontSize:10.5,marginTop:6}}>threshold {m.thr}</div>
          </div>
        ))}
      </div>

      {/* ingestion eval waterfall — KN-2041 */}
      <div className="card" style={{overflow:'hidden',marginBottom:18}}>
        <div className="card-head">
          <Icon name="pulse" size={18} style={{color:'var(--err)'}}/>
          <h3>Eval run · KN-2041</h3>
          <span className="sub mono">Capped drawdown — GAD rate assumptions · v8 (draft)</span>
          <div className="actions"><Tag kind="err" dot>eval blocked</Tag><span className="dotline" style={{fontSize:11.5}}><Icon name="clock" size={13}/>690ms total</span></div>
        </div>
        <div className="card-pad"><Waterfall/></div>
        <div style={{padding:'12px 20px',borderTop:'1px solid var(--line-2)'}} className="dotline">
          <Icon name="warn" size={14} style={{color:'var(--err)'}}/>
          <span>Conflict scan found two source files disagreeing on the GAD rate (2.75% vs 3.25%). Faithfulness 72% · groundedness 68% — both below the 85% gate. Content cannot be ingested until the conflict is resolved. <b style={{color:'var(--purple)',cursor:'pointer'}} onClick={()=>go('reviews')}>Resolve in review pipeline →</b></span>
        </div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1.3fr 1fr',alignItems:'start'}}>
        {/* knowledge eval results */}
        <div className="card" style={{overflow:'hidden'}}>
          <div className="card-head"><Icon name="list" size={18}/><h3>Knowledge eval results</h3><span className="sub">all articles &amp; procedures</span></div>
          <table className="tbl">
            <thead>
              <tr><th>ID</th><th>Title</th><th>Faith.</th><th>Ground.</th><th>Gate</th><th>Ingest</th><th style={{width:32}}></th></tr>
            </thead>
            <tbody>
              {KNOWLEDGE_EVALS.map(e=>(
                <React.Fragment key={e.id}>
                  <tr className="row-click" onClick={()=>setSelEval(selEval===e.id?null:e.id)}>
                    <td><span className="mono" style={{fontSize:12}}>{e.id}</span></td>
                    <td>
                      <span style={{fontSize:13}}>{e.title}</span>
                      <div className="muted" style={{fontSize:11}}>{e.version}{e.ran?' · '+e.ran:''}</div>
                    </td>
                    <td>{e.faithfulness!=null
                      ? <b className="mono" style={{color:e.faithfulness>=e.threshold?'var(--ok)':'var(--err)'}}>{e.faithfulness}%</b>
                      : <span className="muted mono" style={{fontSize:12}}>—</span>}
                    </td>
                    <td>{e.groundedness!=null
                      ? <b className="mono" style={{color:e.groundedness>=e.threshold?'var(--ok)':'var(--err)'}}>{e.groundedness}%</b>
                      : <span className="muted mono" style={{fontSize:12}}>—</span>}
                    </td>
                    <td><Tag kind={e.status==='blocked'?'err':e.status==='passed'?'ok':'warn'} dot>{e.status}</Tag></td>
                    <td><Tag kind={e.ingestStatus==='ingested'?'ok':e.ingestStatus==='blocked'?'err':e.ingestStatus==='in review'?'info':'neutral'}>{e.ingestStatus}</Tag></td>
                    <td onClick={ev=>ev.stopPropagation()}>
                      <button title="Download eval sign-off PDF" onClick={()=>buildItemSignOff(e)}
                        style={{background:'none',border:'none',cursor:'pointer',padding:'4px 6px',borderRadius:7,color:'var(--muted-2)',display:'flex',alignItems:'center'}}
                        onMouseEnter={ev=>ev.currentTarget.style.color='var(--purple)'}
                        onMouseLeave={ev=>ev.currentTarget.style.color='var(--muted-2)'}>
                        <Icon name="download" size={14}/>
                      </button>
                    </td>
                  </tr>
                  {selEval===e.id&&e.concern&&(
                    <tr>
                      <td colSpan={7} style={{background:e.status==='blocked'?'var(--err-bg)':e.status==='passed'?'var(--ok-bg)':'var(--warn-bg)',padding:'10px 18px',borderTop:'1px solid var(--line-2)'}}>
                        <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                          <Icon name={e.status==='blocked'?'warn':e.status==='passed'?'check':'clock'} size={14} style={{color:e.status==='blocked'?'var(--err)':e.status==='passed'?'var(--ok)':'var(--warn)',flexShrink:0,marginTop:2}}/>
                          <span style={{fontSize:12.5,color:e.status==='blocked'?'var(--err)':e.status==='passed'?'var(--ok)':'var(--warn)',flex:1}}>{e.concern}</span>
                          {e.status==='blocked'&&<button className="btn btn-ghost btn-sm" style={{fontSize:12,flexShrink:0}} onClick={()=>go('reviews')}>Resolve <Icon name="arrowR" size={13}/></button>}
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </div>

        {/* eval concerns */}
        <div className="card" style={{overflow:'hidden'}}>
          <div className="card-head">
            <Icon name="warn" size={18} style={{color:'var(--err)'}}/>
            <h3>Eval concerns</h3>
            <span className="sub">human review needed</span>
          </div>
          {ANNOTATIONS.map(a=>(
            <div key={a.id} className="lrow" style={{alignItems:'flex-start'}}>
              <div className="lrow__ico" style={{
                background: a.type==='conflict'?'var(--err-bg)':a.type==='grounding'?'var(--warn-bg)':'var(--canvas-2)',
                color: a.type==='conflict'?'var(--err)':a.type==='grounding'?'var(--warn)':'var(--muted)',
                width:34,height:34}}>
                <Icon name={a.type==='conflict'?'warn':a.type==='grounding'?'gauge':'clock'} size={16}/>
              </div>
              <div className="lrow__main">
                <b style={{fontSize:13}}>{a.title}</b>
                <span>{a.concern}</span>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div className="mono" style={{fontSize:10.5,color:'var(--muted-2)'}}>{a.id}</div>
                <span style={{fontSize:11,color:a.who==='Unassigned'?'var(--warn)':'var(--muted)'}}>{a.who}</span>
              </div>
            </div>
          ))}
          <div style={{padding:'12px 20px',borderTop:'1px solid var(--line-2)'}}>
            <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={()=>go('reviews')}>
              Open review pipeline<Icon name="arrowR" size={14}/>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window,{ Arize });

</script>

<script type="text/babel">
/* Governance — Reviews & sign-off + Audit log */

/* ---- step state styling ---- */
const STEP_C = { done:'var(--ok)', active:'var(--blue)', blocked:'var(--err)', pending:'var(--muted-2)' };
const STEP_ICO = { done:'check', active:'clock', blocked:'warn', pending:'clock' };
const TONE_C = { err:{c:'var(--err)',bg:'var(--err-bg)',k:'err'}, warn:{c:'var(--warn)',bg:'var(--warn-bg)',k:'warn'}, info:{c:'var(--blue)',bg:'var(--info-bg)',k:'info'} };
function stageMeta(key){ return REVIEW_PIPELINE.find(s=>s.key===key); }
function typeTag(t){ const k=t==='Procedure guide'?'purple':t==='Demand'?'teal':'info'; return <Tag kind={k}>{t}</Tag>; }
function initials(n){ return n.split(' ').map(w=>w[0]).slice(0,2).join(''); }

/* compact 5-stage rail for table rows */
function StageRail({ r }){
  const cur = REVIEW_PIPELINE.findIndex(s=>s.key===r.stage);
  return (
    <div style={{display:'flex',alignItems:'center',gap:0}}>
      {REVIEW_PIPELINE.map((s,i)=>{
        const st = r.steps[s.key].state;
        const c = STEP_C[st];
        const active = st==='active'||st==='blocked';
        return (
          <React.Fragment key={s.key}>
            <span title={s.label+' — '+st} style={{width:active?13:10,height:active?13:10,borderRadius:99,background:st==='pending'?'#fff':c,
              border:'2px solid '+(st==='pending'?'var(--line)':c),flex:'0 0 auto',
              boxShadow:active?'0 0 0 3px '+(st==='blocked'?'rgba(197,54,75,.16)':'rgba(0,80,181,.16)'):'none',display:'grid',placeItems:'center'}}>
              {st==='done'&&<Icon name="check" size={6} sw={3.4} style={{color:'#fff'}}/>}
            </span>
            {i<REVIEW_PIPELINE.length-1 && <span style={{width:16,height:2,background:i<cur?'var(--ok)':'var(--line)',flex:'0 0 auto'}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* pipeline overview bar with live counts */
function PipelineBar({ counts }){
  return (
    <div className="flow">
      {REVIEW_PIPELINE.map((s,i)=>{
        const held = s.key==='evals' && counts.held>0;
        const n = s.key==='publish' ? counts.published : counts[s.key]||0;
        return (
          <React.Fragment key={s.key}>
            <div className="flow__step" style={held?{borderColor:'#f3cdd4',background:'linear-gradient(180deg,#fdf0f2,#fff)'}:null}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
                <div style={{width:28,height:28,borderRadius:8,display:'grid',placeItems:'center',background:held?'var(--err-bg)':'var(--canvas-2)',color:held?'var(--err)':s.tone}}><Icon name={s.icon} size={15}/></div>
                <span style={{fontFamily:'var(--mono)',fontSize:19,fontWeight:700,color:held?'var(--err)':'var(--ink)'}}>{n}</span>
              </div>
              <b>{s.label}</b>
              <span>{s.key==='publish' ? 'published this month' : held ? '1 held · gate failed' : (n===1?'item':'items')+' in stage'}</span>
            </div>
            {i<REVIEW_PIPELINE.length-1 && <div className="flow__arrow"><Icon name="chevR" size={16}/></div>}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function ReviewDrawer({ r: src, onClose }){
  const [over,setOver]=useState(null);
  const [running,setRunning]=useState(false);
  const [liveG,setLiveG]=useState(null);
  useEffect(()=>{ setOver(null); setRunning(false); setLiveG(null); },[src&&src.id]);
  if(!src) return null;
  const r = over || src;
  const m = stageMeta(r.stage);
  const isProc = r.type==='Procedure guide';
  const published = r.stage==='publish' && r.steps.publish.state==='done';

  const order = REVIEW_PIPELINE.map(s=>s.key);

  const rerunEvals = ()=>{
    if(running) return;
    setRunning(true);
    const target=90, start=r.evals.grounded ?? 62;
    let v=start; setLiveG(start);
    const t=setInterval(()=>{
      v += Math.max(1, Math.round((target-v)/4));
      if(v>=target){ v=target; clearInterval(t);
        const steps={...r.steps,
          evals:{...r.steps.evals, state:'done', note:'Accuracy '+r.evals.accuracy+'% · groundedness '+target+'% — both above the '+r.evals.threshold+'% threshold. Peer review unlocked.', when:'Just now'},
          peer:{...r.steps.peer, state:'active', who:(r.steps.peer.who==='Locked'||r.steps.peer.who==='—')?'R. Banerjee':r.steps.peer.who, role:'Peer · Knowledge Owner', note:'Peer review opened automatically once the eval gate cleared.', when:'In progress'},
        };
        setOver({...r, stage:'peer', evals:{...r.evals, grounded:target, pass:true}, steps, action:null});
        setRunning(false); setLiveG(null);
        window.toast('Eval gate passed','ok','Groundedness '+target+'% · peer review unlocked');
      } else setLiveG(v);
    },110);
  };
  const signOff = ()=>{
    const idx=order.indexOf(r.stage), cur=order[idx], next=order[idx+1];
    const steps={...r.steps, [cur]:{...r.steps[cur], state:'done', when:'Just now'}};
    let stage=r.stage;
    if(next){ steps[next]={...r.steps[next], state:'active', when:'In progress'}; stage=next; }
    setOver({...r, stage, steps, action:null});
    window.toast('Signed off','ok', stageMeta(cur).label+' approved'+(next?' · '+stageMeta(next).label+' is next':''));
  };
  const publish = ()=>{
    const steps={...r.steps, publish:{...r.steps.publish, state:'done', who:r.by, role:'Knowledge Owner', note:'Released to Ada and connected agents.', when:'Just now'}};
    setOver({...r, stage:'publish', steps, action:null});
    window.toast('Published to Ada','ok', r.ref+' is now live for connected agents');
  };
  const requestChanges = ()=>{ window.toast('Changes requested','warn', 'Owner '+r.by+' notified — item returned to draft'); };
  const exportFCA = ()=>{ window.toast('Audit bundle exported','info', r.id+' sign-off trail prepared for FCA'); };

  // contextual primary action
  let primary = {label:'Sign off', icon:'check', fn:signOff};
  if(r.stage==='evals' && !r.evals.pass) primary = {label: running?'Running evals…':'Re-run evals', icon:'refresh', fn:rerunEvals};
  else if(r.stage==='publish' && !published) primary = {label:'Publish to Ada', icon:'arrowR', fn:publish};
  else if(published) primary = null;
  return (
    <React.Fragment>
      <div className="drawer-scrim open" onClick={onClose}/>
      <aside className="drawer open">
        <div className="drawer__head">
          <div className="stat__ico" style={{background:m.tone,color:'#fff'}}><Icon name={m.icon} size={19}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span className="mono" style={{fontSize:11.5,color:'var(--muted)',whiteSpace:'nowrap'}}>{r.id}</span>
              <span className="mono" style={{fontSize:11.5,color:'var(--muted-2)',whiteSpace:'nowrap'}}>{r.ref}</span>
              {typeTag(r.type)}
              {published ? <Tag kind="ok" dot>published</Tag> : <Tag kind="info" dot>{m.label}</Tag>}
              {r.stage==='evals'&&!r.evals.pass&&<Tag kind="err" dot>gate held</Tag>}
            </div>
            <h3 style={{margin:'4px 0 0',fontSize:17,letterSpacing:'-.02em'}}>{r.title}</h3>
          </div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34}}><Icon name="x" size={17}/></button>
        </div>
        <div className="drawer__body" style={{display:'grid',gap:18}}>
          <div className="card card-pad" style={{display:'flex',gap:22,flexWrap:'wrap'}}>
            <div><div className="muted" style={{fontSize:11.5}}>Owner</div><div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}><span className="avatar" style={{background:r.oc,width:22,height:22,fontSize:10}}>{initials(r.by)}</span><b style={{fontWeight:600}}>{r.by}</b></div></div>
            <div><div className="muted" style={{fontSize:11.5}}>Domain</div><b style={{fontWeight:600,display:'block',marginTop:5}}>{r.domain}</b></div>
            <div><div className="muted" style={{fontSize:11.5}}>Submitted</div><b style={{fontWeight:600,display:'block',marginTop:5}}>{r.submitted}</b></div>
            <div><div className="muted" style={{fontSize:11.5}}>Priority</div><div style={{marginTop:4}}><Tag kind={r.priority==='High'?'warn':'neutral'} dot>{r.priority}</Tag></div></div>
          </div>

          <div style={{fontSize:13,color:'var(--ink-2)',lineHeight:1.55,padding:'0 2px'}}>{r.note}</div>

          {/* what needs actioning */}
          {r.action && (()=>{ const t=TONE_C[r.action.tone]; return (
            <div className="alertbar" style={{alignItems:'flex-start',border:'1px solid '+t.c+'33',background:t.bg}}>
              <div className="alertbar__ico" style={{background:'#fff',color:t.c}}><Icon name={r.action.tone==='err'?'warn':'clock'} size={18}/></div>
              <div style={{flex:1}}>
                <b style={{fontSize:13}}>Action needed — {r.action.who}</b>
                <div style={{fontSize:12.5,color:'var(--ink-2)',marginTop:2}}>{r.action.text}</div>
                {r.action.label && primary && (
                  <button className="btn btn-sm" style={{marginTop:9,background:t.c,color:'#fff',border:'none'}} disabled={running} onClick={primary.fn}>
                    <Icon name={running?'refresh':primary.icon} size={14}/>{running?'Running evals…':r.action.label}
                  </button>
                )}
              </div>
            </div>
          );})()}

          {/* routing explainer */}
          <div className="alertbar" style={{border:'1px solid var(--line)',background:'var(--canvas)',padding:'11px 14px',alignItems:'flex-start'}}>
            <Icon name="shield" size={16} style={{color:'var(--teal)',flexShrink:0,marginTop:1}}/>
            <span style={{fontSize:12.5,color:'var(--ink-2)'}}>{isProc
              ? <React.Fragment>This is a <b>procedure guide</b>, so compliance review routes to <b>CASS (Client Assets)</b>. Peer review unlocks once evals run.</React.Fragment>
              : <React.Fragment>This is <b>knowledge</b>, so compliance routes to <b>{r.complianceTeam}</b>. A peer knowledge owner confirms once evals run.</React.Fragment>}</span>
          </div>

          {/* vertical sign-off pipeline */}
          <div>
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:14}}>Sign-off pipeline</div>
            <div style={{display:'grid',gap:0}}>
              {REVIEW_PIPELINE.map((s,i)=>{
                const e = r.steps[s.key];
                const c = STEP_C[e.state];
                const last = i===REVIEW_PIPELINE.length-1;
                const compTeam = s.key==='compliance';
                return (
                  <div key={s.key} style={{display:'flex',gap:13,paddingBottom:last?0:16}}>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                      <div style={{width:30,height:30,borderRadius:99,display:'grid',placeItems:'center',flexShrink:0,
                        background:e.state==='pending'?'#fff':c,color:e.state==='pending'?'var(--muted-2)':'#fff',
                        border:e.state==='pending'?'2px solid var(--line)':'none',
                        boxShadow:(e.state==='active'||e.state==='blocked')?'0 0 0 4px '+(e.state==='blocked'?'rgba(197,54,75,.14)':'rgba(0,80,181,.14)'):'none'}}>
                        <Icon name={e.state==='pending'?s.icon:STEP_ICO[e.state]} size={15}/></div>
                      {!last && <div style={{width:2,flex:1,minHeight:26,background:e.state==='done'?'var(--ok)':'var(--line)',marginTop:3}}/>}
                    </div>
                    <div style={{paddingTop:3,flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <b style={{fontSize:13.5}}>{s.label}</b>
                        {compTeam && <Tag kind={isProc?'purple':'teal'}>{r.complianceTeam}</Tag>}
                        {e.state==='done'&&<Tag kind="ok">approved</Tag>}
                        {e.state==='active'&&<Tag kind="info" dot>in progress</Tag>}
                        {e.state==='blocked'&&<Tag kind="err" dot>failed</Tag>}
                        {e.state==='pending'&&<Tag kind="neutral">pending</Tag>}
                      </div>
                      <div style={{fontSize:12.5,color:'var(--ink-2)',margin:'4px 0 3px'}}>
                        <span style={{fontWeight:600}}>{e.who}</span>{e.role?<span className="muted"> · {e.role}</span>:null}{e.via?<span className="muted"> · via {e.via}</span>:null}
                      </div>
                      {e.note && <div className="muted" style={{fontSize:12.5,lineHeight:1.5}}>{e.note}</div>}
                      {/* eval scores on the evals step */}
                      {s.key==='evals' && e.state!=='pending' && r.evals.accuracy!=null && (
                        <div style={{display:'flex',gap:14,marginTop:8}}>
                          {[['Accuracy',r.evals.accuracy],['Groundedness', running&&liveG!=null?liveG:r.evals.grounded]].map(([lbl,v])=>{
                            const ok=v>=r.evals.threshold;
                            return <div key={lbl} style={{flex:1}}>
                              <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:3}}><span className="muted">{lbl}{lbl==='Groundedness'&&running&&<span className="dotline" style={{marginLeft:6,color:'var(--blue)'}}><Icon name="refresh" size={11}/></span>}</span><span className="mono" style={{fontWeight:600,color:ok?'var(--ok)':'var(--err)'}}>{v}%</span></div>
                              <Meter v={v} tone={ok?'green':''} className={ok?'':'amber'}/>
                            </div>;
                          })}
                        </div>
                      )}
                      <div className="muted mono" style={{fontSize:11,marginTop:5}}>{e.when}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="alertbar purple" style={{alignItems:'flex-start'}}>
            <div className="alertbar__ico" style={{background:'var(--purple-050)',color:'var(--purple)'}}><Icon name="msg" size={18}/></div>
            <div><b style={{fontSize:13}}>SME & compliance review via secure portal</b><div className="muted" style={{fontSize:12.5,marginTop:2}}>Reviewers sign off through an email link — no platform account needed. Every decision is hash-chained into the FCA audit trail.</div></div>
          </div>
        </div>
        <div className="drawer__foot">
          <button className="btn btn-ghost btn-sm" onClick={()=>{onClose();go('create-procedure');}}><Icon name="list" size={14}/>Procedure from this page</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>{onClose();go('create-training');}}><Icon name="book" size={14}/>Training from this page</button>
          <div style={{flex:1}}/>
          <SignOffMenu label="Download sign-off PDF" btnClass="btn btn-ghost"
            primaryAudience={isProc?'CASS':'Compliance'}
            build={(audience)=>{
              const evalRows = r.evals.accuracy!=null
                ? '<table class="meta"><tr><th>Accuracy</th><td>'+r.evals.accuracy+'% ('+(r.evals.accuracy>=r.evals.threshold?'pass':'fail')+')</td></tr>'+
                  '<tr><th>Groundedness</th><td>'+(r.evals.grounded!=null?r.evals.grounded+'% ('+(r.evals.grounded>=r.evals.threshold?'pass':'fail')+')':'—')+'</td></tr>'+
                  '<tr><th>Gate threshold</th><td>'+r.evals.threshold+'%</td></tr></table>'
                : '<p>Automated evaluation gate has not yet run for this item.</p>';
              downloadSignOff({ audience, id:r.id, title:r.title, type:r.type,
                meta:[['Type',r.type],['Domain',r.domain],['Owner',r.by],['Submitted',r.submitted],
                      ['Priority',r.priority],['Current stage',m.label],
                      ['Compliance routing', isProc?'CASS — Client Assets':r.complianceTeam]],
                sections:[
                  {h:'Summary', html:'<p>'+(r.note||'').replace(/[<>]/g,'')+'</p>'},
                  {h:'Evaluation gate', html:evalRows},
                  {h:'Sign-off pipeline', html:'<div class="pl">'+REVIEW_PIPELINE.map(s=>{
                    const e=r.steps[s.key]; const cls=e.state==='done'?'done':e.state==='active'?'active':e.state==='blocked'?'failed':'';
                    const n=e.state==='done'?'✓':e.state==='blocked'?'✕':'';
                    return '<div class="stg"><div class="num '+cls+'">'+(n||'·')+'</div><div><b>'+s.label+'</b>'+
                      '<div class="who">'+(e.who||'')+(e.role?' · '+e.role:'')+'</div>'+
                      (e.note?'<div class="note">'+e.note.replace(/[<>]/g,'')+'</div>':'')+
                      '<div class="note">'+(e.when||'')+'</div></div></div>';
                  }).join('')+'</div>'}
                ]});
              window.toast('Sign-off PDF generated','info', r.id+' · '+audience+' pack downloaded');
            }}/>
          <div style={{flex:1}}/>
          {published
            ? <button className="btn btn-ghost" onClick={()=>window.toast('Opening live content','info', r.ref+' · published version')}><Icon name="eye" size={15}/>View live content</button>
            : <React.Fragment>
                <button className="btn btn-ghost" onClick={requestChanges}>Request changes</button>
                {primary && <button className="btn btn-primary" disabled={running} onClick={primary.fn}><Icon name={running?'refresh':primary.icon} size={16}/>{primary.label}</button>}
              </React.Fragment>}
        </div>
      </aside>
    </React.Fragment>
  );
}

function Reviews({ go }){
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState('action');
  const counts = useMemo(()=>{
    const c={held:0,published:18};
    REVIEWS.forEach(r=>{ c[r.stage]=(c[r.stage]||0)+1; if(Object.values(r.steps).some(s=>s.state==='blocked')) c.held++; });
    return c;
  },[]);
  const needsAction = useMemo(()=> REVIEWS.filter(r=>r.action)
    .sort((a,b)=>({err:0,warn:1,info:2}[a.action.tone]-{err:0,warn:1,info:2}[b.action.tone])),[]);

  return (
    <div className="wrap fade-in">
      <div className="page-head">
        <div><h1>Reviews & sign-off</h1><p>New content moves through SME review, compliance sign-off, automated evals, then peer review before it reaches Ada. Every step is captured in an exportable FCA audit trail.</p></div>

function AuditDrawer({ a, onClose }){
  if(!a) return null;
  const d = AUDIT_DETAIL[a.action] || {icon:'lock', tone:'info', what:'Recorded platform action.', why:'—', impact:'—'};
  const toneC = {err:'var(--err)', ok:'var(--ok)', info:'var(--blue)'}[d.tone];
  const toneBg = {err:'var(--err-bg)', ok:'var(--ok-bg)', info:'var(--info-bg)'}[d.tone];
  const prevHash = (a.hash||'').split('…')[0]+'…'+Math.random().toString(16).slice(2,5);
  const buildPack = (audience)=>{
    downloadSignOff({ audience, id:a.entity, title:a.action+' — audit evidence', type:'Audit record',
      meta:[['Action',a.action],['Entity',a.entity],['Actor',a.actor],['Timestamp',a.time],['Domain',a.domain],['Sensitivity',a.sens],['Entry hash',a.hash]],
      sections:[
        {h:'What happened', html:'<p>'+d.what+'</p>'},
        {h:'Why', html:'<p>'+d.why+'</p>'},
        {h:'Impact', html:'<p>'+d.impact+'</p>'},
        {h:'Hash chain', html:'<table class="meta"><tr><th>Previous hash</th><td>'+prevHash+'</td></tr><tr><th>This entry</th><td>'+a.hash+'</td></tr><tr><th>Integrity</th><td>Verified · chain intact</td></tr></table>'},
      ]});
    window.toast('Audit evidence exported','info', a.entity+' · '+audience+' pack generated');
  };
  return (
    <React.Fragment>
      <div className="drawer-scrim open" onClick={onClose}/>
      <aside className="drawer open" style={{width:520}}>
        <div className="drawer__head">
          <div className="stat__ico" style={{background:toneBg,color:toneC}}><Icon name={d.icon} size={19}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span className="mono" style={{fontSize:11.5,color:'var(--muted)'}}>{a.time}</span>
              <Tag kind={d.tone==='err'?'err':d.tone==='ok'?'ok':'info'} dot>{a.action}</Tag>
            </div>
            <h3 style={{margin:'4px 0 0',fontSize:17,letterSpacing:'-.02em'}}>{a.entity}</h3>
          </div>
          <button className="iconbtn" onClick={onClose} style={{width:34,height:34}}><Icon name="x" size={17}/></button>
        </div>
        <div className="drawer__body" style={{display:'grid',gap:16}}>
          <div className="grid g-4" style={{gap:10}}>
            <MetaTile label="Actor"><b style={{fontWeight:600,fontSize:13}}>{a.actor}</b></MetaTile>
            <MetaTile label="Domain">{a.domain==='—'?<span className="muted">—</span>:<Tag kind={a.domain==='Pensions'?'info':'purple'}>{a.domain}</Tag>}</MetaTile>
            <MetaTile label="Sensitivity">{a.sens==='—'?<span className="muted">—</span>:<Tag kind={a.sens==='Restricted'?'warn':'neutral'}>{a.sens}</Tag>}</MetaTile>
            <MetaTile label="Entry hash"><span className="mono" style={{fontSize:11.5,color:'var(--ink-2)'}}>{a.hash}</span></MetaTile>
          </div>

          <div className="card card-pad" style={{display:'grid',gap:13}}>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:5}}>What happened</div><div style={{fontSize:13.5,color:'var(--ink-2)',lineHeight:1.55}}>{d.what}</div></div>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:5}}>Why</div><div style={{fontSize:13.5,color:'var(--ink-2)',lineHeight:1.55}}>{d.why}</div></div>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:5}}>Impact</div><div style={{fontSize:13.5,color:'var(--ink-2)',lineHeight:1.55}}>{d.impact}</div></div>
          </div>

          <div className="card card-pad">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}><Icon name="lock" size={16} style={{color:'var(--teal)'}}/><b style={{fontSize:13.5}}>Hash chain</b><Tag kind="teal" dot>verified</Tag></div>
            <div style={{display:'grid',gap:0}}>
              {[['Previous entry',prevHash,false],['This entry',a.hash,true]].map((r,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:11,padding:'9px 0',borderBottom:i===0?'1px solid var(--line-2)':'none'}}>
                  <div style={{width:26,height:26,borderRadius:8,background:r[2]?'var(--teal-050)':'var(--canvas-2)',color:r[2]?'var(--teal)':'var(--muted-2)',display:'grid',placeItems:'center',flexShrink:0}}><Icon name={r[2]?'check':'link'} size={14}/></div>

            <div className="dotline" style={{fontSize:11.5,marginTop:10}}><Icon name="shield" size={13} style={{color:'var(--teal)'}}/>Write-once · 7-year retention · any tampering breaks the chain</div>

        </div>
        <div className="drawer__foot">
          <button className="btn btn-ghost" onClick={()=>window.toast('Hash copied','info', a.hash)}><Icon name="link" size={15}/>Copy hash</button>
          <div style={{flex:1}}/>
          <SignOffMenu label="Export evidence" audiences={['Compliance','FCA']} build={buildPack} btnClass="btn btn-primary" primaryAudience="FCA"/>
        </div>
      </aside>
    </React.Fragment>
  );
}

        <div className="card-head"><Icon name="lock" size={18}/><h3>Activity</h3><div className="actions">{['All','Pensions','Wealth'].map(x=><button key={x} className={'chip'+(f===x?' is-on':'')} onClick={()=>setF(x)}>{x}</button>)}</div></div>
        <table className="tbl">
          <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Entity</th><th>Domain</th><th>Sensitivity</th><th>Hash</th><th></th></tr></thead>

            {rows.map((a,i)=>(
              <tr key={i} className="row-click" style={{cursor:'pointer'}} onClick={()=>setSel(a)}>

                <td><b style={{fontSize:13,fontWeight:600}}>{a.actor}</b></td>
                <td><span className="mono" style={{fontSize:12,color:actionTone[a.action]==='err'?'var(--err)':actionTone[a.action]==='ok'?'var(--ok)':'var(--ink-2)'}}>{a.action}</span></td>
                <td><span className="mono" style={{fontSize:12}}>{a.entity}</span></td>
                <td>{a.domain==='—'?<span className="muted">—</span>:<Tag kind={a.domain==='Pensions'?'info':'purple'}>{a.domain}</Tag>}</td>
                <td>{a.sens==='—'?<span className="muted">—</span>:<Tag kind={a.sens==='Restricted'?'warn':'neutral'}>{a.sens}</Tag>}</td>
                <td><span className="mono" style={{fontSize:11.5,color:'var(--muted-2)'}}>{a.hash}</span></td>
                <td><Icon name="chevR" size={15} style={{color:'var(--muted-2)'}}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <AuditDrawer a={sel} onClose={()=>setSel(null)}/>
    </div>
  );
}

Object.assign(window,{ Reviews, Audit });

                <button key={o.id} onClick={()=>setDest(o.id)} style={{padding:'10px 11px',borderRadius:11,border:dest===o.id?'1.5px solid var(--navy)':'1px solid var(--line)',background:dest===o.id?o.bg:'#fff',cursor:'pointer',textAlign:'left',boxShadow:dest===o.id?'0 0 0 3px rgba(25,29,100,.08)':'var(--sh-xs)',transition:'all .14s'}}>
                  <div style={{width:28,height:28,borderRadius:7,background:o.bg,color:o.color,display:'grid',placeItems:'center',marginBottom:7}}><Icon name={o.icon} size={14}/></div>
                  <b style={{fontSize:12.5,display:'block',marginBottom:2}}>{o.label}</b>
                  <span style={{fontSize:11,color:'var(--muted)'}}>{o.desc}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
        <div className="modal__foot">
          <div className="dotline" style={{fontSize:12}}><Icon name="doc" size={13} style={{color:'var(--blue)'}}/>Source page stays unchanged — you're working on a new copy</div>

            <Icon name="arrowR" size={15}/>Continue
          </button>
        </div>
      </div>
    </div>
  , document.body);
}

  );
}

<script type="text/babel">
/* Add a document — multi-step ingestion wizard */

const STEPS = ['Source','File','Classify','Process','Done'];
const PIPELINE = [
  {k:'Extract text', icon:'doc'},
  {k:'Detect metadata', icon:'tag'},
  {k:'Chunk · 1,000 tokens', icon:'layers'},
  {k:'Generate embeddings', icon:'spark'},
  {k:'Quality & readability', icon:'gauge'},
  {k:'Evaluation gate', icon:'shield'},
];

function Stepper({ step }){
  return (
    <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:24}}>
      {STEPS.map((s,i)=>(
        <React.Fragment key={s}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:28,height:28,borderRadius:99,display:'grid',placeItems:'center',fontSize:12.5,fontWeight:700,
              background:i<step?'var(--ok)':i===step?'var(--navy)':'var(--canvas-2)',color:i<=step?'#fff':'var(--muted)'}}>
              {i<step?<Icon name="check" size={14}/>:i+1}</div>
            <span style={{fontSize:13,fontWeight:i===step?700:500,color:i===step?'var(--ink)':'var(--muted)'}}>{s}</span>
          </div>
          {i<STEPS.length-1 && <div style={{flex:1,height:2,background:i<step?'var(--ok)':'var(--line)',margin:'0 12px',minWidth:24}}/>}
        </React.Fragment>
      ))}
    </div>
  );
}

function AddDocument({ go }){
  const [step,setStep]=useState(0);
  const [src,setSrc]=useState(null);
  const [file,setFile]=useState('Change-of-address-policy-2025-Q2.pdf');
  const [domain,setDomain]=useState('Servicing');
  const [sens,setSens]=useState('Internal');
  const [maps,setMaps]=useState(['DM-G01','DM-G04']);
  const [trusted,setTrusted]=useState(false);
  const [prog,setProg]=useState(-1); // pipeline index

  useEffect(()=>{
    if(step!==3) return;
    setProg(0);
    const t=setInterval(()=>{
      setProg(p=>{ if(p>=PIPELINE.length-1){ clearInterval(t); setTimeout(()=>setStep(4),700); return p; } return p+1; });
    },650);
    return ()=>clearInterval(t);
  },[step]);

  const sources=[
    {id:'sp-modern',name:'SharePoint (Modern)',desc:'Connected · 4 libraries',icon:'globe'},
    {id:'sp-classic',name:'SharePoint (Classic)',desc:'Connected · 2 sites',icon:'globe'},
    {id:'pdf',name:'PDF document',desc:'Upload from your device',icon:'doc'},
    {id:'word',name:'Word document',desc:'Upload from your device',icon:'doc'},
  ];

  return (
    <div className="wrap fade-in" style={{maxWidth:860}}>
      <div className="page-head"><div><h1>Add a document</h1><p>Bring an existing file into the knowledge store. We extract, classify and run it through the eval gate before it reaches Ada.</p></div>
        <div className="actions"><button className="btn btn-ghost btn-sm" onClick={()=>go('create')}><Icon name="x" size={14}/>Cancel</button></div></div>

      <div className="card card-pad" style={{padding:'24px 26px'}}>
        <Stepper step={step}/>

        {/* Step 0 — source */}
        {step===0 && (
          <div className="fade-in">
            <h3 style={{margin:'0 0 14px',fontSize:15}}>Where is the document coming from?</h3>
            <div className="grid g-2">
              {sources.map(s=>(
                <button key={s.id} className="card card-pad" onClick={()=>setSrc(s.id)} style={{textAlign:'left',cursor:'pointer',border:src===s.id?'1.5px solid var(--navy)':'1px solid var(--line)',boxShadow:src===s.id?'0 0 0 3px rgba(25,29,100,.08)':'var(--sh-sm)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:11}}>
                    <div style={{width:38,height:38,borderRadius:10,background:'var(--canvas-2)',color:'var(--navy)',display:'grid',placeItems:'center'}}><Icon name={s.icon} size={18}/></div>
                    <div style={{flex:1}}><b style={{fontSize:13.5,display:'block'}}>{s.name}</b><span className="muted" style={{fontSize:12}}>{s.desc}</span></div>
                    {src===s.id&&<Icon name="checkCircle" size={18} style={{color:'var(--navy)'}}/>}
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 1 — file */}
        {step===1 && (
          <div className="fade-in">
            <h3 style={{margin:'0 0 14px',fontSize:15}}>Select the file</h3>
            <div style={{border:'2px dashed var(--line)',borderRadius:14,padding:'30px',textAlign:'center',background:'var(--canvas)',marginBottom:16}}>
              <div style={{width:46,height:46,borderRadius:12,background:'#fff',border:'1px solid var(--line)',display:'grid',placeItems:'center',margin:'0 auto 10px',color:'var(--blue)'}}><Icon name="upload" size={22}/></div>
              <b style={{fontSize:14}}>Drop a file here</b>
              <div className="muted" style={{fontSize:12.5}}>PDF, Word or selected SharePoint library · max 25MB</div>
            </div>
            <div className="card" style={{overflow:'hidden'}}>
              <div className="lrow" style={{background:'var(--blue-050)'}}>
                <div className="lrow__ico" style={{background:'#fff',color:'var(--blue)',width:36,height:36}}><Icon name="doc" size={17}/></div>
                <div className="lrow__main"><b style={{fontSize:13.5}}>{file}</b><span>1.2 MB · selected from {src&&src.startsWith('sp')?'SharePoint':'upload'}</span></div>
                <Tag kind="info" dot>ready</Tag>
              </div>
            </div>
          </div>
        )}

        {/* Step 2 — classify */}
        {step===2 && (
          <div className="fade-in" style={{display:'grid',gap:18}}>
            <h3 style={{margin:0,fontSize:15}}>Classify the content</h3>
            <div>
              <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Title</label>
              <input defaultValue="Change of address — proof &amp; verification requirements" style={{width:'100%',padding:'10px 13px',border:'1px solid var(--line)',borderRadius:10,fontFamily:'inherit',fontSize:14}}/>
            </div>
            <div className="grid g-2">
              <div>
                <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Domain</label>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['Servicing','Payments','Life events','Complaints'].map(d=><button key={d} className={'chip'+(domain===d?' is-on':'')} onClick={()=>setDomain(d)}>{d}</button>)}</div>
              </div>
              <div>
                <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Owner</label>
                <div className="chip" style={{cursor:'default'}}><span className="avatar" style={{background:'#138a5a',width:20,height:20,fontSize:9}}>JO</span>James Okonkwo</div>
              </div>
            </div>
            <div>
              <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Sensitivity</label>
              <div style={{display:'flex',gap:8}}>{['Internal','Restricted','Highly Restricted'].map(s=><button key={s} className={'chip'+(sens===s?' is-on':'')} onClick={()=>setSens(s)}>{s}</button>)}</div>
            </div>
            <div>
              <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Map to demand <span className="muted" style={{fontWeight:400}}>· helps Ada retrieve it</span></label>
              <DemandPickerDropdown value={maps} onChange={setMaps}/>
            </div>
          </div>
        )}

        {/* Step 3 — process */}
        {step===3 && (
          <div className="fade-in">
            <h3 style={{margin:'0 0 16px',fontSize:15}}>Processing “{file}”</h3>
            <div style={{display:'grid',gap:10}}>
              {PIPELINE.map((p,i)=>{
                const state=i<prog?'done':i===prog?'run':'todo';
                const last=i===PIPELINE.length-1;
                return (
                  <div key={p.k} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:11,border:'1px solid '+(state==='run'?'var(--navy)':'var(--line)'),background:state==='todo'?'var(--canvas)':'#fff'}}>
                    <div style={{width:32,height:32,borderRadius:9,display:'grid',placeItems:'center',flexShrink:0,
                      background:state==='done'?(last?'var(--warn-bg)':'var(--ok-bg)'):state==='run'?'var(--blue-050)':'var(--canvas-2)',
                      color:state==='done'?(last?'var(--warn)':'var(--ok)'):state==='run'?'var(--blue)':'var(--muted-2)'}}>
                      <Icon name={state==='done'?(last?'warn':'check'):p.icon} size={16}/>
                    </div>
                    <b style={{flex:1,fontSize:13.5,color:state==='todo'?'var(--muted)':'var(--ink)'}}>{p.k}</b>
                    {state==='run'&&<span className="dotline" style={{fontSize:12,color:'var(--blue)'}}><Icon name="refresh" size={14}/>running</span>}
                    {state==='done'&&!last&&<Tag kind="ok" dot>done</Tag>}
                    {state==='done'&&last&&<Tag kind="warn" dot>1 conflict</Tag>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Step 4 — done */}
        {step===4 && (
          <div className="fade-in" style={{textAlign:'center',padding:'14px 0 6px'}}>
            <div style={{width:58,height:58,borderRadius:16,background:'var(--warn-bg)',color:'var(--warn)',display:'grid',placeItems:'center',margin:'0 auto 14px'}}><Icon name="warn" size={26}/></div>
            <h3 style={{margin:'0 0 6px',fontSize:18}}>Saved as draft — <span className="mono">KN-3052</span></h3>
            <p className="muted" style={{maxWidth:'46ch',margin:'0 auto 18px',fontSize:13.5}}>The document was ingested and classified, but the eval gate found it <b>conflicts with KN-3038</b> on the proof-of-address requirement. It’s held as a draft until you resolve the conflict — Ada won’t see it yet.</p>
            <div className="card card-pad" style={{maxWidth:420,margin:'0 auto 20px',textAlign:'left'}}>
              {[['Title','Change of address — proof & verification'],['Domain',domain],['Sensitivity',sens],['Trusted source',trusted?'Yes — policy-verified':'No'],['Mapped demand',maps.join(', ')||'—'],['Status','Draft · conflict']].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--line-2)',fontSize:13}}><span className="muted">{r[0]}</span><b style={{fontWeight:600}}>{r[1]}</b></div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button className="btn btn-ghost" onClick={()=>{setStep(0);setSrc(null);}}><Icon name="plus" size={15}/>Add another</button>
              <button className="btn btn-primary" onClick={()=>go('knowledge')}>Resolve conflict in editor<Icon name="arrowR" size={15}/></button>
            </div>
          </div>
        )}

        {/* nav */}
        {step<3 && (
          <div style={{display:'flex',gap:10,marginTop:24,paddingTop:18,borderTop:'1px solid var(--line-2)'}}>
            {step>0 && <button className="btn btn-ghost" onClick={()=>setStep(s=>s-1)}>Back</button>}
            <div style={{flex:1}}/>
            <button className="btn btn-primary" disabled={step===0&&!src} onClick={()=>setStep(s=>s+1)} style={{opacity:(step===0&&!src)?.5:1}}>
              {step===2?'Process document':'Continue'}<Icon name="arrowR" size={15}/>
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function DemandPickerDropdown({ value, onChange, multi=true, placeholder='Select a demand…', align='left' }){

  const [q,setQ]=useState('');

  useEffect(()=>{
    if(!open) return;
    const h=e=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h); return ()=>document.removeEventListener('mousedown',h);
  },[open]);
  const sel = multi ? (value||[]) : (value?[value]:[]);
  const toggle=(id)=>{
    if(multi){ onChange(sel.includes(id)?sel.filter(x=>x!==id):[...sel,id]); }
    else { onChange(id); setOpen(false); setQ(''); }
  };
  const ql=q.trim().toLowerCase();
  const match=(d)=> !ql || d.name.toLowerCase().includes(ql) || d.id.toLowerCase().includes(ql);
  const ctrl={display:'flex',alignItems:'center',gap:8,width:'100%',minHeight:40,padding:'6px 10px',border:'1px solid '+(open?'var(--navy)':'var(--line)'),boxShadow:open?'0 0 0 3px rgba(25,29,100,.08)':'none',borderRadius:10,background:'#fff',cursor:'pointer',textAlign:'left',fontFamily:'inherit'};

    <div ref={ref} style={{position:'relative'}}>

        <div style={{flex:1,minWidth:0,display:'flex',gap:6,flexWrap:'wrap'}}>

              return (
                <div key={area.id} style={{marginBottom:4}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--muted)',padding:'8px 10px 4px'}}>{area.name}</div>
                  {items.map(d=>{
                    const on=sel.includes(d.id);

                      <button key={d.id} type="button" onClick={()=>toggle(d.id)} style={{display:'flex',gap:10,alignItems:'center',width:'100%',textAlign:'left',background:on?'var(--canvas)':'none',border:'none',padding:'8px 10px',borderRadius:9,cursor:'pointer'}}

                      </button>

  );
}

function TrainingBuilder({ go }){

    {id:1,q:'What percentage of the GAD basis amount sets the capped drawdown income limit?',options:['100%','125%','150%','175%'],correct:2},
    {id:2,q:'How often is the GAD rate reviewed by HM Treasury?',options:['Monthly','Quarterly','Annually','Every 3 years'],correct:1},
    {id:3,q:'Which allowance is triggered if a customer exceeds the capped drawdown limit?',options:['Annual allowance','Lifetime allowance','Money purchase annual allowance','Tapered annual allowance'],correct:2},
  ]);

  const BLOCK_TYPES=[
    {type:'intro',     label:'Introduction',    icon:'doc',    bg:'var(--blue-050)',   fg:'var(--blue)'},
    {type:'key-points',label:'Key points',      icon:'list',   bg:'var(--teal-050)',   fg:'var(--teal)'},

  ];

  const exportMarkdown=()=>{
    let md='# '+title+'\n\n';
    blocks.forEach(b=>{ md+='## '+b.label+'\n\n'+b.content+'\n\n'; });

    questions.forEach((q,i)=>{
      md+='**Q'+(i+1)+': '+q.q+'**\n';
      q.options.forEach((o,j)=>{ md+=(j===q.correct?'- [x] ':'- [ ] ')+o+'\n'; });
      md+='\n';
    });
    md+='---\n_Generated from Content Studio_';
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([md],{type:'text/markdown'})),download:title.replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.md'});
    a.click();
  };
  const addBlock=(type)=>{
    const bt=BLOCK_TYPES.find(b=>b.type===type)||BLOCK_TYPES[0];
    setBlocks(b=>[...b,{id:Date.now(),type,label:bt.label,content:''}]);
  };
  const removeBlock=(id)=>setBlocks(b=>b.filter(x=>x.id!==id));
  const updateBlock=(id,val)=>setBlocks(b=>b.map(x=>x.id===id?{...x,content:val}:x));

  const addQuestion=()=>setQuestions(q=>[...q,{id:Date.now(),q:'',options:['','','',''],correct:0}]);

  const updateQ=(id,val)=>setQuestions(q=>q.map(x=>x.id===id?{...x,q:val}:x));
  const updateOpt=(qid,oi,val)=>setQuestions(q=>q.map(x=>x.id===qid?{...x,options:x.options.map((o,i)=>i===oi?val:o)}:x));
  const setCorrect=(qid,oi)=>setQuestions(q=>q.map(x=>x.id===qid?{...x,correct:oi}:x));

  const learnSugg=[
    {t:'Add a regulatory note',d:'FCA Consumer Duty reference',ico:'shield'},
    {t:'Link to procedure PR-318',d:'Verify GAD rate step-by-step',ico:'link'},
    {t:'Simplify the worked example',d:'Use rounder numbers for clarity',ico:'spark'},
  ];
  const assessSugg=[
    {t:'Add a scenario question',d:'Real call-centre situation',ico:'msg'},
    {t:'Increase difficulty',d:'Add an edge-case distractor',ico:'bolt'},
    {t:'Shuffle option order',d:'Reduce pattern guessing',ico:'refresh'},
  ];
  const suggestions=tab==='learn'?learnSugg:assessSugg;
  const [appliedSugg,setAppliedSugg]=useState([]);

  return (
    <div className="wrap fade-in" style={{maxWidth:1180}}>
      <div className="page-head">
        <div><h1>New training module</h1><p>Build a handler learning module — structured content plus a multiple-choice assessment. Linked to the knowledge it covers.</p></div>
        <div className="actions">
          <button className="btn btn-ghost btn-sm" onClick={()=>{window.toast('Draft discarded','warn');go('create');}}>Discard</button>
          <button className="btn btn-ghost" onClick={()=>window.toast('Preview ready','info','Walk the module as a handler would')}><Icon name="eye" size={15}/>Preview</button>
          <button className="btn btn-ghost" onClick={exportMarkdown}><Icon name="download" size={14}/>Export .md</button>
          <button className="btn btn-primary" onClick={()=>setShowReview(true)}><Icon name="upload" size={15}/>Save &amp; submit</button>
        </div>
      </div>

      <div className="grid" style={{gridTemplateColumns:'1fr 310px',alignItems:'start',gap:18}}>

        {/* ---- left column ---- */}
        <div style={{display:'grid',gap:14}}>

          {/* Title card */}
          <div className="card card-pad">
            <label style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:6}}>Module title</label>
            <input value={title} onChange={e=>setTitle(e.target.value)}
              style={{width:'100%',border:'none',outline:'none',fontFamily:'inherit',fontSize:22,fontWeight:800,letterSpacing:'-.02em',color:'var(--ink)'}}/>
            <div className="dotline" style={{fontSize:12,marginTop:8}}>
              <Icon name="book" size={13} style={{color:'#3a8c35'}}/>
              Pensions · Drawdown · Draft
            </div>
          </div>

          {/* Tab toggle */}
          <div>
            <div className="seg">
              <button className={tab==='learn'?'is-on':''} onClick={()=>setTab('learn')}>
                <Icon name="book" size={13}/> Learning content
              </button>
              <button className={tab==='assess'?'is-on':''} onClick={()=>setTab('assess')}>
                <Icon name="checkCircle" size={13}/> Assessment ({questions.length} questions)
              </button>
            </div>
          </div>

          {/* Learning tab */}
          {tab==='learn' && (
            <div style={{display:'grid',gap:12}}>
              {blocks.map(bl=>{
                const bt=BLOCK_TYPES.find(b=>b.type===bl.type)||BLOCK_TYPES[0];
                return (
                  <div key={bl.id} className="card" style={{overflow:'hidden'}}>
                    <div className="card-head" style={{padding:'11px 16px'}}>
                      <div style={{width:26,height:26,borderRadius:8,background:bt.bg,color:bt.fg,display:'grid',placeItems:'center',flexShrink:0}}>
                        <Icon name={bt.icon} size={13}/>
                      </div>
                      <span style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.05em'}}>{bl.label}</span>
                      <div className="actions">
                        <button onClick={()=>removeBlock(bl.id)} style={{border:'none',background:'none',color:'var(--muted-2)',cursor:'pointer',padding:4,display:'grid',placeItems:'center'}}>
                          <Icon name="x" size={15}/>
                        </button>
                      </div>
                    </div>
                    <div style={{padding:'2px 16px 16px'}}>
                      <textarea value={bl.content} onChange={e=>updateBlock(bl.id,e.target.value)}
                        rows={4} style={{width:'100%',border:'none',outline:'none',resize:'vertical',
                          fontFamily:'inherit',fontSize:14,lineHeight:1.7,color:'var(--ink-2)',background:'transparent'}}/>
                    </div>
                  </div>
                );
              })}
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {BLOCK_TYPES.map(bt=>(
                  <button key={bt.type} className="btn btn-ghost btn-sm" onClick={()=>addBlock(bt.type)}>
                    <Icon name="plus" size={13}/>{bt.label}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Assessment tab */}
          {tab==='assess' && (
            <div style={{display:'grid',gap:12}}>
              {questions.map((q,qi)=>(
                <div key={q.id} className="card card-pad" style={{padding:'18px 20px'}}>
                  <div style={{display:'flex',gap:11,alignItems:'flex-start',marginBottom:14}}>
                    <div style={{width:26,height:26,borderRadius:99,background:'var(--navy)',color:'#fff',
                      display:'grid',placeItems:'center',fontSize:12,fontWeight:700,flexShrink:0,marginTop:2}}>{qi+1}</div>
                    <input value={q.q} onChange={e=>updateQ(q.id,e.target.value)}
                      placeholder="Question text…"
                      style={{flex:1,border:'none',borderBottom:'1.5px solid var(--line)',outline:'none',
                        fontFamily:'inherit',fontSize:14.5,fontWeight:600,color:'var(--ink)',
                        paddingBottom:8,background:'transparent'}}/>
                    <button onClick={()=>removeQuestion(q.id)}
                      style={{border:'none',background:'none',color:'var(--muted-2)',cursor:'pointer',padding:4,flexShrink:0}}>
                      <Icon name="x" size={15}/>
                    </button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    {q.options.map((opt,oi)=>(
                      <div key={oi}
                        style={{display:'flex',alignItems:'center',gap:9,padding:'9px 12px',borderRadius:9,cursor:'pointer',
                          border:`1.5px solid ${q.correct===oi?'var(--ok)':'var(--line)'}`,
                          background:q.correct===oi?'var(--ok-bg)':'#fff',transition:'.12s'}}
                        onClick={()=>setCorrect(q.id,oi)}>
                        <div style={{width:18,height:18,borderRadius:99,flexShrink:0,display:'grid',placeItems:'center',
                          border:`2px solid ${q.correct===oi?'var(--ok)':'var(--line)'}`,
                          background:q.correct===oi?'var(--ok)':'#fff'}}>
                          {q.correct===oi && <Icon name="check" size={10} style={{color:'#fff'}}/>}
                        </div>
                        <input value={opt} onChange={e=>updateOpt(q.id,oi,e.target.value)}
                          placeholder={`Option ${oi+1}`}
                          onClick={e=>e.stopPropagation()}
                          style={{border:'none',outline:'none',fontFamily:'inherit',fontSize:13,
                            color:'var(--ink)',flex:1,background:'transparent'}}/>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <button className="btn btn-ghost" onClick={addQuestion} style={{justifyContent:'center'}}>
                <Icon name="plus" size={15}/>Add question
              </button>
            </div>
          )}
        </div>

        {/* ---- right sidebar ---- */}
        <div style={{display:'grid',gap:18}}>

          {/* AI assist */}
          <div className="card" style={{overflow:'hidden'}}>
            <div className="card-head" style={{padding:'14px 16px'}}>
              <Icon name="spark" size={17} style={{color:'var(--purple)'}}/>
              <h3 style={{fontSize:14}}>AI assist</h3>
              <Tag kind="purple" style={{marginLeft:'auto'}}>{tab==='learn'?'Content':'Questions'}</Tag>
            </div>
            <div style={{padding:'6px 0'}}>
              {suggestions.map((s,i)=>(
                <div key={tab+i} className="lrow" style={{padding:'11px 16px',opacity:appliedSugg.includes(tab+i)?.45:1}}>
                  <div className="lrow__ico" style={{background:'var(--purple-050)',color:'var(--purple)',width:30,height:30}}>
                    <Icon name={s.ico} size={14}/>
                  </div>
                  <div className="lrow__main"><b style={{fontSize:12.5}}>{s.t}</b><span style={{fontSize:11}}>{s.d}</span></div>
                  {appliedSugg.includes(tab+i)
                    ? <Icon name="check" size={15} style={{color:'var(--ok)'}}/>
                    : <button className="btn btn-ghost btn-sm" style={{padding:'4px 9px'}}
                        onClick={()=>setAppliedSugg(a=>[...a,tab+i])}>Apply</button>}
                </div>
              ))}
            </div>
          </div>

          {/* Module stats */}
          <div className="card card-pad">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <Icon name="gauge" size={17} style={{color:'var(--teal)'}}/>
              <b style={{fontSize:14}}>Module stats</b>
            </div>
            <div style={{display:'grid',gap:10}}>
              {[
                ['Content blocks', blocks.length, 'var(--blue)'],
                ['Questions',      questions.length, 'var(--teal)'],
                ['Est. completion',`${Math.max(2,blocks.length*2+questions.length)} min`,'var(--purple)'],
                ['Pass mark',      '80%','#3a8c35'],
              ].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:13,alignItems:'center'}}>
                  <span className="muted">{r[0]}</span>
                  <b style={{fontWeight:700,color:r[2],fontVariantNumeric:'tabular-nums'}}>{r[1]}</b>
                </div>
              ))}
            </div>
            <hr className="divider" style={{margin:'14px 0'}}/>
            <div style={{fontSize:12.5,fontWeight:600,color:'var(--muted)',marginBottom:10}}>Knowledge coverage</div>
            {[
              ['KN-2041 · GAD rate assumptions',88],
              ['KN-2038 · Capped drawdown income',72],
              ['PR-318 · Verify GAD rate',60],
            ].map(r=>(
              <div key={r[0]} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:3}}>
                  <span className="muted" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'78%'}}>{r[0]}</span>
                  <span style={{fontWeight:600}}>{r[1]}%</span>
                </div>
                <Meter v={r[1]} tone={r[1]>=80?'green':r[1]>=60?'':'amber'}/>
              </div>
            ))}
          </div>

          {/* Details */}
          <div className="card card-pad">
            <div style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Details</div>
            <div style={{display:'grid',gap:11}}>
              {[
                ['Domain',  'Pensions'],
                ['Audience','Drawdown handlers'],
                ['Owner',   'Priya Sharma'],
                ['Pass mark','80%'],
              ].map(r=>(
                <div key={r[0]} style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                  <span className="muted">{r[0]}</span>
                  <b style={{fontWeight:600}}>{r[1]}</b>
                </div>
              ))}
            </div>
            <div style={{marginTop:12}}>
              <div className="muted" style={{fontSize:12,marginBottom:6}}>Serves demand</div>
              <DemandPickerDropdown multi={false} value={demand} onChange={setDemand} placeholder="Link a demand…"/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:12,padding:'10px 12px',borderRadius:11,background:trusted?'var(--ok-bg)':'var(--canvas)'}}>
              <Icon name={trusted?'shield':'warn'} size={16} style={{color:trusted?'var(--ok)':'var(--muted-2)',flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}><b style={{fontSize:12.5}}>Trusted source</b><div className="muted" style={{fontSize:11.5}}>{trusted?'Built only from signed-off knowledge':'Includes unverified content'}</div></div>
              <button onClick={()=>setTrusted(v=>!v)} style={{width:40,height:23,borderRadius:99,border:'none',cursor:'pointer',padding:2,background:trusted?'var(--ok)':'var(--line)',display:'flex',justifyContent:trusted?'flex-end':'flex-start',transition:'all .15s',flexShrink:0}}><span style={{width:19,height:19,borderRadius:99,background:'#fff',display:'block',boxShadow:'0 1px 2px rgba(0,0,0,.2)'}}/></button>
            </div>
            <hr className="divider" style={{margin:'14px 0'}}/>
            <div className="dotline" style={{fontSize:12,marginBottom:12}}>
              <Icon name="shield" size={14} style={{color:'var(--warn)'}}/>
              Publish gate: <b style={{color:'var(--warn)'}}>review required</b>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>setShowReview(true)}>
              <Icon name="arrowR" size={15}/>Send for review
            </button>
          </div>
        </div>
      </div>
      <ReviewSendModal open={showReview} onClose={()=>setShowReview(false)} item={{type:'Training module',title,domain:'Pensions',demand,owner:'Priya Sharma',pipeline:['SME review','Compliance','Eval gate','Peer check','Publish']}} onConfirm={()=>{setShowReview(false);window.toast('Module submitted','ok','Sent for review before publishing to handlers');go('reviews');}}/>
    </div>
  );
}

Object.assign(window,{ TrainingBuilder });

</script>

<script type="text/babel">
/* Root app */
function App(){
  const [route,setRoute]=useState(()=>localStorage.getItem('cs_route')||'home');
  const go=(r)=>{ setRoute(r); localStorage.setItem('cs_route',r); const c=document.querySelector('.content'); if(c) c.scrollTop=0; };
  const navActive = (route==='upload'||route==='create-doc')?'upload':route.startsWith('create')?'create':route;

  let page;
  switch(route){
    case 'home': page=<Home go={go}/>; break;
    case 'create': page=<CreateHub go={go}/>; break;
    case 'upload': page=<UploadHub go={go}/>; break;
    case 'create-doc': page=<AddDocument go={go}/>; break;
    case 'create-page': page=<PageBuilder go={go}/>; break;
    case 'create-procedure': page=<ProcedureBuilder go={go}/>; break;
    case 'create-training': page=<TrainingBuilder go={go}/>; break;
    case 'knowledge': page=<Knowledge go={go}/>; break;
    case 'demand': page=<Demand go={go}/>; break;
    case 'procedures': page=<Procedures go={go}/>; break;
    case 'advice': page=<AdviceContext go={go}/>; break;
    case 'measure': page=<Measurement go={go}/>; break;
    case 'agentlab': page=<AgentLab go={go}/>; break;
    case 'arize': page=<Arize go={go}/>; break;
    case 'reviews': page=<Reviews go={go}/>; break;
    case 'audit': page=<Audit go={go}/>; break;
    default: page=<Home go={go}/>;
  }

  return (
    <div className="app">
      <Sidebar active={navActive} onNav={go}/>
      <div className="main">
        <Topbar route={route}/>
        <div className="content" key={route}>{page}</div>
      </div>
      <Toaster/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
